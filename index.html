<script>
/* ── Step 11: voice transcript UI normalization + reliable multi-select ── */
(function(){
  function s11TranscriptIcon(open){
    if(open){
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="M8 8l4 4-4 4"/></svg>';
    }
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 6h8"/><path d="M8 10h8"/><path d="M8 14h5"/><path d="M6 3h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z"/></svg>';
  }
  function s11NormalizeVoiceUI(root){
    (root||document).querySelectorAll('.conv-voice-bubble').forEach(function(bubble){
      const btn=bubble.querySelector('.conv-voice-transcribe-btn');
      if(btn){
        const open=bubble.classList.contains('transcribed');
        btn.innerHTML=s11TranscriptIcon(open);
        btn.setAttribute('title',open?'收起文字':'转文字');
        btn.setAttribute('aria-label',open?'收起文字':'转文字');
      }
      const src=bubble.querySelector('.conv-voice-source');
      if(src)src.textContent='';
    });
  }
  window.convToggleVoiceTranscript=function(e,btn){
    if(e){e.preventDefault();e.stopPropagation();}
    const bubble=btn&&btn.closest?btn.closest('.conv-voice-bubble'):null;
    if(!bubble)return;
    bubble.classList.toggle('transcribed');
    s11NormalizeVoiceUI(bubble);
    if(typeof convUpdateBodyPadding==='function')convUpdateBodyPadding();
  };

  const oldSubmitVoice=window.convSubmitVoiceComposer;
  if(typeof oldSubmitVoice==='function'){
    window.convSubmitVoiceComposer=function(){
      oldSubmitVoice();
      setTimeout(function(){s11NormalizeVoiceUI(document);},0);
    };
  }
  const oldOpenVoice=window.convOpenVoiceComposer;
  if(typeof oldOpenVoice==='function'){
    window.convOpenVoiceComposer=function(side,options){
      oldOpenVoice(side,options);
      setTimeout(function(){
        const title=document.querySelector('.conv-voice-sheet-title');
        const note=document.querySelector('.conv-voice-sheet-note');
        const meta=document.querySelector('.conv-voice-sheet-meta span:first-child');
        if(title && title.textContent==='语音消息')title.textContent='发送语音';
        if(note)note.textContent='无声语音气泡，可展开文字';
        if(meta)meta.textContent='输入内容会作为语音转文字保存，后续可接入 MiniMax 生成真实声音。';
      },0);
    };
  }

  function s11EnsureMultiState(){
    if(!window.CONV_STATE)return;
    if(!CONV_STATE.selectedBubbles)CONV_STATE.selectedBubbles=new Set();
  }
  function s11SelectedItems(){
    s11EnsureMultiState();
    const dom=[].slice.call(document.querySelectorAll('#conv-overlay .conv-bubble.conv-selected')).filter(function(b){return b&&b.isConnected;});
    if(window.CONV_STATE)CONV_STATE.selectedBubbles=new Set(dom);
    return dom;
  }
  function s11SideLabel(bubble){
    const group=bubble&&bubble.closest?bubble.closest('.conv-group'):null;
    return group&&group.classList.contains('sent')?'我':((window.CONV_STATE&&CONV_STATE.activeName)||'对方');
  }
  function s11TextOfBubble(bubble){
    if(!bubble)return'';
    const type=(bubble.dataset&&bubble.dataset.msgType)||'';
    if(type==='voice'){
      return (bubble.dataset.msgTranscript||bubble.dataset.msgText||'[语音]').trim() || '[语音]';
    }
    if(type==='image'){
      return (bubble.dataset.msgText&&bubble.dataset.msgText.indexOf('[图片')>-1)?bubble.dataset.msgText:'[图片]';
    }
    if(typeof convGetBubbleMainText==='function'){
      const text=convGetBubbleMainText(bubble);
      if(text)return text;
    }
    return (bubble.innerText||bubble.textContent||'').trim();
  }
  function s11Transcript(items){
    return (items||[]).map(function(b){return s11SideLabel(b)+'：'+s11TextOfBubble(b);}).join('\n');
  }
  function s11CopyText(text,ok){
    text=String(text||'');
    function fallback(){
      const ta=document.createElement('textarea');
      ta.value=text;
      ta.setAttribute('readonly','');
      ta.style.position='fixed';
      ta.style.left='-9999px';
      document.body.appendChild(ta);
      ta.select();
      let done=false;
      try{done=document.execCommand('copy');}catch(e){done=false;}
      ta.remove();
      if(done){showToast(ok||'已复制');}else{showToast('复制失败，请手动复制');}
    }
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).then(function(){showToast(ok||'已复制');}).catch(fallback);
    }else fallback();
  }
  function s11SaveFavorite(text,count){
    try{
      const key='XSJ_CHAT_FAVORITES';
      const arr=JSON.parse(localStorage.getItem(key)||'[]');
      arr.unshift({time:Date.now(),chat:(window.CONV_STATE&&CONV_STATE.activeName)||'',count:count,text:text});
      localStorage.setItem(key,JSON.stringify(arr.slice(0,80)));
      showToast('已收藏 '+count+' 条');
    }catch(e){
      showToast('已收藏 '+count+' 条');
    }
  }
  function s11RefreshMultiUI(){
    s11EnsureMultiState();
    const items=s11SelectedItems();
    const count=items.length;
    const pill=document.getElementById('conv-multi-count-pill');
    if(pill)pill.textContent=count?'已选择 '+count+' 条':'选择消息';
    const nameEl=document.querySelector('#conv-overlay .conv-nav-name');
    if(nameEl&&window.CONV_STATE&&CONV_STATE.multiSelect){
      if(!nameEl.dataset.originalText)nameEl.dataset.originalText=nameEl.textContent||CONV_STATE.activeName||'';
      nameEl.textContent=count?'已选择 '+count+' 条':'选择消息';
    }
    document.querySelectorAll('#conv-multi-bar .conv-multi-btn').forEach(function(btn){
      btn.disabled=!count;
      btn.classList.toggle('is-ready',!!count);
      btn.style.opacity=count?'1':'.34';
      btn.style.pointerEvents=count?'auto':'none';
    });
  }
  const oldToggleSelect=window.convToggleSelectBubble;
  if(typeof oldToggleSelect==='function'){
    window.convToggleSelectBubble=function(bubble,force){
      oldToggleSelect(bubble,force);
      setTimeout(s11RefreshMultiUI,0);
    };
  }
  const oldEnterMulti=window.convEnterMultiSelect;
  if(typeof oldEnterMulti==='function'){
    window.convEnterMultiSelect=function(bubble){
      oldEnterMulti(bubble);
      setTimeout(s11RefreshMultiUI,0);
    };
  }
  const oldExitMulti=window.convExitMultiSelect;
  if(typeof oldExitMulti==='function'){
    window.convExitMultiSelect=function(){
      oldExitMulti();
      setTimeout(s11RefreshMultiUI,0);
    };
  }
  window.convUpdateMultiUI=s11RefreshMultiUI;
  window.convMultiAction=function(type){
    const items=s11SelectedItems();
    const count=items.length;
    if(!count){showToast('请选择消息');return;}
    const text=s11Transcript(items);
    if(type==='copy'){
      s11CopyText(text,'已复制 '+count+' 条聊天');
      convExitMultiSelect();
      return;
    }
    if(type==='save'){
      s11SaveFavorite(text,count);
      convExitMultiSelect();
      return;
    }
    if(type==='forward'){
      if(window.CONV_STATE){
        CONV_STATE.quote={text:text,author:'聊天记录',side:'multi'};
      }
      convExitMultiSelect();
      if(typeof convRenderComposerState==='function')convRenderComposerState();
      if(typeof convUpdateBodyPadding==='function')convUpdateBodyPadding();
      const inp=document.getElementById('conv-input-field');
      if(inp){inp.placeholder='添加一句话再发送...';inp.focus();}
      showToast('已放入引用栏');
      return;
    }
    if(type==='delete'){
      items.forEach(function(b){if(b&&b.isConnected&&typeof convDeleteMessageBubble==='function')convDeleteMessageBubble(b);});
      convExitMultiSelect();
      if(typeof convUpdateBodyPadding==='function')convUpdateBodyPadding();
      showToast('已删除 '+count+' 条');
      return;
    }
  };

  const oldChatShow=window.chatShowMsg;
  if(typeof oldChatShow==='function'){
    window.chatShowMsg=function(name){
      oldChatShow(name);
      setTimeout(function(){s11NormalizeVoiceUI(document);s11RefreshMultiUI();},0);
    };
  }
  setTimeout(function(){s11NormalizeVoiceUI(document);s11RefreshMultiUI();},0);
})();
</script>

<script>
/* ── Step 12: single source of truth for multi-select + smaller image display ── */
(function(){
  function ensureState(){
    if(!window.CONV_STATE)window.CONV_STATE={};
    if(!CONV_STATE.selectedBubbles)CONV_STATE.selectedBubbles=new Set();
  }
  function ensureMultiBar(){
    const ov=document.getElementById('conv-overlay');
    if(!ov)return;
    if(!document.getElementById('conv-multi-count-pill')){
      ov.insertAdjacentHTML('beforeend','<div id="conv-multi-count-pill" class="conv-multi-count-pill">选择消息</div>');
    }
    if(!document.getElementById('conv-multi-bar')){
      ov.insertAdjacentHTML('beforeend',`<div id="conv-multi-bar" class="conv-multi-bar" aria-label="多选消息操作栏">
        <button class="conv-multi-btn" type="button" onclick="convMultiAction('copy')" aria-label="复制">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V5a2 2 0 012-2h8a2 2 0 012 2v1"/></svg><span>复制</span>
        </button>
        <button class="conv-multi-btn" type="button" onclick="convMultiAction('forward')" aria-label="转发">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 5l7 7-7 7"/><path d="M21 12H8a5 5 0 00-5 5v2"/></svg><span>转发</span>
        </button>
        <button class="conv-multi-btn" type="button" onclick="convMultiAction('save')" aria-label="收藏">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-4-7 4V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg><span>收藏</span>
        </button>
        <button class="conv-multi-btn danger" type="button" onclick="convMultiAction('delete')" aria-label="删除">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6M14 11v6"/></svg><span>删除</span>
        </button>
      </div>`);
    }
  }
  function selectableFromTarget(target){
    if(!target||!target.closest)return null;
    if(target.closest('#conv-multi-bar,#conv-multi-count-pill,.conv-input-wrap,.conv-msg-menu,.conv-plus-panel,.conv-image-preview,.conv-voice-sheet'))return null;
    const bubble=target.closest('#conv-overlay .conv-bubble, #conv-overlay .conv-media-bubble, #conv-overlay .conv-voice-bubble');
    if(!bubble)return null;
    if(!document.getElementById('conv-body') || !document.getElementById('conv-body').contains(bubble))return null;
    return bubble;
  }
  function getSelected(){
    const nodes=[].slice.call(document.querySelectorAll('#conv-overlay .conv-bubble.conv-selected, #conv-overlay .conv-media-bubble.conv-selected, #conv-overlay .conv-voice-bubble.conv-selected')).filter(function(b){return b&&b.isConnected;});
    const seen=new Set();
    const unique=[];
    nodes.forEach(function(b){if(!seen.has(b)){seen.add(b);unique.push(b);}});
    if(window.CONV_STATE)CONV_STATE.selectedBubbles=new Set(unique);
    return unique;
  }
  function setBubbleSelected(bubble,selected){
    if(!bubble)return;
    bubble.classList.toggle('conv-selected',!!selected);
    ensureState();
    const items=getSelected();
    CONV_STATE.selectedBubbles=new Set(items);
    updateUI();
  }
  window.convToggleSelectBubble=function(bubble,force){
    if(!bubble||!bubble.isConnected)return;
    const next=(typeof force==='boolean')?force:!bubble.classList.contains('conv-selected');
    setBubbleSelected(bubble,next);
  };
  function currentName(){return (window.CONV_STATE&&CONV_STATE.activeName)||'对方';}
  function sideLabel(bubble){
    const group=bubble&&bubble.closest?bubble.closest('.conv-group'):null;
    return group&&group.classList.contains('sent')?'我':currentName();
  }
  function mainText(bubble){
    if(!bubble)return'';
    const type=(bubble.dataset&&bubble.dataset.msgType)||'';
    if(type==='voice')return (bubble.dataset.msgTranscript||bubble.dataset.msgText||'[语音]').trim()||'[语音]';
    if(type==='image')return (bubble.dataset.msgText&&bubble.dataset.msgText.trim())||'[图片]';
    if(typeof window.convGetBubbleMainText==='function'){
      const t=convGetBubbleMainText(bubble);
      if(t)return t;
    }
    const clone=bubble.cloneNode(true);
    clone.querySelectorAll('.conv-quote-in-bubble,.conv-voice-transcribe-btn,.conv-voice-transcript,.conv-edited-mark').forEach(function(n){n.remove();});
    return (clone.innerText||clone.textContent||'').trim();
  }
  function transcript(items){
    return items.map(function(b){return sideLabel(b)+'：'+(mainText(b)||'[消息]');}).join('\n');
  }
  function copyText(text,ok){
    text=String(text||'');
    function fallback(){
      const ta=document.createElement('textarea');
      ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.left='-9999px';
      document.body.appendChild(ta);ta.select();
      let done=false;try{done=document.execCommand('copy');}catch(e){done=false;}
      ta.remove();
      if(typeof showToast==='function')showToast(done?(ok||'已复制'):'复制失败，请手动复制');
    }
    if(navigator.clipboard&&window.isSecureContext){
      navigator.clipboard.writeText(text).then(function(){if(typeof showToast==='function')showToast(ok||'已复制');}).catch(fallback);
    }else fallback();
  }
  function saveFavorite(text,count){
    try{
      const key='XSJ_CHAT_FAVORITES';
      const arr=JSON.parse(localStorage.getItem(key)||'[]');
      arr.unshift({time:Date.now(),chat:currentName(),count:count,text:text});
      localStorage.setItem(key,JSON.stringify(arr.slice(0,100)));
    }catch(e){}
    if(typeof showToast==='function')showToast('已收藏 '+count+' 条');
  }
  function deleteBubble(bubble){
    if(!bubble||!bubble.isConnected)return;
    if(typeof window.convDeleteMessageBubble==='function'){
      convDeleteMessageBubble(bubble);
      return;
    }
    const bubbles=bubble.closest('.conv-group-bubbles');
    const group=bubble.closest('.conv-group');
    bubble.remove();
    if(bubbles&&!bubbles.querySelector('.conv-bubble,.conv-media-bubble,.conv-voice-bubble')&&group)group.remove();
  }
  function updateUI(){
    ensureState();ensureMultiBar();
    const items=getSelected();
    const count=items.length;
    const pill=document.getElementById('conv-multi-count-pill');
    if(pill)pill.textContent=count?'已选择 '+count+' 条':'选择消息';
    const nameEl=document.querySelector('#conv-overlay .conv-nav-name');
    if(nameEl&&CONV_STATE.multiSelect){
      if(!nameEl.dataset.originalText)nameEl.dataset.originalText=CONV_STATE.activeName||nameEl.textContent||'';
      nameEl.textContent=count?'已选择 '+count+' 条':'选择消息';
    }
    document.querySelectorAll('#conv-multi-bar .conv-multi-btn').forEach(function(btn){
      btn.disabled=!count;
      btn.classList.toggle('is-ready',!!count);
      btn.style.opacity=count?'1':'.34';
      btn.style.pointerEvents=count?'auto':'none';
    });
  }
  window.convUpdateMultiUI=updateUI;
  window.convEnterMultiSelect=function(bubble){
    ensureState();ensureMultiBar();
    if(typeof window.convCloseMessageMenu==='function')convCloseMessageMenu();
    if(window.CONV_STATE){
      CONV_STATE.multiSelect=true;
      CONV_STATE.quote=null;
      CONV_STATE.edit=null;
      CONV_STATE.selectedBubbles=new Set();
    }
    document.querySelectorAll('#conv-overlay .conv-selected').forEach(function(el){el.classList.remove('conv-selected');});
    const ov=document.getElementById('conv-overlay');
    if(ov)ov.classList.add('multi-mode');
    if(typeof window.convRenderComposerState==='function')convRenderComposerState();
    if(bubble)setBubbleSelected(bubble,true);
    updateUI();
  };
  window.convExitMultiSelect=function(){
    ensureState();
    CONV_STATE.multiSelect=false;
    CONV_STATE.selectedBubbles=new Set();
    document.querySelectorAll('#conv-overlay .conv-selected').forEach(function(el){el.classList.remove('conv-selected');});
    const ov=document.getElementById('conv-overlay');
    if(ov)ov.classList.remove('multi-mode');
    const nameEl=document.querySelector('#conv-overlay .conv-nav-name');
    if(nameEl){nameEl.textContent=CONV_STATE.activeName||nameEl.dataset.originalText||nameEl.textContent;}
    const pill=document.getElementById('conv-multi-count-pill');
    if(pill)pill.textContent='选择消息';
    updateUI();
    if(typeof window.convUpdateBodyPadding==='function')convUpdateBodyPadding();
  };
  window.convMultiAction=function(type){
    const items=getSelected();
    const count=items.length;
    if(!count){if(typeof showToast==='function')showToast('请选择消息');return;}
    const text=transcript(items);
    if(type==='copy'){
      copyText(text,'已复制 '+count+' 条聊天');
      convExitMultiSelect();
      return;
    }
    if(type==='save'){
      saveFavorite(text,count);
      convExitMultiSelect();
      return;
    }
    if(type==='forward'){
      if(window.CONV_STATE)CONV_STATE.quote={text:text,author:'聊天记录',side:'multi'};
      convExitMultiSelect();
      if(typeof window.convRenderComposerState==='function')convRenderComposerState();
      if(typeof window.convUpdateBodyPadding==='function')convUpdateBodyPadding();
      const inp=document.getElementById('conv-input-field');
      if(inp){inp.placeholder='添加一句话再发送...';inp.focus();}
      if(typeof showToast==='function')showToast('已放入引用栏');
      return;
    }
    if(type==='delete'){
      items.forEach(deleteBubble);
      const deleted=count;
      convExitMultiSelect();
      if(typeof window.convAttachMessageActions==='function')convAttachMessageActions();
      if(typeof window.convUpdateBodyPadding==='function')convUpdateBodyPadding();
      if(typeof showToast==='function')showToast('已删除 '+deleted+' 条');
    }
  };
  document.addEventListener('click',function(e){
    if(!window.CONV_STATE||!CONV_STATE.multiSelect)return;
    const bubble=selectableFromTarget(e.target);
    if(!bubble)return;
    e.preventDefault();
    e.stopPropagation();
    if(e.stopImmediatePropagation)e.stopImmediatePropagation();
    window.convToggleSelectBubble(bubble);
  },true);
  const oldShow=window.chatShowMsg;
  if(typeof oldShow==='function'){
    window.chatShowMsg=function(name){
      oldShow(name);
      setTimeout(function(){ensureMultiBar();updateUI();},0);
    };
  }
  setTimeout(function(){ensureMultiBar();updateUI();},0);
})();
</script>

<script>
/* Step 13: my manual fake voice only; opponent voice follows context and is MiniMax-ready later. */
(function(){

  }
  function toast(msg){if(typeof showToast==='function')showToast(msg);}
  function durationFromText(text){
    var len=String(text||'').replace(/\s+/g,'').length;
    var sec=Math.max(2,Math.min(58,Math.round(len/3.6)+2));
    return '0:'+String(sec).padStart(2,'0');
  }
  function waveSvg(){
    return '<svg class="conv-voice-wave" viewBox="0 0 58 20" aria-hidden="true"><rect x="2" y="7" width="4" height="6" rx="2"/><rect x="12" y="4" width="4" height="12" rx="2"/><rect x="22" y="8" width="4" height="4" rx="2"/><rect x="32" y="3" width="4" height="14" rx="2"/><rect x="42" y="6" width="4" height="8" rx="2"/><rect x="52" y="9" width="4" height="2" rx="2"/></svg>';
  }
  function transcriptIcon(open){
    if(open){
      return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 15l6-6 6 6"/></svg>';
    }
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 7h14"/><path d="M5 12h10"/><path d="M5 17h7"/></svg>';
  }
  function voiceBubbleHTML(side,text,open){
    var raw=htmlEsc(text||'');
    var safe=raw.replace(/\n/g,'<br>');
    var dur=durationFromText(text);
    var sent=side==='sent';
    var openClass=open?' transcribed':'';
    return '<div class="conv-bubble '+(sent?'sent-single':'recv-single')+' conv-voice-bubble'+openClass+'" data-msg-text="'+raw+'" data-msg-transcript="'+raw+'" data-msg-side="'+(sent?'sent':'recv')+'" data-msg-type="voice" data-audio-status="silent-simulated" data-audio-provider="minimax-pending" onclick="convToggleVoicePlay(event,this)">'+
      '<div class="conv-voice-line">'+waveSvg()+'<span class="conv-voice-time">'+htmlEsc(dur)+'</span><button type="button" class="conv-voice-transcribe-btn" aria-label="转文字" title="转文字" onclick="convToggleVoiceTranscript(event,this)">'+transcriptIcon(false)+'</button></div>'+
      '<div class="conv-voice-transcript">'+safe+'</div>'+
    '</div>';
  }
  function contactAvatarHTML(){
    var left=document.querySelector('#conv-overlay .conv-av-left');
    return left?(left.innerHTML||'AI'):'AI';
  }
  function myAvatarHTML(){
    var myAvatar='';
    try{myAvatar=(typeof XSJ!=='undefined'&&XSJ.get)?XSJ.get(XSJ.AVATAR,''):'';}catch(e){}
    return myAvatar?'<img src="'+htmlEsc(myAvatar)+'" alt="">':'我';
  }
  function appendGroup(side,bubbleHTML){
    var body=document.getElementById('conv-body');
    if(!body)return null;
    var sent=side==='sent';
    var group=document.createElement('div');
    group.className='conv-group'+(sent?' sent':'');
    var av=sent?myAvatarHTML():contactAvatarHTML();
    group.innerHTML='<div class="conv-group-av"'+(sent?' style="background:#2C2C2E;color:#fff;"':'')+'>'+av+'</div><div class="conv-group-bubbles">'+bubbleHTML+'</div>';
    body.appendChild(group);
    if(typeof convAttachMessageActions==='function')convAttachMessageActions();
    if(typeof convUpdateBodyPadding==='function')convUpdateBodyPadding();
    body.scrollTop=body.scrollHeight;
    return group;
  }
  function lastSentText(){
    var nodes=[].slice.call(document.querySelectorAll('#conv-overlay .conv-group.sent .conv-bubble, #conv-overlay .conv-group.sent .conv-media-bubble, #conv-overlay .conv-group.sent .conv-voice-bubble'));
    var last=nodes[nodes.length-1];
    if(!last)return '';
    if(typeof convGetBubbleMainText==='function')return convGetBubbleMainText(last)||'';
    return (last.dataset&&last.dataset.msgText)||last.textContent||'';
  }
  function contextWantsVoice(text){
    text=String(text||'');
    return /语音|声音|说给我听|说一下|说句话|想听|听你|发个音|讲给我|念一下|读给我/.test(text);
  }
  function aiTextReply(context){
    var replies=[
      '我在，你慢慢说。',
      '嗯，我听着。你不用急着整理好再讲。',
      '可以，我们就按你舒服的节奏来。',
      '这句话我记住了。',
      '我懂你的意思，会一直陪着你。'
    ];
    if(/累|难受|崩溃|烦|委屈|不开心/.test(context||''))return '先不用撑着，我陪你安静待一会儿。';
    if(/睡|晚安|困/.test(context||''))return '那就慢慢放松下来，我在这里陪你。';
    return replies[Math.floor(Math.random()*replies.length)];
  }
  function aiVoiceReply(context){
    if(/晚安|睡|困/.test(context||''))return '晚安，我在。你可以安心睡一会儿。';
    if(/累|难受|不开心|委屈/.test(context||''))return '我听见了。先别急着解释，我陪你。';
    if(/想听|声音|语音|说/.test(context||''))return '嗯，我用语音陪你一下。你慢慢说，我在听。';
    return '我在这里。你说什么都可以。';
  }
  function showTyping(){
    if(typeof convShowAiTyping==='function')return convShowAiTyping();
    var bubble='<div class="conv-bubble recv-single conv-typing-bubble" data-msg-text="正在输入" data-msg-side="recv" data-msg-type="typing"><span class="conv-typing-dot"></span><span class="conv-typing-dot"></span><span class="conv-typing-dot"></span></div>';
    return appendGroup('recv',bubble);
  }

  window.convOpenVoiceComposer=function(side,options){
    options=options||{};
    if(window.CONV_STATE&&CONV_STATE.plusOpen&&typeof convTogglePlus==='function')convTogglePlus(false);
    document.querySelectorAll('.conv-voice-sheet,.conv-voice-sheet-backdrop').forEach(function(el){el.remove();});
    var editing=!!(options.bubble&&options.bubble.isConnected);
    var isRecv=editing && options.bubble.closest('.conv-group') && !options.bubble.closest('.conv-group').classList.contains('sent');
    if(isRecv){toast('对方语音会根据语境生成，不能手动控制');return;}
    var initialText=editing?((options.bubble.dataset&&options.bubble.dataset.msgTranscript)||((typeof convGetBubbleMainText==='function')?convGetBubbleMainText(options.bubble):'')):'';
    if(window.CONV_STATE)CONV_STATE.voiceDraft={side:'sent',editBubble:editing?options.bubble:null};
    var backdrop=document.createElement('div');
    backdrop.className='conv-voice-sheet-backdrop';
    backdrop.onclick=convCloseVoiceComposer;
    var sheet=document.createElement('div');
    sheet.className='conv-voice-sheet';
    sheet.innerHTML='<div class="conv-voice-sheet-handle"></div>'+
      '<div class="conv-voice-sheet-head"><div><div class="conv-voice-sheet-title">'+(editing?'修改我的语音':'发送我的语音')+'</div><div class="conv-voice-sheet-note">输入内容会作为语音转文字展示，暂不生成真实声音</div></div><div class="conv-voice-sheet-close" onclick="convCloseVoiceComposer()" aria-label="关闭"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></div></div>'+
      '<textarea id="conv-voice-draft-field" class="conv-voice-draft-field" placeholder="输入要说出的内容..." oninput="convVoiceDraftChanged()">'+htmlEsc(initialText)+'</textarea>'+
      '<div class="conv-voice-sheet-meta"><span>发送后显示为语音气泡，可展开转文字。</span><span id="conv-voice-estimate" class="conv-voice-estimate">'+durationFromText(initialText)+'</span></div>'+
      '<div class="conv-voice-sheet-actions"><button type="button" class="conv-voice-action cancel" onclick="convCloseVoiceComposer()">取消</button><button type="button" class="conv-voice-action send" onclick="convSubmitVoiceComposer()">'+(editing?'保存':'发送')+'</button></div>';
    document.body.appendChild(backdrop);document.body.appendChild(sheet);
    requestAnimationFrame(function(){backdrop.classList.add('show');sheet.classList.add('show');});
    setTimeout(function(){var f=document.getElementById('conv-voice-draft-field');if(f){f.focus();f.setSelectionRange(f.value.length,f.value.length);if(typeof convVoiceDraftChanged==='function')convVoiceDraftChanged();}},60);
  };
  window.convCloseVoiceComposer=function(){
    document.querySelectorAll('.conv-voice-sheet,.conv-voice-sheet-backdrop').forEach(function(el){el.classList.remove('show');setTimeout(function(){if(el&&el.isConnected)el.remove();},160);});
  };
  window.convVoiceDraftChanged=function(){
    var field=document.getElementById('conv-voice-draft-field');
    var est=document.getElementById('conv-voice-estimate');
    if(field){field.style.height='88px';field.style.height=Math.min(148,Math.max(88,field.scrollHeight))+'px';}
    if(est)est.textContent=durationFromText(field?field.value:'');
  };
  window.convSubmitVoiceComposer=function(){
    var field=document.getElementById('conv-voice-draft-field');
    var text=(field&&field.value?field.value:'').trim();
    if(!text){toast('请输入语音内容');return;}
    var editBubble=window.CONV_STATE&&CONV_STATE.voiceDraft&&CONV_STATE.voiceDraft.editBubble;
    if(editBubble&&editBubble.isConnected){
      var open=editBubble.classList.contains('transcribed');
      var wrap=document.createElement('div');
      wrap.innerHTML=voiceBubbleHTML('sent',text,open);
      editBubble.replaceWith(wrap.firstElementChild);
      toast('已保存语音');
    }else{
      appendGroup('sent',voiceBubbleHTML('sent',text,false));
      toast('已发送语音');
    }
    convCloseVoiceComposer();
    if(typeof convUpdateBodyPadding==='function')convUpdateBodyPadding();
  };
  window.convToggleVoiceTranscript=function(e,btn){
    if(e){e.preventDefault();e.stopPropagation();}
    var bubble=btn&&btn.closest?btn.closest('.conv-voice-bubble'):null;
    if(!bubble)return;
    var open=!bubble.classList.contains('transcribed');
    bubble.classList.toggle('transcribed',open);
    btn.innerHTML=transcriptIcon(open);
    btn.setAttribute('aria-label',open?'收起转文字':'转文字');
    btn.setAttribute('title',open?'收起':'转文字');
    if(typeof convUpdateBodyPadding==='function')convUpdateBodyPadding();
  };
  window.convToggleVoicePlay=function(e,bubble){
    if(e&&e.target&&e.target.closest&&e.target.closest('.conv-voice-transcribe-btn'))return;
    if(!bubble)return;
    bubble.classList.toggle('playing');
    if(bubble.classList.contains('playing'))setTimeout(function(){if(bubble&&bubble.isConnected)bubble.classList.remove('playing');},1400);
  };

  var oldGetText=window.convGetBubbleMainText;
  window.convGetBubbleMainText=function(bubble){
    if(bubble&&bubble.dataset&&bubble.dataset.msgType==='voice')return (bubble.dataset.msgTranscript||bubble.dataset.msgText||'[语音]').trim();
    return typeof oldGetText==='function'?oldGetText(bubble):'';
  };
  var oldStartEdit=window.convStartEdit;
  window.convStartEdit=function(bubble){
    if(bubble&&bubble.dataset&&bubble.dataset.msgType==='voice'){
      var isSent=bubble.closest('.conv-group')&&bubble.closest('.conv-group').classList.contains('sent');
      if(!isSent){toast('对方语音会根据语境生成，不能手动控制');return;}
      convOpenVoiceComposer('sent',{bubble:bubble});return;
    }
    if(typeof oldStartEdit==='function')oldStartEdit(bubble);
  };

  window.convSendAiReply=function(){
    if(window.CONV_STATE&&CONV_STATE.plusOpen&&typeof convTogglePlus==='function')convTogglePlus(false);
    var status=document.querySelector('#conv-overlay .conv-nav-status');
    var oldStatus=status?status.textContent:'';
    if(status)status.textContent='typing';
    var typing=showTyping();
    var context=lastSentText();
    var shouldVoice=contextWantsVoice(context);
    setTimeout(function(){
      if(typing&&typing.isConnected)typing.remove();
      if(status)status.textContent=oldStatus||'online';
      if(shouldVoice){
        appendGroup('recv',voiceBubbleHTML('recv',aiVoiceReply(context),false));
        toast('对方发来语音');
      }else{
        var text=aiTextReply(context);
        var bubble='<div class="conv-bubble recv-single" data-msg-text="'+htmlEsc(text)+'" data-msg-side="recv"><div class="conv-bubble-main">'+htmlEsc(text)+'</div></div>';
        appendGroup('recv',bubble);
      }
      if(typeof convAttachMessageActions==='function')convAttachMessageActions();
    },760);
  };
  var oldAction=window.convAction;
  window.convAction=function(key,label){
    if(key==='voice-msg'||key==='voice-call'){convOpenVoiceComposer('sent');return;}
    if(key==='receive-voice'){toast('对方语音会根据语境自动出现');return;}
    if(key==='receive-message'){convSendAiReply();return;}
    if(typeof oldAction==='function')oldAction(key,label);
  };
})();
</script>

    if(bubble&&bubble.dataset&&bubble.dataset.msgType==='camera-desc'){
      var isSent=bubble.closest('.conv-group')&&bubble.closest('.conv-group').classList.contains('sent');
      if(!isSent){toast('对方画面描述由语境生成，不能手动控制');return;}
      convOpenCameraComposer({bubble:bubble});return;
    }
    if(typeof oldStartEdit==='function')oldStartEdit(bubble);
  };
  var oldAi=window.convSendAiReply;
  window.convSendAiReply=function(){
    var context=lastSentText();
    if(wantsVisual(context) && !/语音|声音|听你|说给我听/.test(context)){
      closePlus();
      var status=document.querySelector('#conv-overlay .conv-nav-status');
      var oldStatus=status?status.textContent:'';
      if(status)status.textContent='typing';
      var typing=showTyping();
      setTimeout(function(){
        if(typing&&typing.isConnected)typing.remove();
        if(status)status.textContent=oldStatus||'online';
        appendGroup('recv',cameraBubbleHTML('recv',visualReply(context),'ai-visual'),'conv-camera-desc-group');
        toast('对方发来画面描述');
      },720);
      return;
    }
    if(typeof oldAi==='function')return oldAi();
  };
  var oldAction=window.convAction;
  window.convAction=function(key,label){
    if(key==='camera'){
      convOpenCameraComposer();
      return;
    }
    if(key==='photos'){
      closePlus();
      if(typeof convOpenPhotoPicker==='function'){convOpenPhotoPicker();return;}
      var input=document.getElementById('conv-photo-input');
      if(input){input.click();return;}
    }
    if(key==='receive-image'||key==='ai-image'){
      toast('AI 后续可按语境发送画面描述，不直接发送真实图片');
      return;
    }
    if(typeof oldAction==='function')oldAction(key,label);
  };
  var oldChatShow=window.chatShowMsg;
  if(typeof oldChatShow==='function'){
    window.chatShowMsg=function(name){
      oldChatShow(name);
      setTimeout(function(){
        document.querySelectorAll('#conv-overlay .conv-plus-item').forEach(function(item){
          var label=item.querySelector('.conv-plus-label');
          if(label&&label.textContent.trim()==='拍照')item.setAttribute('title','拍照描述，不上传真实图片');
        });
      },0);
    };
  }
})();
</script>

/* ════════════════════════════════════════════
   FIX 3: MULTI-SELECT MODE
   ════════════════════════════════════════════ */

/* Multi-mode: redefine the selection rail since avatars are hidden.
   Body widens, group gets left/right padding to make room for selection circles.
   Selection circles sit just outside the bubble. */
#conv-overlay.conv-overlay.multi-mode{
  --conv-select-rail:26px!important;
  --conv-msg-av:0px!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-body{
  padding-left:8px!important;
  padding-right:8px!important;
  padding-bottom:140px!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-group{
  position:relative!important;
  padding:0!important;
  transition:padding .18s ease!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-group:not(.sent){
  padding-left:32px!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-group.sent{
  padding-right:32px!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-group-bubbles{
  max-width:74%!important;
}

/* Selection circle — sit just outside the bubble's outer edge */
#conv-overlay.conv-overlay.multi-mode .conv-bubble{
  position:relative!important;
  transform:none!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-bubble::after{
  content:''!important;
  position:absolute!important;
  top:50%!important;
  width:20px!important;height:20px!important;
  border-radius:50%!important;
  background:rgba(0,0,0,0.08)!important;
  border:none!important;
  box-shadow:none!important;
  box-sizing:border-box!important;
  transform:translateY(-50%)!important;
}
/* RECV: circle on the LEFT, just outside the bubble's left edge */
#conv-overlay.conv-overlay.multi-mode .conv-group:not(.sent) .conv-bubble::after{
  left:-26px!important;
  right:auto!important;
}
/* SENT: circle on the RIGHT, just outside the bubble's right edge */
#conv-overlay.conv-overlay.multi-mode .conv-group.sent .conv-bubble::after{
  right:-26px!important;
  left:auto!important;
}
/* Selected state — filled graphite with white inner ring */
#conv-overlay.conv-overlay.multi-mode .conv-bubble.conv-selected::after{
  background:#525252!important;
  border:none!important;
  box-shadow:inset 0 0 0 5px #ffffff,inset 0 0 0 6px #525252!important;
}
/* Hide any legacy ::before checkmark positioning */
#conv-overlay.conv-overlay.multi-mode .conv-bubble::before{
  display:none!important;
}
/* Bubble fade for unselected */
#conv-overlay.conv-overlay.multi-mode .conv-bubble:not(.conv-selected){
  opacity:.7!important;
}
#conv-overlay.conv-overlay.multi-mode .conv-bubble.conv-selected{
  opacity:1!important;filter:none!important;
}

#conv-overlay.conv-overlay .conv-multi-bar,
#conv-multi-bar.conv-multi-bar{
  background:#ffffff!important;

/* XSJ Advanced UI Layer - additive premium pages */
.xsj-page-root{width:100%;min-height:100%;display:flex;flex-direction:column;gap:18px;color:var(--text);font-family:'Quicksand','PingFang SC','Helvetica Neue',Arial,sans-serif;}
.xsj-page-root *{box-sizing:border-box;}
.xsj-app-head{display:flex;flex-direction:column;gap:6px;margin:0 0 2px;}
.xsj-kicker{font-size:10px;letter-spacing:2.6px;text-transform:uppercase;color:var(--text-muted);font-weight:600;}
.xsj-title-row{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;}
.xsj-title{font-size:30px;line-height:1;font-weight:520;letter-spacing:-1px;color:var(--text);}
.xsj-title-sub{font-size:12px;line-height:1.6;color:var(--text-tertiary);margin-top:2px;}
.xsj-head-action{height:32px;padding:0 13px;border-radius:16px;background:var(--layer-1);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;}
.xsj-segment{display:flex;gap:4px;background:var(--layer-1);border-radius:18px;padding:4px;width:100%;}
.xsj-seg-item{flex:1;min-height:32px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:620;color:var(--text-tertiary);cursor:pointer;}
.xsj-seg-item.active{background:var(--bg);color:var(--text);}
.xsj-chip-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:1px;}
.xsj-chip-row::-webkit-scrollbar{display:none;}
.xsj-chip{height:30px;padding:0 13px;border-radius:15px;background:var(--layer-1);display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:590;color:var(--text-secondary);white-space:nowrap;flex-shrink:0;}
.xsj-chip.active{background:var(--text);color:var(--bg);}
.xsj-hero{background:linear-gradient(145deg,var(--layer-1),var(--bg));border-radius:26px;padding:20px;display:flex;flex-direction:column;gap:16px;overflow:hidden;position:relative;}
.xsj-hero::after{content:'';position:absolute;right:-42px;top:-50px;width:130px;height:130px;border-radius:50%;background:var(--layer-2);opacity:.55;pointer-events:none;}
.xsj-hero > *{position:relative;z-index:1;}
.xsj-hero-title{font-size:21px;font-weight:560;letter-spacing:-.3px;color:var(--text);}
.xsj-hero-desc{font-size:12.5px;line-height:1.65;color:var(--text-tertiary);max-width:88%;}
.xsj-hero-meta{display:flex;gap:8px;flex-wrap:wrap;}
.xsj-card{background:var(--layer-1);border-radius:22px;padding:16px;position:relative;overflow:hidden;}
.xsj-card.soft{background:var(--layer-2);}
.xsj-card.tight{padding:12px;border-radius:18px;}
.xsj-section{display:flex;flex-direction:column;gap:10px;}
.xsj-section-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px;}
.xsj-section-title{font-size:14px;font-weight:650;color:var(--text);}

<!-- XSJ V10: worldbook-only UI refinement + original pet SVG restoration. Additive patch. -->
<style id="xsj-v10-worldbook-pet-patch">
/* Pet icon restoration: use original file SVG and force white in app icon only */
.dock .app-icon-wrap[onclick*="openApp('pet')"] .app-icon-box,
.dock .app-icon-wrap[onclick*='openApp("pet")'] .app-icon-box{color:#777!important;}
.dock .app-icon-wrap[onclick*="openApp('pet')"] .app-icon-box svg,
.dock .app-icon-wrap[onclick*='openApp("pet")'] .app-icon-box svg,
.dock .app-icon-wrap[onclick*="openApp('pet')"] .app-icon-box svg path,
.dock .app-icon-wrap[onclick*='openApp("pet")'] .app-icon-box svg path{fill:currentColor!important;stroke:none!important;color:inherit!important;}
.xsj-pet-original-inline{fill:currentColor!important;stroke:none!important;}
.xsj-pet-original-dock{fill:currentColor!important;stroke:none!important;}

/* Worldbook v10, scoped only to the worldbook app */
.xsj-wb10{display:flex;flex-direction:column;gap:14px;padding-bottom:24px;color:var(--text);font-family:'Quicksand',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;}
.xsj-wb10 *{box-sizing:border-box;}
.xsj-wb10-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:4px 2px 2px;}
.xsj-wb10-kicker{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:7px;}
.xsj-wb10-title{font-size:34px;line-height:1;font-weight:600;letter-spacing:-1.6px;color:var(--text);}
.xsj-wb10-desc{font-size:12.5px;line-height:1.72;color:var(--text-tertiary);margin-top:10px;max-width:330px;}
.xsj-wb10-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.xsj-wb10-iconbtn{width:38px;height:38px;border-radius:19px;background:var(--layer-1);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);cursor:pointer;transition:opacity .18s ease,background .18s ease;}
.xsj-wb10-iconbtn:active{opacity:.58;}
.xsj-wb10-iconbtn.dark{background:var(--text);color:var(--bg);}
.xsj-wb10-svg{width:19px;height:19px;display:block;fill:none;stroke:currentColor;stroke-width:1.55;stroke-linecap:round;stroke-linejoin:round;}
.xsj-wb10-seg{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--layer-1);border-radius:22px;padding:4px;margin-top:2px;}
.xsj-wb10-seg button{border:0;background:transparent;border-radius:18px;height:38px;font-family:inherit;font-size:13px;font-weight:600;color:var(--text-tertiary);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.xsj-wb10-seg button.active{background:var(--bg);color:var(--text);}
.xsj-wb10-mini-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 0;}
.xsj-wb10-mini-tabs::-webkit-scrollbar{display:none;}
.xsj-wb10-chip{border:0;background:var(--layer-1);color:var(--text-secondary);border-radius:999px;padding:8px 12px;font-size:11.5px;font-weight:600;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;cursor:pointer;}
.xsj-wb10-chip.active{background:var(--text);color:var(--bg);}
.xsj-wb10-hero{border-radius:32px;background:linear-gradient(180deg,var(--layer-1),var(--bg));padding:18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:end;overflow:hidden;position:relative;}
.xsj-wb10-hero:before{content:'';position:absolute;right:-56px;top:-64px;width:180px;height:180px;border-radius:50%;background:var(--layer-2);opacity:.48;}
.xsj-wb10-hero>*{position:relative;z-index:1;}
.xsj-wb10-hero-title{font-size:21px;font-weight:650;letter-spacing:-.5px;color:var(--text);}
.xsj-wb10-hero-copy{font-size:12.5px;line-height:1.72;color:var(--text-tertiary);margin-top:9px;max-width:320px;}
.xsj-wb10-read-stack{display:flex;flex-direction:column;gap:7px;align-items:flex-end;}
.xsj-wb10-read-pill{font-size:11px;color:var(--text-secondary);background:var(--layer-1);border-radius:999px;padding:7px 10px;white-space:nowrap;}
.xsj-wb10-read-pill.strong{background:var(--text);color:var(--bg);}
.xsj-wb10-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.xsj-wb10-grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.xsj-wb10-card{background:var(--layer-1);border-radius:26px;padding:15px;position:relative;overflow:hidden;}
.xsj-wb10-card.soft{background:var(--bg);box-shadow:inset 0 0 0 1px rgba(0,0,0,.025);}
.xsj-wb10-card-title{font-size:15px;font-weight:650;color:var(--text);line-height:1.25;}
.xsj-wb10-card-sub{font-size:11.5px;line-height:1.58;color:var(--text-tertiary);margin-top:6px;}
.xsj-wb10-stat{font-size:27px;line-height:1;font-weight:650;letter-spacing:-.8px;color:var(--text);margin-top:14px;}
.xsj-wb10-stat-label{font-size:11px;color:var(--text-muted);margin-top:5px;}
.xsj-wb10-section{display:flex;flex-direction:column;gap:10px;}
.xsj-wb10-section-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px;}
.xsj-wb10-section-title{font-size:15px;font-weight:650;color:var(--text);}
.xsj-wb10-section-more{font-size:11.5px;color:var(--text-tertiary);cursor:pointer;}
.xsj-wb10-book-list{display:flex;flex-direction:column;gap:9px;}
.xsj-wb10-book{background:var(--layer-1);border-radius:24px;padding:13px;display:grid;grid-template-columns:42px 1fr auto;gap:11px;align-items:center;cursor:pointer;}
.xsj-wb10-book:active{opacity:.62;}
.xsj-wb10-mark{width:42px;height:42px;border-radius:16px;background:var(--layer-2);display:flex;align-items:center;justify-content:center;color:var(--text-secondary);}
.xsj-wb10-book-name{font-size:14px;font-weight:650;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.xsj-wb10-book-meta{font-size:11px;color:var(--text-tertiary);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.xsj-wb10-book-tags{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap;}
.xsj-wb10-tag{font-size:10px;line-height:1;background:var(--bg);border-radius:999px;padding:5px 7px;color:var(--text-tertiary);}
.xsj-wb10-status{font-size:11px;color:var(--text-secondary);background:var(--bg);border-radius:999px;padding:7px 9px;white-space:nowrap;}
.xsj-wb10-entry{background:var(--layer-1);border-radius:22px;padding:13px;display:grid;grid-template-columns:1fr auto;gap:8px;}
.xsj-wb10-entry-title{font-size:13.5px;font-weight:650;color:var(--text);}
.xsj-wb10-entry-copy{font-size:11.5px;line-height:1.65;color:var(--text-tertiary);margin-top:6px;}
.xsj-wb10-depth{display:flex;gap:4px;margin-top:9px;}
.xsj-wb10-depth span{height:6px;flex:1;border-radius:999px;background:var(--layer-2);}
.xsj-wb10-depth span.on{background:var(--text-tertiary);}
.xsj-wb10-form{background:var(--layer-1);border-radius:30px;padding:16px;display:flex;flex-direction:column;gap:12px;}
.xsj-wb10-field{display:flex;flex-direction:column;gap:6px;}
.xsj-wb10-label{font-size:11px;font-weight:650;color:var(--text-tertiary);letter-spacing:.35px;}
.xsj-wb10-input,.xsj-wb10-textarea,.xsj-wb10-select{width:100%;border:0;outline:0;background:var(--bg);border-radius:17px;padding:12px 13px;font-family:inherit;font-size:13px;color:var(--text);}
.xsj-wb10-textarea{min-height:104px;resize:none;line-height:1.62;}
.xsj-wb10-choice-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.xsj-wb10-choice{background:var(--bg);border-radius:18px;padding:12px;display:flex;align-items:center;gap:9px;color:var(--text-secondary);font-size:12px;font-weight:600;}
.xsj-wb10-choice.active{background:var(--text);color:var(--bg);}
.xsj-wb10-slider{background:var(--bg);border-radius:20px;padding:13px;}
.xsj-wb10-slider-top{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text-secondary);font-weight:600;}
.xsj-wb10-style-preview{background:var(--layer-1);border-radius:30px;padding:18px;font-family:'Georgia','Times New Roman','Songti SC',serif;color:var(--text-secondary);line-height:1.92;font-size:13.5px;}
.xsj-wb10-style-preview b{font-family:'Quicksand','PingFang SC',sans-serif;color:var(--text);font-size:12px;letter-spacing:.4px;}
.xsj-wb10-style-card{background:var(--layer-1);border-radius:24px;padding:15px;display:flex;flex-direction:column;gap:10px;}
.xsj-wb10-style-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.xsj-wb10-style-title{font-size:15px;font-weight:650;color:var(--text);}
.xsj-wb10-style-mode{font-size:10.5px;color:var(--text-tertiary);background:var(--bg);border-radius:999px;padding:6px 8px;white-space:nowrap;}
.xsj-wb10-btnrow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.xsj-wb10-btn{border:0;border-radius:20px;height:44px;background:var(--text);color:var(--bg);font-family:inherit;font-size:13px;font-weight:650;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;}
.xsj-wb10-btn.ghost{background:var(--bg);color:var(--text-secondary);}
.xsj-wb10-note{font-size:11.5px;line-height:1.65;color:var(--text-tertiary);background:var(--layer-1);border-radius:22px;padding:13px;}
@media(max-width:430px){.xsj-wb10-title{font-size:30px}.xsj-wb10-hero{grid-template-columns:1fr}.xsj-wb10-read-stack{align-items:flex-start;flex-direction:row;flex-wrap:wrap}.xsj-wb10-grid2{gap:8px}.xsj-wb10-book{grid-template-columns:40px 1fr}.xsj-wb10-status{grid-column:2;justify-self:start}.xsj-wb10-choice-grid{grid-template-columns:1fr}}
@media(prefers-color-scheme:dark){.xsj-wb10-card.soft{box-shadow:inset 0 0 0 1px rgba(255,255,255,.025)}.xsj-wb10-seg button.active,.xsj-wb10-tag,.xsj-wb10-status,.xsj-wb10-choice,.xsj-wb10-input,.xsj-wb10-textarea,.xsj-wb10-select,.xsj-wb10-slider,.xsj-wb10-btn.ghost,.xsj-wb10-style-mode{background:var(--layer-2)}}
</style>

  function renderEntries(){return '<div class="xsj-wb10-hero"><div><div class="xsj-wb10-hero-title">城市日常世界</div><div class="xsj-wb10-hero-copy">一个世界书可以拥有多个条目。每个条目都可以单独设置关键词、优先级、触发方式、注入深度和适用角色。</div></div><div class="xsj-wb10-read-stack"><span class="xsj-wb10-read-pill strong">42 条目</span><span class="xsj-wb10-read-pill">全局</span></div></div>'+section('条目','新建条目','<div class="xsj-wb10-book-list">'+entryCard('便利店门口','关键词：雨天、便利店、晚饭。触发后补充角色在雨天的行为习惯。','深度 4',4)+entryCard('关系边界','角色在靠近前会先观察用户情绪，不突然推进亲密关系。','深度 3',3)+entryCard('城市白色街区','位置卡片或线下模式触发，用于生成街区、灯光、回家路线。','深度 2',2)+'</div>')+'<div class="xsj-wb10-btnrow"><button class="xsj-wb10-btn ghost" onclick="xsjWB10Mode(\'book\')">返回总览</button><button class="xsj-wb10-btn">'+icon('plus')+'新建条目</button></div>';}

  function renderStyle(){return '<div class="xsj-wb10-hero"><div></div><div class="xsj-wb10-read-stack"><span class="xsj-wb10-read-pill strong">线下模式</span><span class="xsj-wb10-read-pill">旁白/心声/对话</span></div></div><div class="xsj-wb10-style-preview"><b>旁白</b><br>雨停得很慢，楼下的灯把水痕照得发白。<br><br><b>对话</b><br>先上去吧，别站在风口。<br><br><b>心声</b><br>他其实还想问你今天为什么突然安静。</div>'+section('预设列表','新建预设','<div class="xsj-wb10-book-list"><div class="xsj-wb10-style-card"><div class="xsj-wb10-style-head"><div class="xsj-wb10-style-title">日常细腻</div><div class="xsj-wb10-style-mode">线下模式</div></div><div class="xsj-wb10-card-sub">旁白克制、对话自然、心声少量出现，适合长篇日常剧情。</div><div class="xsj-wb10-book-tags"><span class="xsj-wb10-tag">旁白柔和</span><span class="xsj-wb10-tag">短句对话</span><span class="xsj-wb10-tag">低解释</span></div></div><div class="xsj-wb10-style-card"><div class="xsj-wb10-style-head"><div class="xsj-wb10-style-title">论坛体叙事</div><div class="xsj-wb10-style-mode">线下模式</div></div><div class="xsj-wb10-card-sub">用于生成论坛围观、路人评论、角色转发讨论等内容。</div><div class="xsj-wb10-book-tags"><span class="xsj-wb10-tag">多视角</span><span class="xsj-wb10-tag">路人感</span><span class="xsj-wb10-tag">评论区</span></div></div></div>')+'<div class="xsj-wb10-form"><div class="xsj-wb10-section-title">新建文风预设</div><input class="xsj-wb10-input" value="新的线下文风"><textarea class="xsj-wb10-textarea">旁白风格、心声风格、动作描写、对话长度、禁止使用的句式都可以写在这里。</textarea><div class="xsj-wb10-note">这个预设不会用于普通聊天，只会在线下模式生成长篇剧情时读取。</div><div class="xsj-wb10-btnrow"><button class="xsj-wb10-btn ghost">测试片段</button><button class="xsj-wb10-btn">保存预设</button></div></div>';}

<!-- XSJ V11: worldbook empty-state UI + category/modal logic. Additive only; other apps unchanged. -->
<style id="xsj-v11-worldbook-logic-style">
.xsj-wb11{display:flex;flex-direction:column;gap:14px;padding-bottom:28px;color:var(--text);font-family:'Quicksand',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;}
.xsj-wb11 *{box-sizing:border-box;}

.xsj-wb11-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:2px 2px 0;}
.xsj-wb11-kicker{font-size:10px;letter-spacing:2.4px;text-transform:uppercase;color:var(--text-muted);font-weight:650;margin-bottom:7px;}
.xsj-wb11-title{font-size:34px;line-height:1;font-weight:650;letter-spacing:-1.5px;color:var(--text);}
.xsj-wb11-desc{font-size:12.5px;line-height:1.72;color:var(--text-tertiary);margin-top:10px;max-width:350px;}
.xsj-wb11-head-actions{display:flex;gap:8px;flex-shrink:0;}
.xsj-wb11-iconbtn{width:38px;height:38px;border-radius:20px;background:var(--layer-1);color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .18s ease,transform .18s ease;}
.xsj-wb11-iconbtn:active{opacity:.55;transform:scale(.98);}

<script id="xsj-wb11-modal-clarity-script">
(function(){
  function q(s,r){return (r||document).querySelector(s);}
  function qa(s,r){return Array.prototype.slice.call((r||document).querySelectorAll(s));}
  function markField(el,label){if(el&&!el.getAttribute('data-step'))el.setAttribute('data-step',label);}
  function organize(){
    var modal=document.getElementById('xsj-wb11-modal');
    if(!modal)return;
    var sheet=q('.xsj-wb11-sheet',modal);
    if(!sheet)return;
    var isBook=!!q('#xsj-wb11-book-name',modal);
    var isStyle=!!q('#xsj-wb11-style-name',modal);
    if(!isBook&&!isStyle)return;
    sheet.classList.add('xsj-wb11-sheet-organized');
    if(isBook){
      var name=q('#xsj-wb11-book-name',modal);
      var type=q('[data-wb11-choice="type"]',modal);
      var cat=q('#xsj-wb11-book-category',modal);
      var trigger=q('[data-wb11-choice="trigger"]',modal);
      var depth=q('#xsj-wb11-depth',modal);
      var keywords=q('#xsj-wb11-book-keywords',modal);
      var active=q('#xsj-wb11-active',modal);
      markField(name&&name.closest('.xsj-wb11-field'),'01 \u57fa\u672c\u4fe1\u606f');
      markField(type&&type.closest('.xsj-wb11-field'),'02 \u4f7f\u7528\u8303\u56f4');
      markField(cat&&cat.closest('.xsj-wb11-field'),'03 \u5206\u7c7b\u5f52\u6863');
      markField(trigger&&trigger.closest('.xsj-wb11-field'),'04 \u89e6\u53d1\u65b9\u5f0f');
      markField(depth&&depth.closest('.xsj-wb11-range'),'05 \u6ce8\u5165\u6df1\u5ea6');
      markField(keywords&&keywords.closest('.xsj-wb11-field'),'06 \u9ed8\u8ba4\u5173\u952e\u8bcd');
      markField(active&&active.previousElementSibling,'07 \u542f\u7528\u72b6\u6001');
    }
    if(isStyle){
      var sName=q('#xsj-wb11-style-name',modal);
      var note=q('.xsj-wb11-mini-note',modal);
      var narration=q('#xsj-wb11-style-narration',modal);
      var dialogue=q('#xsj-wb11-style-dialogue',modal);
      var inner=q('#xsj-wb11-style-inner',modal);
      markField(sName&&sName.closest('.xsj-wb11-field'),'01 \u9884\u8bbe\u540d\u79f0');
      markField(note,'02 \u4f7f\u7528\u8bf4\u660e');
      markField(narration&&narration.closest('.xsj-wb11-field'),'03 \u65c1\u767d\u98ce\u683c');
      markField(dialogue&&dialogue.closest('.xsj-wb11-field'),'04 \u5bf9\u8bdd\u98ce\u683c');
      markField(inner&&inner.closest('.xsj-wb11-field'),'05 \u5fc3\u58f0\u548c\u52a8\u4f5c');
    }
    qa('.xsj-wb11-choice',modal).forEach(function(btn){btn.setAttribute('type','button');});
  }
  var mo=new MutationObserver(function(){setTimeout(organize,0);});
  mo.observe(document.documentElement,{childList:true,subtree:true});
  document.addEventListener('click',function(){setTimeout(organize,0);},true);
  setTimeout(organize,0);
})();
</script>

<script id="xsj-wb11-delete-confirm-v21">
(function(){
  var bypassDepth=0;
  function trashIcon(){
    return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6M14 11v6"/></svg>';
  }
  function closeConfirm(){
    var old=document.getElementById('xsj-delete-confirm-mask');
    if(old)old.remove();
  }
  window.xsjRunAfterDeleteConfirm=function(fn){
    bypassDepth++;
    try{if(typeof fn==='function')fn();}
    finally{bypassDepth=Math.max(0,bypassDepth-1);}
  };
  window.xsjShowDeleteConfirm=function(opts,onConfirm){
    closeConfirm();
    opts=opts||{};
    var mask=document.createElement('div');
    mask.id='xsj-delete-confirm-mask';
    mask.className='xsj-delete-confirm-mask';
    mask.innerHTML='<div class="xsj-delete-confirm-box" role="dialog" aria-modal="true">'
      +'<div class="xsj-delete-confirm-icon">'+trashIcon()+'</div>'
      +'<div class="xsj-delete-confirm-title">'+(opts.title||'确认删除')+'</div>'
      +'<div class="xsj-delete-confirm-copy">'+(opts.copy||'删除后无法恢复，为了避免误删，请再次确认。')+'</div>'
      +'<div class="xsj-delete-confirm-actions">'
      +'<button class="xsj-delete-confirm-btn cancel" type="button">取消</button>'
      +'<button class="xsj-delete-confirm-btn confirm" type="button">确认删除</button>'
      +'</div></div>';
    mask.addEventListener('click',function(e){if(e.target===mask)closeConfirm();});
    document.body.appendChild(mask);
    var cancel=mask.querySelector('.xsj-delete-confirm-btn.cancel');
    var confirm=mask.querySelector('.xsj-delete-confirm-btn.confirm');
    if(cancel)cancel.addEventListener('click',closeConfirm);
    if(confirm)confirm.addEventListener('click',function(){
      closeConfirm();
      window.xsjRunAfterDeleteConfirm(function(){if(typeof onConfirm==='function')onConfirm();});
    });
  };
  function wrapDelete(name,title,copy){
    var fn=window[name];
    if(typeof fn!=='function'||fn._xsjDeleteConfirmWrapped)return;
    var original=fn;
    var wrapped=function(){
      var args=Array.prototype.slice.call(arguments);
      if(bypassDepth>0)return original.apply(window,args);
      window.xsjShowDeleteConfirm({title:title,copy:copy},function(){original.apply(window,args);});
    };
    wrapped._xsjDeleteConfirmWrapped=true;
    wrapped._xsjOriginalDelete=original;
    window[name]=wrapped;
  }
  function wrapConvSingle(){
    if(typeof window.convDeleteMessageBubble!=='function'||window.convDeleteMessageBubble._xsjDeleteConfirmWrapped)return;
    var original=window.convDeleteMessageBubble;
    var wrapped=function(){
      var args=Array.prototype.slice.call(arguments);
      if(bypassDepth>0)return original.apply(window,args);
      window.xsjShowDeleteConfirm({title:'删除消息',copy:'这条消息删除后无法恢复，请确认是否继续。'},function(){original.apply(window,args);});
    };
    wrapped._xsjDeleteConfirmWrapped=true;
    wrapped._xsjOriginalDelete=original;
    window.convDeleteMessageBubble=wrapped;
    try{convDeleteMessageBubble=wrapped;}catch(e){}
  }
  function wrapMulti(){
    if(typeof window.convMultiAction!=='function'||window.convMultiAction._xsjDeleteConfirmWrapped)return;
    var convOriginal=window.convMultiAction;
    window.convMultiAction=function(type){
      var args=Array.prototype.slice.call(arguments);
      if(type==='delete'&&bypassDepth===0){
        return window.xsjShowDeleteConfirm({title:'删除消息',copy:'选中的消息删除后无法恢复，请确认是否继续。'},function(){convOriginal.apply(window,args);});
      }
      return convOriginal.apply(window,args);
    };
    window.convMultiAction._xsjDeleteConfirmWrapped=true;
  }
  function wrapAll(){
    wrapDelete('xsjWB11DeleteCategory','删除分类','分类删除后不会删除世界书，相关世界书会移动到未分类。');
    wrapDelete('xsjWB11DeleteBook','删除世界书','这个世界书和它下面的条目会一起删除，删除后无法恢复。');
    wrapDelete('xsjWB11DeleteEntry','删除条目','这个条目会从当前世界书里移除，删除后无法恢复。');
    wrapDelete('xsjWB11DeleteStyle','删除文风预设','这个文风预设会从线下模式预设列表里移除。');
    wrapConvSingle();
    wrapMulti();
  }
  wrapAll();
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',wrapAll);
  setTimeout(wrapAll,120);
  setTimeout(wrapAll,600);
})();
</script>

html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-sheet.xsj-wb11-sheet-organized .xsj-wb11-switch button.active,
html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-sheet .xsj-wb11-choice.active,
html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-sheet .xsj-wb11-switch button.active,
html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-sheet .xsj-wb11-btn:not(.ghost):not(.plain):not(.danger),
html body .xsj-wb11-modal-mask.show .xsj-wb11-sheet.xsj-wb11-sheet-organized .xsj-wb11-choice.active,
html body .xsj-wb11-modal-mask.show .xsj-wb11-sheet.xsj-wb11-sheet-organized .xsj-wb11-switch button.active,
html body .xsj-wb11-modal-mask.show .xsj-wb11-sheet .xsj-wb11-choice.active,
html body .xsj-wb11-modal-mask.show .xsj-wb11-sheet .xsj-wb11-switch button.active,
html body .xsj-wb11-modal-mask.show .xsj-wb11-sheet .xsj-wb11-btn:not(.ghost):not(.plain):not(.danger){
  background:#555555!important;
  background-color:#555555!important;
  color:#ffffff!important;
  border-color:transparent!important;
  box-shadow:none!important;
}
html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-choice.active svg,
html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-switch button.active svg,
html body #xsj-wb11-modal.xsj-wb11-modal-mask .xsj-wb11-btn:not(.ghost):not(.plain):not(.danger) svg,
html body .xsj-wb11-modal-mask.show .xsj-wb11-choice.active svg,
html body .xsj-wb11-modal-mask.show .xsj-wb11-switch button.active svg,
html body .xsj-wb11-modal-mask.show .xsj-wb11-btn:not(.ghost):not(.plain):not(.danger) svg{

html body #xsj-wb11-modal.xsj-wb11-modal-mask input[type="range"],
html body .xsj-wb11-modal-mask.show input[type="range"],
.xsj-wb11 .xsj-wb11-range input[type="range"]{

}
html body #xsj-wb11-modal.xsj-wb11-modal-mask input[type="range"]::-webkit-slider-thumb,
html body .xsj-wb11-modal-mask.show input[type="range"]::-webkit-slider-thumb{

}
html body #xsj-wb11-modal.xsj-wb11-modal-mask input[type="range"]::-moz-range-thumb,
html body .xsj-wb11-modal-mask.show input[type="range"]::-moz-range-thumb{

/* 2) Worldbook UI accent, also one step deeper. */

.xsj-wb11 .xsj-wb11-chip.active,

.xsj-wb11 .xsj-wb23-detail-actions .xsj-wb11-close:active{

@media(max-width:430px){
  .xsj-wb11 .xsj-wb23-detail-main{padding:12px!important;border-radius:17px!important;gap:8px!important;}
  .xsj-wb11 .xsj-wb23-detail-title{font-size:18.5px!important;}
  .xsj-wb11 .xsj-wb23-detail-meta{font-size:11px!important;}
  .xsj-wb11 .xsj-wb23-detail-preview{font-size:12px!important;margin-top:10px!important;line-height:1.58!important;}
  .xsj-wb11 .xsj-wb23-detail-actions .xsj-wb11-close{width:26px!important;height:26px!important;min-width:26px!important;}
}
</style>

<script id="xsj-wb26-force-modal-accent-script">
(function(){
  var ACCENT = '#555555';
  function forceModalAccent(){
    var modal = document.getElementById('xsj-wb11-modal');
    if(!modal) return;
    var active = modal.querySelectorAll('.xsj-wb11-choice.active,.xsj-wb11-switch button.active,.xsj-wb11-btn:not(.ghost):not(.plain):not(.danger)');
    active.forEach(function(el){
      el.style.setProperty('background', ACCENT, 'important');
      el.style.setProperty('background-color', ACCENT, 'important');
      el.style.setProperty('color', '#ffffff', 'important');
      el.style.setProperty('box-shadow', 'none', 'important');
      el.querySelectorAll('svg').forEach(function(svg){
        svg.style.setProperty('color', '#ffffff', 'important');
        svg.style.setProperty('stroke', '#ffffff', 'important');
      });
    });
    var inactive = modal.querySelectorAll('.xsj-wb11-choice:not(.active),.xsj-wb11-switch button:not(.active)');
    inactive.forEach(function(el){
      el.style.removeProperty('background');
      el.style.removeProperty('background-color');
      el.style.removeProperty('color');
      el.style.removeProperty('box-shadow');
    });
    modal.querySelectorAll('input[type="range"]').forEach(function(el){
      el.style.setProperty('accent-color', ACCENT, 'important');
    });
  }
  ['click','input','change'].forEach(function(evt){
    document.addEventListener(evt,function(e){
      if(e.target && e.target.closest && e.target.closest('#xsj-wb11-modal')){
        setTimeout(forceModalAccent,0);
      }
    },true);
  });
  var obs = new MutationObserver(function(){setTimeout(forceModalAccent,0);});
  obs.observe(document.documentElement,{childList:true,subtree:true,attributes:true,attributeFilter:['class','style']});
  window.xsjWB26ForceModalAccent = forceModalAccent;
  setTimeout(forceModalAccent,0);
})();
</script>

<script>
/* ── 键盘收起后视口恢复 ── */
(function(){
  /* iOS Safari / PWA: 输入框失焦时页面可能不回弹 */
  document.addEventListener('focusout', function(e){
    if(!e.target) return;
    var tag = e.target.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable){
      setTimeout(function(){ window.scrollTo(0,0); }, 80);
    }
  }, true);

  /* 利用 visualViewport 监测键盘收起 */
  if(window.visualViewport){
    var vv = window.visualViewport;
    var baseH = vv.height;
    var kbUp = false;
    vv.addEventListener('resize', function(){
      if(vv.height < baseH * 0.75){
        kbUp = true;
      } else if(kbUp && vv.height >= baseH * 0.85){
        kbUp = false;
        setTimeout(function(){ window.scrollTo(0,0); }, 50);
      }
    });
    /* 防止视口偏移导致底部露白 */
    vv.addEventListener('scroll', function(){
      if(vv.offsetTop > 0) window.scrollTo(0,0);
    });
  }
})();
</script>
