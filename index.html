<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>小手机</title>
<style>
  :root {
    --bg: #f5f5f7;
    --text: #1c1c1e;
    --glass-bg: rgba(255,255,255,0.25);
    --glass-border: rgba(255,255,255,0.28);
    --shadow: 0 1px 2px rgba(0,0,0,0.05);
    --card-bg: rgba(255,255,255,0.18);
    --subtle: rgba(0,0,0,0.06);
    --text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --text: #f5f5f7;
      --glass-bg: rgba(0,0,0,0.20);
      --glass-border: rgba(255,255,255,0.12);
      --shadow: 0 1px 2px rgba(0,0,0,0.2);
      --card-bg: rgba(255,255,255,0.08);
      --subtle: rgba(255,255,255,0.06);
      --text-shadow: 0 1px 2px rgba(255,255,255,0.1);
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);
    overflow:hidden;width:100vw;height:100vh;height:100dvh;
    user-select:none;-webkit-user-select:none;
  }
  .glass{background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);}
  .glass-card{background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);box-shadow:var(--shadow);}
  .active-scale{transition:transform 0.1s ease;}
  .active-scale:active{transform:scale(0.95);}

  /* Loading */
  #loading-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;background:var(--bg);}
  /* Heart-trace overlay container */
  .loading-heart-container{position:relative;display:inline-flex;align-items:center;justify-content:center;width:220px;height:140px;}
  .loader-text{position:relative;z-index:1;font-size:24px;font-weight:500;color:var(--text);letter-spacing:1px;margin-top:18px;}
  /* Heart SVG sits behind text, centered */
  .heart-trace-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}
  @keyframes heart-trace{
    0%   { stroke-dashoffset: 1060; }
    100% { stroke-dashoffset: 0; }
  }
  .heart-trace-path{
    stroke-dasharray:1060;
    stroke-dashoffset:1060;
    animation:heart-trace 3s ease-in-out forwards;
    animation-iteration-count:1;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Loading fade */
  #loading-screen{transition:opacity .3s ease;}
  #loading-screen.fade-out{opacity:0;}

  /* Lock Screen */
  #lock-screen{
    position:fixed;inset:0;z-index:8000;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    background:var(--bg);
    background-size:cover;background-position:center;
    padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0);
    opacity:0;transition:opacity .3s ease;
  }
  #lock-screen.visible{opacity:1;}

  /* Main screen fade+slide */
  #main-screen{transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Lock body = 85% height, flex column */
  #lock-body{
    width:100%;flex:1;display:flex;align-items:center;justify-content:center;
    padding:0 10%;
  }
  /* Left + divider + right row */
  #lock-main-row{
    display:flex;flex-direction:row;align-items:center;
    width:100%;max-width:800px;gap:0;
  }
  /* Left: time */
  #lock-left{
    flex:0 0 60%;display:flex;align-items:center;justify-content:center;
    gap:0;
  }
  #lock-hour,#lock-min{
    font-family:'Times New Roman',Georgia,'Noto Serif',serif;
    font-size:clamp(80px,22vw,200px);
    font-weight:500;color:var(--text);line-height:1;
    font-variant-numeric:tabular-nums;
  }
  #lock-colon{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vw,27px);
    padding:0 clamp(10px,2vw,36px);
    margin-bottom:3px;
  }
  .lock-dot{
    width:clamp(6px,1.2vw,18px);height:clamp(6px,1.2vw,18px);
    border-radius:50%;background:#333;
    flex-shrink:0;
  }
  @media (prefers-color-scheme:dark){.lock-dot{background:#ccc;}}
  /* Divider */
  #lock-divider{
    width:1px;background:#D1D1D6;
    height:clamp(64px,16vw,160px);
    flex-shrink:0;
    margin:0 clamp(16px,3vw,40px);
  }
  @media (prefers-color-scheme:dark){#lock-divider{background:rgba(255,255,255,0.2);}}
  /* Right: info */
  #lock-right{
    flex:0 0 30%;display:flex;flex-direction:column;justify-content:center;
    gap:clamp(12px,2.5vw,24px);
    font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;
  }
  #lock-info-row1{display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);flex-wrap:nowrap;}
  #lock-info-name{
    font-size:clamp(16px,3.5vw,40px);font-weight:500;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--text);white-space:nowrap;
  }
  #lock-info-avatar{
    width:clamp(28px,4vw,48px);height:clamp(28px,4vw,48px);
    border-radius:50%;background:var(--subtle);
    border:1px solid rgba(150,150,150,0.3);
    overflow:hidden;flex-shrink:0;cursor:pointer;
  }
  #lock-info-avatar img{width:100%;height:100%;object-fit:cover;}
  .lock-info-line{
    font-size:clamp(12px,2.2vw,32px);font-weight:400;
    color:#8E8E93;white-space:nowrap;
  }
  /* Bottom location area */
  #lock-location{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding-bottom:calc(env(safe-area-inset-bottom,0) + 100px);
    font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;
    font-size:clamp(12px,2.2vw,32px);font-weight:400;color:#8E8E93;
  }
  #lock-location svg{flex-shrink:0;color:#8E8E93;}
  .unlock-track{position:absolute;bottom:calc(40px + env(safe-area-inset-bottom,0));width:260px;height:48px;border-radius:24px;display:flex;align-items:center;padding:3px;overflow:hidden;}
  .unlock-text{position:absolute;width:100%;text-align:center;font-size:13px;opacity:.4;pointer-events:none;letter-spacing:1px;}
  .unlock-thumb{position:relative;z-index:2;width:42px;height:42px;min-width:42px;border-radius:21px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;background:rgba(100,100,100,0.8);}
  @media (prefers-color-scheme:dark){.unlock-thumb{background:rgba(80,80,80,0.9);}}

  #main-screen{display:none;width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden;background-size:cover;background-position:center;transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Pages */
  .pages-container{width:100vw;height:100%;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;}
  .pages-container::-webkit-scrollbar{display:none;}
  .page{min-width:100vw;width:100vw;height:100%;scroll-snap-align:start;overflow-y:auto;overflow-x:hidden;padding-top:calc(16px + env(safe-area-inset-top,0));padding-bottom:calc(140px + env(safe-area-inset-bottom,0));padding-left:16px;padding-right:16px;scrollbar-width:none;}
  .page::-webkit-scrollbar{display:none;}

  /* FIXED bottom controls overlay */
  .fixed-bottom{
    position:fixed;left:0;right:0;z-index:450;
    bottom:calc(88px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;align-items:center;gap:8px;
    pointer-events:none;
  }
  .fixed-bottom>*{pointer-events:auto;}

  /* Dock */
  .dock{position:fixed;bottom:0;left:0;right:0;z-index:500;margin:0 12px;margin-bottom:calc(8px + env(safe-area-inset-bottom,0));border-radius:24px;padding:10px 16px;display:flex;align-items:center;justify-content:space-around;}

  /* App Icons */
  .app-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .app-icon-wrap:active .app-icon-box{transform:scale(.9);}
  .app-icon-box{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:transform .15s ease;}
  .app-icon-label{font-size:11px;opacity:.6;font-weight:400;}

  /* Page dots with pill animation */
  .page-dots{display:flex;gap:6px;align-items:center;justify-content:center;}
  .page-dot{
    height:6px;border-radius:3px;background:var(--text);
    transition:width .4s cubic-bezier(.4,0,.2,1),opacity .4s ease;
  }
  .page-dot.active{width:20px;opacity:.9;}
  .page-dot:not(.active){width:6px;opacity:.2;}

  /* Mini Search */
  .mini-search{width:120px;height:30px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;opacity:.5;cursor:pointer;}

  /* Chat Bubbles with iMessage tails */
  .chat-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:8px;}
  .chat-row.right{flex-direction:row-reverse;}
  .chat-avatar-sm{width:36px;height:36px;min-width:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:var(--subtle);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;}
  .chat-avatar-sm img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
  .bubble-wrap{position:relative;max-width:70%;}
  .chat-bubble{padding:6px 12px;border-radius:20px;font-size:12px;line-height:1.5;position:relative;cursor:pointer;transition:opacity .15s;}
  .chat-bubble:hover{opacity:.85;}
  /* Left tail */
  .chat-row:not(.right) .chat-bubble{border-bottom-left-radius:4px;}
  .chat-row:not(.right) .bubble-wrap::after{
    content:'';position:absolute;bottom:0;left:-5px;
    width:0;height:0;
    border-style:solid;
    border-width:0 6px 10px 0;
    border-color:transparent var(--card-bg) transparent transparent;
  }
  /* Right tail */
  .chat-row.right .chat-bubble{border-bottom-right-radius:4px;}
  .chat-row.right .bubble-wrap::after{
    content:'';position:absolute;bottom:0;right:-5px;
    width:0;height:0;
    border-style:solid;
    border-width:0 0 10px 6px;
    border-color:transparent transparent transparent var(--card-bg);
  }

  /* Big Time Block */
  .time-block{margin-top:14px;display:flex;flex-direction:column;align-items:center;}
  .time-big{font-size:54px;font-weight:700;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;}
  .time-sub{display:flex;align-items:center;gap:6px;margin-top:6px;opacity:.5;font-size:13px;}

  /* Anniversary */
  .anni-card{border-radius:22px;overflow:hidden;transition:transform .2s ease;}
  .anni-card:hover{transform:scale(1.015);}
  .anni-img{height:96px;background:linear-gradient(135deg,var(--subtle) 0%,transparent 100%);position:relative;display:flex;align-items:flex-start;padding:12px;overflow:hidden;}
  .anni-info{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}

  /* Calendar — compact */
  .cal-wrapper{border-radius:20px;padding:12px;}
  .cal-toggle{display:flex;gap:2px;align-items:center;}
  .cal-tab{font-size:9px;padding:3px 7px;border-radius:7px;cursor:pointer;transition:all .2s;opacity:.4;font-weight:500;}
  .cal-tab.active{opacity:1;}
  .cal-month-title{font-size:20px;font-weight:300;text-shadow:var(--text-shadow);letter-spacing:-.5px;line-height:1;}
  .cal-day-title{font-size:20px;font-weight:300;text-shadow:var(--text-shadow);letter-spacing:-.5px;line-height:1;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;}
  .cal-grid-head{font-size:8px;opacity:.4;padding:2px 0;font-weight:500;}
  .cal-grid-cell{font-size:10px;opacity:.7;padding:3px 0;border-radius:5px;display:flex;flex-direction:column;align-items:center;gap:1px;}
  .cal-grid-cell.today{opacity:1;font-weight:600;}
  .cal-event-dot{width:2.5px;height:2.5px;border-radius:2px;background:var(--text);opacity:.35;}

  /* Photo Frames */
  .photo-frame{width:100px;height:100px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--subtle);overflow:hidden;cursor:pointer;transition:transform .1s;flex-shrink:0;}
  .photo-frame:active{transform:scale(.95);}
  .photo-frame img{width:100%;height:100%;object-fit:cover;}

  /* App Overlay */
  .app-overlay{position:fixed;inset:0;z-index:1000;display:none;opacity:0;transition:opacity .25s ease;}
  .app-overlay.show{opacity:1;}
  .app-overlay-inner{position:absolute;inset:0;background:var(--glass-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);overflow-y:auto;padding:24px;padding-top:calc(24px + env(safe-area-inset-top,0));padding-bottom:calc(24px + env(safe-area-inset-bottom,0));}
  .app-back{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;background:var(--subtle);transition:transform .1s;}
  .app-back:active{transform:scale(.88);}
  .app-title{font-size:26px;font-weight:600;margin-bottom:24px;letter-spacing:-.5px;}
  .app-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:14px;margin-bottom:8px;}
  .app-toggle{width:44px;height:26px;border-radius:13px;background:var(--subtle);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .app-toggle.on{background:var(--text);}
  .app-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:var(--bg);transition:transform .2s;}
  .app-toggle.on::after{transform:translateX(18px);}
  .editable{cursor:pointer;transition:opacity .2s;}
  .editable:hover{opacity:.7;}
  .grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .icon-grid-4{display:flex;justify-content:space-around;align-items:flex-start;}
  .dock .app-icon-box{width:52px;height:52px;border-radius:14px;}

  /* ── Music Panel ── */
  @keyframes disc-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  /* Wrap is the anchor; button sits in normal flow; panel is absolute */
  .music-panel-wrap{
    position:relative;display:flex;flex-direction:column;align-items:center;
    margin-top:6px;
    /* Reserve space only for the button so page height stays fixed */
    height:36px;
  }
  .music-note-btn{
    width:36px;height:36px;border-radius:50%;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s ease;flex-shrink:0;
    color:var(--text);
  }
  .music-note-btn:active{transform:scale(0.95);}
  /* Panel floats absolutely — does NOT push content below */
  .music-panel{
    display:none;
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    z-index:300;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:20px;
    padding:10px 12px;
    transform-origin:top center;
    opacity:0;transform:scaleY(0.92) translateY(-4px);
    transition:opacity .2s ease,transform .2s ease;
  }
  .music-panel.open{display:block;}
  .music-panel.open.animated{opacity:1;transform:scaleY(1) translateY(0);}
  .music-disc{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg,rgba(200,200,200,0.35),rgba(130,130,130,0.25));
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;flex-shrink:0;position:relative;
  }
  .music-disc.spinning{animation:disc-rotate 10s linear infinite;}
  .music-disc img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%;}
  .music-title{font-size:14px;font-weight:600;color:var(--text);text-align:left;}
  .music-lyrics{font-size:12px;font-weight:400;color:var(--text);opacity:.7;text-align:left;margin-top:4px;}
  .music-progress{width:100%;height:4px;border-radius:2px;background:var(--subtle);margin-top:6px;}
  .music-progress-fill{width:35%;height:100%;border-radius:2px;background:var(--text);opacity:.55;}
  .music-controls{
    display:flex;justify-content:space-around;align-items:center;
    background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:12px;padding:6px 10px;margin-top:7px;
  }
  .music-ctrl-btn{cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;color:var(--text);}
  .music-ctrl-btn:active{transform:scale(0.88);}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="loading-heart-container">
    <!--
      viewBox 0 0 220 140, heart centered at (110, 78).
      Bottom tip: (110,118). Lobe tops: (75,28) and (145,28). Dip: (110,52).
      Lead-in from x=-400,y=118 → heart → exit to x=620,y=118.
      Total estimated path length ~1060 units.
    -->
    <svg class="heart-trace-svg" viewBox="0 0 220 140">
      <path class="heart-trace-path"
        d="M -400,118 L 72,118
           C 72,118 44,96 44,68
           C 44,36 60,22 78,34
           C 89,42 96,56 100,68
           C 104,56 111,42 122,34
           C 140,22 156,36 156,68
           C 156,96 128,118 128,118
           L 620,118"
        fill="none" stroke="#8E8E93" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="loader-text">loading...</span>
  </div>
</div>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <!-- Body: left time + divider + right info -->
  <div id="lock-body" style="align-items:flex-start;padding-top:calc(env(safe-area-inset-top,0) + 8px);">
    <div style="width:100%;max-width:800px;display:flex;flex-direction:column;align-items:center;transform:translateY(5px);">
      <!-- Date row above time module -->
      <div id="lock-date-full" style="font-size:16px;color:#8E8E93;text-align:center;margin-bottom:8px;font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;letter-spacing:.5px;"></div>
      <div id="lock-main-row">
        <!-- Left: big time -->
        <div id="lock-left">
          <span id="lock-hour">--</span>
          <div id="lock-colon">
            <div class="lock-dot"></div>
            <div class="lock-dot"></div>
          </div>
          <span id="lock-min">--</span>
        </div>
        <!-- Divider -->
        <div id="lock-divider"></div>
        <!-- Right: info rows (no avatar) -->
        <div id="lock-right">
          <div id="lock-info-row1">
            <span id="lock-info-name">TIME</span>
            <span style="font-size:clamp(22px,4.5vw,52px);color:var(--text);margin-left:4px;opacity:.7;line-height:1;align-self:center;">♥</span>
            <input type="file" id="lock-av-input" accept="image/*" style="display:none;">
          </div>
          <div class="lock-info-line" id="lock-info-date">Mar 31</div>
          <div class="lock-info-line" id="lock-info-weather">晴 18°C</div>
        </div>
      </div>
    </div>
  </div>
  <!-- Bottom location -->
  <div id="lock-location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
    <span id="lock-info-city">广州</span>
  </div>
  <!-- Unlock slider -->
  <div class="unlock-track glass" id="unlock-track">
    <span class="unlock-text">滑动以解锁</span>
    <div class="unlock-thumb glass" id="unlock-thumb" style="background:rgba(100,100,100,0.8);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div class="pages-container" id="pages-container">
    <!-- PAGE 1 -->
    <div class="page" id="page1">
      <!-- User Info -->
      <div style="display:flex;flex-direction:column;align-items:center;padding-top:2px;padding-bottom:2px;">
        <!-- Complex Avatar Component -->
        <div id="avatar-root" style="position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;">
          <!-- 1. Outer decorative ring -->
          <div style="position:absolute;width:calc(100% - 4px);height:calc(100% - 4px);top:2px;left:2px;border-radius:50%;border:3px solid rgba(200,200,200,0.6);z-index:1;pointer-events:none;"></div>
          <!-- 2. Avatar main body -->
          <div id="avatar-wrap" style="position:absolute;width:107px;height:107px;border-radius:54px;overflow:hidden;cursor:pointer;z-index:2;" class="glass-card">
            <div id="avatar-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,rgba(200,200,200,.4),rgba(160,160,160,.3));">

const MONTHS_EN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function pad(n){return n<10?'0'+n:''+n;}
function updateTimes(){
  const now=new Date(), h=pad(now.getHours()), m=pad(now.getMinutes());
  const lh=document.getElementById('lock-hour'),lm=document.getElementById('lock-min');
  if(lh)lh.textContent=h; if(lm)lm.textContent=m;
  const he=document.getElementById('home-time');if(he)he.textContent=h+':'+m;
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ld=document.getElementById('lock-info-date');
  if(ld)ld.textContent=mn[now.getMonth()]+' '+now.getDate();
  const hd=document.getElementById('home-date');
  if(hd) hd.textContent=(now.getMonth()+1)+'月'+now.getDate()+'日 '+DAYS_CN[now.getDay()];
  // Full date row on lock screen
  const ldf=document.getElementById('lock-date-full');
  if(ldf){const yy=now.getFullYear(),mm=pad(now.getMonth()+1),dd=pad(now.getDate());ldf.textContent=yy+'年'+mm+'月'+dd+'日 · '+DAYS_CN[now.getDay()];}
}

function openAnniPicker(){

}
function applyAnniDate(dateStr){
  if(!dateStr)return;
  localStorage.setItem('xsj_anni_date',dateStr);
  updateAnni();
}
function updateAnni(){
  const saved=localStorage.getItem('xsj_anni_date');
  const title=localStorage.getItem('xsj_anni_title');
  const titleEl=document.getElementById('anni-title-el');
  const labelEl=document.getElementById('anni-date-label');
  const daysEl=document.getElementById('anni-days');
  const unitEl=document.getElementById('anni-unit');
  if(title&&titleEl) titleEl.textContent=title;
  if(saved){
    const target=new Date(saved); const now=new Date();
    const diff=Math.ceil((target-now)/864e5);
    // Show date label
    if(labelEl){
      const d=target;
      labelEl.textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
    }
    if(daysEl) daysEl.textContent=Math.abs(diff);
    if(unitEl) unitEl.textContent=diff>0?'天后':'天前';
  } else {
    // legacy fallback: ANNI_DATE constant
    const t=new Date(ANNI_DATE),n=new Date();
    if(daysEl) daysEl.textContent=Math.abs(Math.floor((n-t)/864e5));
    if(unitEl) unitEl.textContent='天';
    if(labelEl) labelEl.textContent='点击选择日期';
  }
}

// Lock slider
(function(){
  const track=document.getElementById('unlock-track'),thumb=document.getElementById('unlock-thumb');
  let dragging=false,sx=0,tl=0;
  const maxT=()=>track.offsetWidth-thumb.offsetWidth-6;
  function start(e){dragging=true;sx=e.touches?e.touches[0].clientX:e.clientX;tl=0;e.preventDefault();}
  function move(e){if(!dragging)return;const cx=e.touches?e.touches[0].clientX:e.clientX;let dx=Math.max(0,Math.min(cx-sx,maxT()));thumb.style.transform='translateX('+dx+'px)';tl=dx;e.preventDefault();}
  function end(){
    if(!dragging)return;dragging=false;
    if(tl>=maxT()*.8){
      const lk=document.getElementById('lock-screen');
      const ms=document.getElementById('main-screen');
      lk.classList.remove('visible');
      ms.style.display='block';
      ms.classList.add('entering');
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        ms.classList.remove('entering');
      }));
      setTimeout(()=>{lk.style.display='none';},400);
    }else{
      thumb.style.transition='transform .3s ease';
      thumb.style.transform='translateX(0)';
      setTimeout(()=>{thumb.style.transition='';},300);
    }
  }
  thumb.addEventListener('mousedown',start);
  thumb.addEventListener('touchstart',start,{passive:false});
  document.addEventListener('mousemove',move);
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('mouseup',end);
  document.addEventListener('touchend',end);
})();

// Calendar — full weekly + monthly
const CAL_EVENT_SEEDS=[2,5,8,12,15,19,22,27]; // fixed "event" days for decoration
let calMode='weekly';
function buildCalendar(){
  calMode=calMode||'weekly';
  const now=new Date();
  document.getElementById('cal-month-name').textContent=MONTHS_EN[now.getMonth()];
  document.getElementById('cal-day-num').textContent=now.getDate();
  if(calMode==='weekly') buildWeekly(now);
  else buildMonthly(now);
}
function buildWeekly(now){
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  const heads=['S','M','T','W','T','F','S'];
  heads.forEach(h=>{const d=document.createElement('div');d.className='cal-grid-head';d.textContent=h;grid.appendChild(d);});
  const dow=now.getDay();
  const weekStart=new Date(now); weekStart.setDate(now.getDate()-dow);
  for(let i=0;i<7;i++){
    const dt=new Date(weekStart); dt.setDate(weekStart.getDate()+i);
    const cell=document.createElement('div'); cell.className='cal-grid-cell';
    const isToday=dt.getDate()===now.getDate()&&dt.getMonth()===now.getMonth()&&dt.getFullYear()===now.getFullYear();
    if(isToday){cell.classList.add('today');cell.style.background='var(--glass-bg)';cell.style.backdropFilter='blur(8px)';cell.style.webkitBackdropFilter='blur(8px)';}
    const num=document.createElement('span'); num.textContent=dt.getDate(); cell.appendChild(num);
    if(CAL_EVENT_SEEDS.includes(dt.getDate())&&dt.getMonth()===now.getMonth()){const dot=document.createElement('div');dot.className='cal-event-dot';cell.appendChild(dot);}
    grid.appendChild(cell);
  }
}
function buildMonthly(now){
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  const heads=['S','M','T','W','T','F','S'];
  heads.forEach(h=>{const d=document.createElement('div');d.className='cal-grid-head';d.textContent=h;grid.appendChild(d);});
  const y=now.getFullYear(), m=now.getMonth();
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  // prev month padding
  for(let i=firstDay-1;i>=0;i--){
    const cell=document.createElement('div');cell.className='cal-grid-cell';
    cell.style.opacity='.2';
    const num=document.createElement('span');num.textContent=daysInPrev-i;cell.appendChild(num);
    grid.appendChild(cell);
  }
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');cell.className='cal-grid-cell';
    const isToday=d===now.getDate();
    if(isToday){cell.classList.add('today');cell.style.background='var(--glass-bg)';cell.style.backdropFilter='blur(8px)';cell.style.webkitBackdropFilter='blur(8px)';}
    const num=document.createElement('span');num.textContent=d;cell.appendChild(num);
    if(CAL_EVENT_SEEDS.includes(d)){const dot=document.createElement('div');dot.className='cal-event-dot';cell.appendChild(dot);}
    grid.appendChild(cell);
  }
  // next month padding to fill last row
  const totalCells=firstDay+daysInMonth;
  const remainder=totalCells%7===0?0:7-(totalCells%7);
  for(let d=1;d<=remainder;d++){
    const cell=document.createElement('div');cell.className='cal-grid-cell';
    cell.style.opacity='.2';
    const num=document.createElement('span');num.textContent=d;cell.appendChild(num);
    grid.appendChild(cell);
  }
}
function switchCalTab(tab){
  calMode=tab;
  const w=document.getElementById('cal-weekly'),m=document.getElementById('cal-monthly');
  if(tab==='weekly'){w.classList.add('active','glass');m.classList.remove('active','glass');}
  else{m.classList.add('active','glass');w.classList.remove('active','glass');}
  buildCalendar();
}

// ── Image compression utility ──
function compressImage(file, maxW, quality, cb) {
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // Keep PNG for transparency, otherwise JPEG
      const isTransparentPng = file.type === 'image/png';
      const dataUrl = isTransparentPng
        ? canvas.toDataURL('image/png')
        : canvas.toDataURL('image/jpeg', quality);
      cb(dataUrl);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

      <button onclick="loadFontURL()" style="background:var(--subtle);border:1px solid var(--glass-border);padding:8px 12px;border-radius:10px;font-size:12px;color:var(--text);cursor:pointer;white-space:nowrap;">应用</button>

    <input type="color" id="font-color-inp" value="${fc||'#1c1c1e'}" onchange="applyFontColor(this.value)" style="width:36px;height:28px;border:none;border-radius:8px;cursor:pointer;background:none;">

function loadFontFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(e){
    const name='CustomFont_'+Date.now();
    const ff=new FontFace(name, e.target.result);
    ff.load().then(function(loaded){
      document.fonts.add(loaded);
      applyGlobalFont(name);
      localStorage.setItem('xsj_font_name',name);
      localStorage.setItem('xsj_font_data',e.target.result);
      updateFontPreview();
    }).catch(err=>alert('字体加载失败: '+err));
  };
  r.readAsArrayBuffer(f);
  inp.value='';
}
function loadFontURL(){
  const url=(document.getElementById('font-url-inp')||{}).value||'';
  if(!url.trim())return;
  if(url.includes('fonts.googleapis.com')||url.includes('fonts.gstatic.com')||url.endsWith('.css')){
    const link=document.createElement('link');link.rel='stylesheet';link.href=url;
    document.head.appendChild(link);
    link.onload=function(){
      const fam=url.match(/family=([^&:]+)/);
      if(fam){const fn=decodeURIComponent(fam[1]).replace(/\+/g,' ');applyGlobalFont(fn);localStorage.setItem('xsj_font_name',fn);localStorage.setItem('xsj_font_url',url);}
      updateFontPreview();
    };
  } else {
    const name='URLFont_'+Date.now();
    const ff=new FontFace(name,'url('+url+')');
    ff.load().then(function(loaded){
      document.fonts.add(loaded);applyGlobalFont(name);
      localStorage.setItem('xsj_font_name',name);localStorage.setItem('xsj_font_url',url);
      updateFontPreview();
    }).catch(()=>alert('无法加载字体，请检查URL'));
  }
}
function applyGlobalFont(name){
  document.body.style.fontFamily='"'+name+'",-apple-system,BlinkMacSystemFont,sans-serif';
}
function applyFontColor(val){
  document.documentElement.style.setProperty('--text',val);
  localStorage.setItem('xsj_font_color',val);
  const v=document.getElementById('font-color-inp');if(v)v.value=val;
  updateFontPreview();
}
function applyFontSize(val){
  document.documentElement.style.setProperty('--ui-fs',val+'px');
  document.body.style.fontSize=val+'px';
  localStorage.setItem('xsj_font_size',val);
  const v=document.getElementById('font-size-val');if(v)v.textContent=val;
  updateFontPreview();
}
function applyLetterSpacing(val){
  document.body.style.letterSpacing=val+'px';
  localStorage.setItem('xsj_letter_spacing',val);
  const v=document.getElementById('font-ls-val');if(v)v.textContent=val;
  updateFontPreview();
}
function updateFontPreview(){
  const p=document.getElementById('font-preview');if(!p)return;
  const fs=localStorage.getItem('xsj_font_size')||'14';
  const ls=localStorage.getItem('xsj_letter_spacing')||'0';
  const fc=localStorage.getItem('xsj_font_color')||'';
  p.style.fontSize=fs+'px';p.style.letterSpacing=ls+'px';
  if(fc)p.style.color=fc;
}
function resetFontSettings(){
  ['xsj_font_name','xsj_font_data','xsj_font_url','xsj_font_color','xsj_font_size','xsj_letter_spacing'].forEach(k=>localStorage.removeItem(k));
  document.body.style.fontFamily='';document.body.style.fontSize='';document.body.style.letterSpacing='';
  document.documentElement.style.removeProperty('--text');
  openBeautifyApp();
}
function loadFontSettings(){
  const fs=localStorage.getItem('xsj_font_size');
  const ls=localStorage.getItem('xsj_letter_spacing');
  const fc=localStorage.getItem('xsj_font_color');
  const fn=localStorage.getItem('xsj_font_name');
  const fd=localStorage.getItem('xsj_font_data');
  const fu=localStorage.getItem('xsj_font_url');
  if(fs)document.body.style.fontSize=fs+'px';
  if(ls)document.body.style.letterSpacing=ls+'px';
  if(fc)document.documentElement.style.setProperty('--text',fc);
  if(fn&&fd){try{const ff=new FontFace(fn,fd);ff.load().then(l=>{document.fonts.add(l);applyGlobalFont(fn);});}catch(e){}}
  else if(fn&&fu&&(fu.includes('.css')||fu.includes('googleapis'))){const link=document.createElement('link');link.rel='stylesheet';link.href=fu;document.head.appendChild(link);link.onload=()=>applyGlobalFont(fn);}
}

function toggleMusicPanel(){
  isMusicPanelOpen=!isMusicPanelOpen;
  const panel=document.getElementById('music-panel');
  const disc=document.getElementById('music-disc');
  const audio=document.getElementById('music-audio');
  if(isMusicPanelOpen){
    panel.classList.add('open');
    requestAnimationFrame(()=>panel.classList.add('animated'));
    if(audio&&!audio.paused) disc.classList.add('spinning');
  } else {
    panel.classList.remove('animated');
    setTimeout(function(){if(!isMusicPanelOpen)panel.classList.remove('open');},200);
    disc.classList.remove('spinning');
  }
}

function toggleMusicPlay(){
  const audio=document.getElementById('music-audio');
  const disc=document.getElementById('music-disc');
  if(!audio)return;
  if(audio.src&&audio.src!==window.location.href){
    if(audio.paused){audio.play();disc.classList.add('spinning');}
    else{audio.pause();disc.classList.remove('spinning');}
  } else {
    document.getElementById('music-audio-input').click();
  }
  updatePlayIcon();
}

function updatePlayIcon(){
  const audio=document.getElementById('music-audio');
  const btn=document.getElementById('music-play-btn');
  if(!btn)return;
  btn.innerHTML=(!audio||audio.paused)?PLAY_ICON:PAUSE_ICON;
}

function toggleMusicLoop(){
  musicLoopMode=(musicLoopMode+1)%3;
  const audio=document.getElementById('music-audio');
  if(audio) audio.loop=(musicLoopMode===1);
  const btn=document.getElementById('music-loop-btn');
  if(btn) btn.innerHTML=LOOP_ICONS[musicLoopMode];
  localStorage.setItem('xsj_music_loop',musicLoopMode);
}

function musicPrev(){
  if(musicPlaylist.length>1){
    musicIdx=(musicIdx-1+musicPlaylist.length)%musicPlaylist.length;
    loadMusicTrack(musicIdx);
  } else {
    const audio=document.getElementById('music-audio');
    if(audio){audio.currentTime=0;if(audio.paused)audio.play();}
  }
}
function musicNext(){
  if(musicPlaylist.length>1){
    musicIdx=(musicIdx+1)%musicPlaylist.length;
    loadMusicTrack(musicIdx);
  } else {
    const audio=document.getElementById('music-audio');
    if(audio){audio.currentTime=0;if(audio.paused)audio.play();}
  }
}
function loadMusicTrack(idx){
  if(!musicPlaylist[idx])return;
  const track=musicPlaylist[idx];
  const audio=document.getElementById('music-audio');
  audio.src=track.src;
  const t=document.getElementById('music-title-el');if(t)t.textContent=track.title||'未知歌曲';
  if(track.cover){
    const img=document.getElementById('music-disc-img');
    const svg=document.getElementById('music-disc-svg');
    if(img){img.src=track.cover;img.style.display='block';}
    if(svg)svg.style.display='none';
  }
  if(track.lrcText) parseLrc(track.lrcText);
  else musicLrc=[];
  audio.play();
  document.getElementById('music-disc').classList.add('spinning');
  updatePlayIcon();
}
function seekMusic(e){
  const audio=document.getElementById('music-audio');
  if(!audio||!audio.duration)return;
  const bar=document.getElementById('music-progress-bar');
  const rect=bar.getBoundingClientRect();
  const pct=(e.clientX-rect.left)/rect.width;
  audio.currentTime=pct*audio.duration;
}
function fmtTime(s){
  if(!s||isNaN(s))return'0:00';
  const m=Math.floor(s/60),ss=Math.floor(s%60);
  return m+':'+(ss<10?'0':'')+ss;
}
function parseLrc(text){
  musicLrc=[];
  const lines=text.split('\n');
  lines.forEach(line=>{
    const m=line.match(/\[(\d+):(\d+\.?\d*)\](.*)/);
    if(m) musicLrc.push({time:parseInt(m[1])*60+parseFloat(m[2]),text:m[3].trim()});
  });
  musicLrc.sort((a,b)=>a.time-b.time);
}
function updateLrcDisplay(currentTime){
  if(!musicLrc.length)return;
  let cur=musicLrc[0];
  for(let i=0;i<musicLrc.length;i++){if(musicLrc[i].time<=currentTime)cur=musicLrc[i]; else break;}
  const el=document.getElementById('music-lyrics-el');
  if(el&&cur) el.textContent=cur.text||'♪';
}

// Audio event bindings (set up once)
(function setupMusicAudio(){
  const audio=document.getElementById('music-audio');
  if(!audio)return;
  audio.addEventListener('timeupdate',function(){
    const fill=document.getElementById('music-progress-fill');
    const cur=document.getElementById('music-time-cur');
    const dur=document.getElementById('music-time-dur');
    if(fill&&audio.duration) fill.style.width=(audio.currentTime/audio.duration*100)+'%';
    if(cur) cur.textContent=fmtTime(audio.currentTime);
    if(dur) dur.textContent=fmtTime(audio.duration);
    updateLrcDisplay(audio.currentTime);
  });
  audio.addEventListener('ended',function(){
    if(musicLoopMode===2&&musicPlaylist.length>1) musicNext();
    else if(musicLoopMode===0){
      document.getElementById('music-disc').classList.remove('spinning');
      updatePlayIcon();
    }
  });
  audio.addEventListener('play',()=>{updatePlayIcon();document.getElementById('music-disc').classList.add('spinning');});
  audio.addEventListener('pause',()=>{updatePlayIcon();document.getElementById('music-disc').classList.remove('spinning');});
  // Restore loop mode
  const saved=localStorage.getItem('xsj_music_loop');
  if(saved){musicLoopMode=parseInt(saved)||0;audio.loop=(musicLoopMode===1);}
  const lb=document.getElementById('music-loop-btn');if(lb)lb.innerHTML=LOOP_ICONS[musicLoopMode];
})();

// Music import dialog
function openMusicImport(){
  const choice=confirm('上传本地音频文件？\n确定=上传文件  取消=输入URL');
  if(choice) document.getElementById('music-audio-input').click();
  else {
    const url=prompt('输入音频URL（MP3/M4A/OGG）');
    if(url&&url.trim()) applyMusicURL(url.trim());
  }
}
function applyMusicURL(url){
  const title=prompt('歌曲名称','未知歌曲')||'未知歌曲';
  const track={title,src:url,lrcText:'',cover:''};
  musicPlaylist=[track]; musicIdx=0;
  loadMusicTrack(0);
  saveMusicState();
}
function saveMusicState(){
  try{
    const light=musicPlaylist.map(t=>({title:t.title,src:t.src.startsWith('blob:')?'':t.src,lrcText:t.lrcText,cover:t.cover}));
    localStorage.setItem('xsj_music_playlist',JSON.stringify(light));
    localStorage.setItem('xsj_music_idx',musicIdx);
  }catch(e){}
}

// Audio file input
document.getElementById('music-audio-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);
  const title=f.name.replace(/\.[^.]+$/,'');
  const track={title,src:url,lrcText:'',cover:''};
  // try to preserve cover from existing playlist entry
  if(musicPlaylist[musicIdx]&&musicPlaylist[musicIdx].cover) track.cover=musicPlaylist[musicIdx].cover;
  musicPlaylist=[track]; musicIdx=0;
  loadMusicTrack(0);
  // store title
  localStorage.setItem('xsj_music_title',title);
  this.value='';
});

// LRC file input
document.getElementById('music-lrc-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=function(ev){
    const text=ev.target.result;
    parseLrc(text);
    if(musicPlaylist[musicIdx]) musicPlaylist[musicIdx].lrcText=text;
    localStorage.setItem('xsj_music_lrc',text);
  };
  r.readAsText(f,'UTF-8');
  this.value='';
});

// Disc image input
document.getElementById('music-disc-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  compressImage(f,150,0.8,function(src){
    const img=document.getElementById('music-disc-img');
    const svg=document.getElementById('music-disc-svg');
    if(img){img.src=src;img.style.display='block';}
    if(svg)svg.style.display='none';
    localStorage.setItem('musicDiscImage',src);
    if(musicPlaylist[musicIdx]) musicPlaylist[musicIdx].cover=src;
  });
  this.value='';
});

// Restore music state on load
(function restoreMusic(){
  const disc=localStorage.getItem('musicDiscImage');
  if(disc){const img=document.getElementById('music-disc-img');const svg=document.getElementById('music-disc-svg');if(img){img.src=disc;img.style.display='block';}if(svg)svg.style.display='none';}
  const title=localStorage.getItem('xsj_music_title');
  if(title){const t=document.getElementById('music-title-el');if(t)t.textContent=title;}
  const lrc=localStorage.getItem('xsj_music_lrc');if(lrc)parseLrc(lrc);
  const lrcEl=document.getElementById('music-lyrics-el');
  if(lrcEl&&musicLrc.length)lrcEl.textContent=musicLrc[0].text||'♪';
})();
</script>
