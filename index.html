<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>小手机</title>
<style>
  :root {
    --bg: #f5f5f7;
    --text: #1c1c1e;
    --glass-bg: rgba(255,255,255,0.15);
    --glass-border: rgba(255,255,255,0.28);
    --shadow: 0 1px 2px rgba(0,0,0,0.05);
    --card-bg: rgba(255,255,255,0.18);
    --subtle: rgba(0,0,0,0.06);
    --text-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --text: #f5f5f7;
      --glass-bg: rgba(0,0,0,0.25);
      --glass-border: rgba(255,255,255,0.12);
      --shadow: 0 1px 2px rgba(0,0,0,0.2);
      --card-bg: rgba(255,255,255,0.08);
      --subtle: rgba(255,255,255,0.06);
      --text-shadow: 0 1px 2px rgba(255,255,255,0.1);
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);
    overflow:hidden;width:100vw;height:100vh;height:100dvh;
    user-select:none;-webkit-user-select:none;
  }
  .glass{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);}
  .glass-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:var(--shadow);}
  .active-scale{transition:transform 0.25s cubic-bezier(0.25,0.46,0.45,0.94);}
  .active-scale:active{transform:scale(0.96);}

  /* Loading */
  #loading-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;background:var(--bg);}
  /* Heart-trace overlay container */
  .loading-heart-container{position:relative;display:inline-flex;align-items:center;justify-content:center;width:220px;height:140px;}
  .loader-text{position:relative;z-index:1;font-size:24px;font-weight:500;color:var(--text);letter-spacing:1px;margin-top:18px;}
  /* Heart SVG sits behind text, centered */
  .heart-trace-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}
  @keyframes heart-trace{
    0%   { stroke-dashoffset: 1060; }
    100% { stroke-dashoffset: 0; }
  }
  .heart-trace-path{
    stroke-dasharray:1060;
    stroke-dashoffset:1060;
    animation:heart-trace 3s ease-in-out forwards;
    animation-iteration-count:1;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Loading fade */
  #loading-screen{transition:opacity .3s ease;}
  #loading-screen.fade-out{opacity:0;}

  /* Lock Screen */
  #lock-screen{
    position:fixed;inset:0;z-index:8000;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    /* Black fallback — no white gap ever bleeds through beneath the wallpaper */
    background-color:#000;
    background-size:cover;
    background-position:center center;
    background-repeat:no-repeat;
    background-attachment:scroll;
    padding-top:env(safe-area-inset-top,0);
    padding-bottom:env(safe-area-inset-bottom,0);
    overflow:hidden;
    opacity:0;transition:opacity .3s ease;
  }
  /* Full-bleed underlay so sub-pixel gaps at screen edges show black, not body bg */
  #lock-screen::before{
    content:'';position:absolute;inset:0;
    background:inherit;z-index:0;pointer-events:none;
  }
  #lock-screen > *{position:relative;z-index:1;}
  #lock-screen.visible{opacity:1;}

  /* Main screen fade+slide */
  #main-screen{transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Lock body = 85% height, flex column */
  #lock-body{
    width:100%;flex:1;display:flex;align-items:center;justify-content:center;
    padding:0 10%;
  }
  /* Left + divider + right row */
  #lock-main-row{
    display:flex;flex-direction:row;align-items:center;
    width:100%;max-width:800px;gap:0;
  }
  /* Left: time */
  #lock-left{
    flex:0 0 60%;display:flex;align-items:center;justify-content:center;
    gap:0;
  }
  #lock-hour,#lock-min{
    font-family:'Times New Roman',Georgia,'Noto Serif',serif;
    font-size:clamp(80px,22vw,200px);
    font-weight:500;color:var(--text);line-height:1;
    font-variant-numeric:tabular-nums;
  }
  #lock-colon{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vw,27px);
    padding:0 clamp(10px,2vw,36px);
    margin-bottom:3px;
  }
  .lock-dot{
    width:clamp(6px,1.2vw,18px);height:clamp(6px,1.2vw,18px);
    border-radius:50%;background:#333;
    flex-shrink:0;
  }
  @media (prefers-color-scheme:dark){.lock-dot{background:#ccc;}}
  /* Divider */
  #lock-divider{
    width:1px;background:#D1D1D6;
    height:clamp(64px,16vw,160px);
    flex-shrink:0;
    margin:0 clamp(16px,3vw,40px);
  }
  @media (prefers-color-scheme:dark){#lock-divider{background:rgba(255,255,255,0.2);}}
  /* Right: info */
  #lock-right{
    flex:0 0 30%;display:flex;flex-direction:column;justify-content:center;
    gap:clamp(12px,2.5vw,24px);
    font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;
  }
  #lock-info-row1{display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);flex-wrap:nowrap;}
  #lock-info-name{
    font-size:clamp(16px,3.5vw,40px);font-weight:500;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--text);white-space:nowrap;
  }
  #lock-info-avatar{
    width:clamp(28px,4vw,48px);height:clamp(28px,4vw,48px);
    border-radius:50%;background:var(--subtle);
    border:1px solid rgba(150,150,150,0.3);
    overflow:hidden;flex-shrink:0;cursor:pointer;
  }
  #lock-info-avatar img{width:100%;height:100%;object-fit:cover;}
  .lock-info-line{
    font-size:clamp(12px,2.2vw,32px);font-weight:400;
    color:#8E8E93;white-space:nowrap;
  }
  /* Bottom location area */
  #lock-location{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding-bottom:calc(env(safe-area-inset-bottom,0) + 100px);
    font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;
    font-size:clamp(12px,2.2vw,32px);font-weight:400;color:#8E8E93;
  }
  #lock-location svg{flex-shrink:0;color:#8E8E93;}
  .unlock-track{position:absolute;bottom:calc(40px + env(safe-area-inset-bottom,0));width:260px;height:48px;border-radius:24px;display:flex;align-items:center;padding:3px;overflow:hidden;}
  .unlock-text{position:absolute;width:100%;text-align:center;font-size:13px;opacity:.4;pointer-events:none;letter-spacing:1px;}
  .unlock-thumb{position:relative;z-index:2;width:42px;height:42px;min-width:42px;border-radius:21px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;background:rgba(100,100,100,0.8);}
  @media (prefers-color-scheme:dark){.unlock-thumb{background:rgba(80,80,80,0.9);}}

  #main-screen{display:none;width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden;background-size:cover;background-position:center;transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Pages — horizontal snap only; NO vertical scroll on the main screen */
  .pages-container{width:100vw;height:100%;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;}
  .pages-container::-webkit-scrollbar{display:none;}
  .page{min-width:100vw;width:100vw;height:100%;scroll-snap-align:start;overflow-y:hidden;overflow-x:hidden;padding-top:calc(16px + env(safe-area-inset-top,0));padding-bottom:calc(140px + env(safe-area-inset-bottom,0));padding-left:16px;padding-right:16px;scrollbar-width:none;}
  .page::-webkit-scrollbar{display:none;}

  /* FIXED bottom controls overlay */
  .fixed-bottom{
    position:fixed;left:0;right:0;z-index:450;
    bottom:calc(88px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;align-items:center;gap:8px;
    pointer-events:none;
  }
  .fixed-bottom>*{pointer-events:auto;}

  /* Dock */
  .dock{position:fixed;bottom:0;left:0;right:0;z-index:500;margin:0 12px;margin-bottom:calc(8px + env(safe-area-inset-bottom,0));border-radius:24px;padding:10px 16px;display:flex;align-items:center;justify-content:space-around;}

  /* App Icons */
  .app-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .app-icon-wrap:active .app-icon-box{transform:scale(.9);}
  .app-icon-box{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:transform .15s ease;}
  .app-icon-label{font-size:11px;opacity:.6;font-weight:400;}

  /* Page dots with pill animation */
  .page-dots{display:flex;gap:6px;align-items:center;justify-content:center;}
  .page-dot{
    height:6px;border-radius:3px;background:var(--text);
    transition:width .4s cubic-bezier(.4,0,.2,1),opacity .4s ease;
  }
  .page-dot.active{width:20px;opacity:.9;}
  .page-dot:not(.active){width:6px;opacity:.2;}

  /* Mini Search */
  .mini-search{width:120px;height:30px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;opacity:.5;cursor:pointer;}

  /* Chat Bubbles with iMessage tails */
  .chat-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:8px;}
  .chat-row.right{flex-direction:row-reverse;}
  .chat-avatar-sm{width:36px;height:36px;min-width:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:var(--subtle);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;}
  .chat-avatar-sm img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
  .bubble-wrap{position:relative;max-width:70%;}
  .chat-bubble{padding:6px 12px;border-radius:20px;font-size:12px;line-height:1.5;position:relative;cursor:pointer;transition:opacity 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}
  .chat-bubble:hover{opacity:.85;}
  /* Left tail */
  .chat-row:not(.right) .chat-bubble{border-bottom-left-radius:4px;}
  .chat-row:not(.right) .bubble-wrap::after{
    content:'';position:absolute;bottom:0;left:-5px;
    width:0;height:0;
    border-style:solid;
    border-width:0 6px 10px 0;
    border-color:transparent var(--card-bg) transparent transparent;
  }
  /* Right tail */
  .chat-row.right .chat-bubble{border-bottom-right-radius:4px;}
  .chat-row.right .bubble-wrap::after{
    content:'';position:absolute;bottom:0;right:-5px;
    width:0;height:0;
    border-style:solid;
    border-width:0 0 10px 6px;
    border-color:transparent transparent transparent var(--card-bg);
  }

  /* Big Time Block */
  .time-block{margin-top:14px;display:flex;flex-direction:column;align-items:center;}
  .time-big{font-size:54px;font-weight:700;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;}
  .time-sub{display:flex;align-items:center;gap:6px;margin-top:6px;opacity:.5;font-size:13px;}

  /* Anniversary */
  .anni-card{border-radius:22px;overflow:hidden;transition:transform .2s ease;}
  .anni-card:hover{transform:scale(1.015);}
  .anni-img{height:96px;background:linear-gradient(135deg,var(--subtle) 0%,transparent 100%);position:relative;display:flex;align-items:flex-start;padding:12px;overflow:hidden;}
  .anni-info{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}

  /* Calendar — compact */
  .cal-wrapper{border-radius:20px;padding:12px;}
  .cal-toggle{display:flex;gap:2px;align-items:center;}
  .cal-tab{font-size:9px;padding:3px 7px;border-radius:7px;cursor:pointer;transition:all .2s;opacity:.4;font-weight:500;}
  .cal-tab.active{opacity:1;}
  .cal-month-title{font-size:20px;font-weight:300;text-shadow:var(--text-shadow);letter-spacing:-.5px;line-height:1;}
  .cal-day-title{font-size:20px;font-weight:300;text-shadow:var(--text-shadow);letter-spacing:-.5px;line-height:1;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;}
  .cal-grid-head{font-size:8px;opacity:.4;padding:2px 0;font-weight:500;}
  .cal-grid-cell{font-size:10px;opacity:.7;padding:3px 0;border-radius:5px;display:flex;flex-direction:column;align-items:center;gap:1px;}
  .cal-grid-cell.today{opacity:1;font-weight:600;}
  .cal-event-dot{width:2.5px;height:2.5px;border-radius:2px;background:var(--text);opacity:.35;}

  /* Photo Frames */
  .photo-frame{width:100px;height:100px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--subtle);overflow:hidden;cursor:pointer;transition:transform .1s;flex-shrink:0;}
  .photo-frame:active{transform:scale(.95);}
  .photo-frame img{width:100%;height:100%;object-fit:cover;}

  /* App Overlay — fills entire viewport on any screen */
  .app-overlay{
    position:fixed;inset:0;z-index:1000;display:none;
    opacity:0;transition:opacity .28s ease-out;
  }
  .app-overlay.show{opacity:1;}
  .app-overlay-inner{
    position:absolute;inset:0;
    background:var(--glass-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:24px;
    padding-top:calc(24px + env(safe-area-inset-top,0));
    padding-bottom:calc(24px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;
    width:100%;height:100%;
    box-sizing:border-box;
  }
  /* Chat module overrides padding=0, so it fills the full overlay */
  .chat-app-container{
    display:flex;flex-direction:column;
    height:100%;width:100%;
    overflow:hidden;
  }
  .app-back{width:44px;height:44px;border-radius:22px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;background:var(--subtle);transition:opacity .25s ease-out;}
  .app-back:active{opacity:.5;}
  .app-title{font-size:26px;font-weight:600;margin-bottom:24px;letter-spacing:-.5px;}
  .app-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:14px;margin-bottom:8px;}
  .app-toggle{width:44px;height:26px;border-radius:13px;background:var(--subtle);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .app-toggle.on{background:var(--text);}
  .app-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:var(--bg);transition:transform .2s;}
  .app-toggle.on::after{transform:translateX(18px);}
  .editable{cursor:pointer;transition:opacity .2s;}
  .editable:hover{opacity:.7;}
  .grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .icon-grid-4{display:flex;justify-content:space-around;align-items:flex-start;}
  .dock .app-icon-box{width:52px;height:52px;border-radius:14px;}

  /* ── Music Panel ── */
  @keyframes disc-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  /* Wrap is the anchor; button sits in normal flow; panel is absolute */
  .music-panel-wrap{
    position:relative;display:flex;flex-direction:column;align-items:center;
    margin-top:6px;
    /* Reserve space only for the button so page height stays fixed */
    height:36px;
  }
  .music-note-btn{
    width:36px;height:36px;border-radius:50%;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s ease;flex-shrink:0;
    color:var(--text);
  }
  .music-note-btn:active{transform:scale(0.95);}
  /* Panel floats absolutely — does NOT push content below */
  .music-panel{
    display:none;
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    z-index:300;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:20px;
    padding:10px 12px;
    transform-origin:top center;
    opacity:0;transform:scaleY(0.92) translateY(-4px);
    transition:opacity .2s ease,transform .2s ease;
  }
  .music-panel.open{display:block;}
  .music-panel.open.animated{opacity:1;transform:scaleY(1) translateY(0);}
  .music-disc{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg,rgba(200,200,200,0.35),rgba(130,130,130,0.25));
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;flex-shrink:0;position:relative;
  }
  .music-disc.spinning{animation:disc-rotate 10s linear infinite;}
  .music-disc img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%;}
  .music-title{font-size:14px;font-weight:600;color:var(--text);text-align:left;}
  .music-lyrics{font-size:12px;font-weight:400;color:var(--text);opacity:.7;text-align:left;margin-top:4px;}
  .music-progress{width:100%;height:4px;border-radius:2px;background:var(--subtle);margin-top:6px;}
  .music-progress-fill{width:35%;height:100%;border-radius:2px;background:var(--text);opacity:.55;}
  .music-controls{
    display:flex;justify-content:space-around;align-items:center;
    background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:12px;padding:6px 10px;margin-top:7px;
  }
  .music-ctrl-btn{cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;color:var(--text);}
  .music-ctrl-btn:active{transform:scale(0.88);}

  /* ── TabBar frosted glass blur strip ── REMOVED ── */
  .chat-tabbar-fade{
    display:none;
  }

  /* ── Glass card light highlight (radial gradient corners) ── */
  .chat-list-card,.contact-item,.contacts-item-new,.me-setting-card,.discover-card,.moments-card{position:relative;}
  .chat-list-card::before,.contact-item::before,.contacts-item-new::before,.me-setting-card::before,.discover-card::before,.moments-card::before{
    content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;z-index:1;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.18) 0%, transparent 60%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  @media(prefers-color-scheme:dark){
    .chat-list-card::before,.contact-item::before,.contacts-item-new::before,.me-setting-card::before,.discover-card::before,.moments-card::before{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08) 0%, transparent 60%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05) 0%, transparent 60%);
    }
  }
  /* Ensure child content is above the pseudo overlay */
  .chat-list-card > *,.contact-item > *,.contacts-item-new > *,.me-setting-card > *,.discover-card > *,.moments-card > *{position:relative;z-index:2;}
  .chat-app-container{display:flex;flex-direction:column;height:100%;overflow:hidden;}
  /* ── Chat header: push content below notch / Dynamic Island in PWA full-screen ── */
  .chat-app-header{
    padding: calc(12px + env(safe-area-inset-top, 0)) 16px 0;
    flex-shrink: 0;
    box-sizing: border-box;  /* safe: doesn't affect layout, explicit for clarity */
  }
  /* Back-button row: ensure 44 pt minimum touch target height */
  .chat-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;min-height:44px;}
  .chat-app-user-row{display:flex;align-items:center;gap:12px;padding:0 0 14px;}
  .chat-app-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,rgba(200,200,200,.4),rgba(160,160,160,.3));overflow:hidden;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.35);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .chat-app-avatar img{width:100%;height:100%;object-fit:cover;}
  .chat-app-userinfo{flex:1;min-width:0;}
  .chat-app-username{font-size:18px;font-weight:600;color:#1c1c1e;line-height:1.2;}
  .chat-app-bio{font-size:12px;color:#8e8e93;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
  @media(prefers-color-scheme:dark){
    .chat-app-username{color:#f5f5f7;}
    .chat-app-bio{color:#636366;}
  }
  .chat-app-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:0 16px 8px;}
  .chat-app-body::-webkit-scrollbar{display:none;}
  /* ── Chat App Bottom TabBar — fully transparent, wallpaper shows through ── */
  .chat-app-tabbar{
    flex-shrink:0;display:flex;align-items:center;
    background:transparent;
    /* no backdrop-filter, no border-top, no box-shadow */
    border-radius:0 0 28px 28px;
    padding:8px 0 calc(10px + env(safe-area-inset-bottom,0));
  }
  /* No dark-mode override needed — stays transparent */
  .chat-tab-item{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
    cursor:pointer;padding:4px 0;-webkit-tap-highlight-color:transparent;
    transition:opacity 0.3s ease-out;
  }
  .chat-tab-item:active{opacity:.5;}

const ANNI_DATE='2025-01-01';

function pad(n){return n<10?'0'+n:''+n;}
function updateTimes(){
  const now=new Date(), h=pad(now.getHours()), m=pad(now.getMinutes());
  const lh=document.getElementById('lock-hour'),lm=document.getElementById('lock-min');
  if(lh)lh.textContent=h; if(lm)lm.textContent=m;
  const he=document.getElementById('home-time');if(he)he.textContent=h+':'+m;
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const ld=document.getElementById('lock-info-date');
  if(ld)ld.textContent=mn[now.getMonth()]+' '+now.getDate();
  const hd=document.getElementById('home-date');
  if(hd) hd.textContent=(now.getMonth()+1)+'月'+now.getDate()+'日 '+DAYS_CN[now.getDay()];
  // Full date row on lock screen
  const ldf=document.getElementById('lock-date-full');
  if(ldf){const yy=now.getFullYear(),mm=pad(now.getMonth()+1),dd=pad(now.getDate());ldf.textContent=yy+'年'+mm+'月'+dd+'日 · '+DAYS_CN[now.getDay()];}
}
function updateAnni(){
  const t=new Date(ANNI_DATE),n=new Date();
  document.getElementById('anni-days').textContent=Math.abs(Math.floor((n-t)/864e5));
}

    ls.classList.add('fade-out');

      const lk=document.getElementById('lock-screen');
      lk.style.display='flex';
      requestAnimationFrame(()=>requestAnimationFrame(()=>lk.classList.add('visible')));
    },300);
  },2500);
});

// Lock slider
(function(){
  const track=document.getElementById('unlock-track'),thumb=document.getElementById('unlock-thumb');
  let dragging=false,sx=0,tl=0;
  const maxT=()=>track.offsetWidth-thumb.offsetWidth-6;
  function start(e){dragging=true;sx=e.touches?e.touches[0].clientX:e.clientX;tl=0;e.preventDefault();}
  function move(e){if(!dragging)return;const cx=e.touches?e.touches[0].clientX:e.clientX;let dx=Math.max(0,Math.min(cx-sx,maxT()));thumb.style.transform='translateX('+dx+'px)';tl=dx;e.preventDefault();}
  function end(){
    if(!dragging)return;dragging=false;
    if(tl>=maxT()*.8){
      const lk=document.getElementById('lock-screen');
      const ms=document.getElementById('main-screen');
      lk.classList.remove('visible');
      ms.style.display='block';
      ms.classList.add('entering');
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        ms.classList.remove('entering');
      }));
      setTimeout(()=>{lk.style.display='none';},400);
    }else{
      thumb.style.transition='transform .3s ease';
      thumb.style.transform='translateX(0)';
      setTimeout(()=>{thumb.style.transition='';},300);
    }
  }
  thumb.addEventListener('mousedown',start);
  thumb.addEventListener('touchstart',start,{passive:false});
  document.addEventListener('mousemove',move);
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('mouseup',end);
  document.addEventListener('touchend',end);
})();

});

// Calendar
function buildCalendar(){
  const now=new Date();
  document.getElementById('cal-month-name').textContent=MONTHS_EN[now.getMonth()];
  document.getElementById('cal-day-num').textContent=now.getDate();
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  ['S','M','T','W','T','F','S'].forEach(h=>{const d=document.createElement('div');d.className='cal-grid-head';d.textContent=h;grid.appendChild(d);});
  const dow=now.getDay(),start=new Date(now);start.setDate(now.getDate()-dow);
  for(let i=0;i<7;i++){
    const dt=new Date(start);dt.setDate(start.getDate()+i);
    const cell=document.createElement('div');cell.className='cal-grid-cell';
    if(dt.getDate()===now.getDate()&&dt.getMonth()===now.getMonth()){cell.classList.add('today');cell.style.background='var(--glass-bg)';cell.style.backdropFilter='blur(10px)';cell.style.webkitBackdropFilter='blur(10px)';}
    const num=document.createElement('span');num.textContent=dt.getDate();cell.appendChild(num);
    if(i===2||i===5){const dot=document.createElement('div');dot.className='cal-event-dot';cell.appendChild(dot);}
    grid.appendChild(cell);
  }
}
function switchCalTab(tab){
  const w=document.getElementById('cal-weekly'),m=document.getElementById('cal-monthly');
  if(tab==='weekly'){w.classList.add('active','glass');m.classList.remove('active','glass');}
  else{m.classList.add('active','glass');w.classList.remove('active','glass');}
}

// ── Image compression utility ──
function compressImage(file, maxW, quality, cb) {
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const scale = Math.min(1, maxW / img.width);
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      // Keep PNG for transparency, otherwise JPEG
      const isTransparentPng = file.type === 'image/png';
      const dataUrl = isTransparentPng
        ? canvas.toDataURL('image/png')
        : canvas.toDataURL('image/jpeg', quality);
      cb(dataUrl);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function chatInitHeader(){

    const img=document.getElementById('chat-hdr-av-img'),svg=document.getElementById('chat-hdr-av-svg');

function chatSwitchTab(tab){
  CHAT_STATE.currentTab=tab;
  // Reset search when switching main tabs
  CHAT_STATE.searchQuery='';CHAT_STATE.searchVisible=false;
  // Reset contacts state when leaving contacts
  if(tab!=='contacts'){CHAT_STATE.contactsDeleteMode=false;CHAT_STATE.contactsSearch='';}
  ['chats','contacts','discover','me'].forEach(t=>{
    const el=document.getElementById('chat-tab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  // Show/hide header for discover and me tabs
  const hdrWrap=document.getElementById('chat-hdr-wrap');
  if(hdrWrap){
    const hideHdr=(tab==='discover'||tab==='me');
    hdrWrap.style.display=hideHdr?'none':'block';
  }
  // Show subtab bar only for chats tab
  const subtab=document.getElementById('chat-subtab-bar');
  const searchBar=document.getElementById('chat-search-bar');
  if(subtab)subtab.style.display=tab==='chats'?'flex':'none';
  if(searchBar)searchBar.style.display='none';
  const body=document.getElementById('chat-app-body');if(!body)return;
  // Adjust body padding for discover tab (hero extends to edges)
  body.style.padding=tab==='discover'?'0':'';
  const page=document.createElement('div');page.className='chat-page';
  if(tab==='discover')page.style.padding='0';
  if(tab==='chats')page.innerHTML=chatBuildChats();
  else if(tab==='contacts')page.innerHTML=chatBuildContacts();
  else if(tab==='discover')page.innerHTML=chatBuildDiscover();
  else if(tab==='me')page.innerHTML=chatBuildMe();
  body.innerHTML='';body.appendChild(page);body.scrollTop=0;
}

  let msgs=CHAT_MESSAGES;
  // Filter by subtab
  if(CHAT_STATE.chatSubTab==='group') msgs=msgs.filter(m=>m.type==='group');
  else if(CHAT_STATE.chatSubTab==='friends') msgs=msgs.filter(m=>m.type==='friend');
  // Filter by search query
  if(CHAT_STATE.searchQuery){
    const q=CHAT_STATE.searchQuery.toLowerCase();
    msgs=msgs.filter(m=>m.name.toLowerCase().includes(q)||m.preview.toLowerCase().includes(q));
  }
  if(!msgs.length){
    return `<div style="height:8px;"></div><div style="text-align:center;padding:48px 0;color:#aeaeb2;font-size:14px;">无聊天记录</div>`;
  }
  const items=msgs.map(m=>`
    <div class="chat-list-item" onclick="chatShowMsg('${m.name}')">
      <div class="chat-list-av">
        ${m.type==='group'
          ?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="8" r="2.5"/><path d="M3 20c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="17" cy="8" r="2.5" opacity=".7"/><path d="M21 20c0-2.8-1.8-4.5-4-5" opacity=".7"/></svg>`
          :`<span style="font-size:16px;font-weight:600;color:#fff;">${m.name[0]}</span>`
        }
      </div>
      <div class="chat-list-info">
        <div class="chat-list-name">${m.name}</div>
        <div class="chat-list-preview">${m.preview}</div>
      </div>
      <div class="chat-list-time">${m.time}</div>
    </div>`).join('');
  return `<div style="height:20px;"></div><div class="chat-list-card">${items}</div>`;
}
function chatShowMsg(name){alert('与「'+name+'」的聊天详情功能即将开放 ✨');}

/* ── Subtab switch ── */
function chatSubSwitch(sub){
  CHAT_STATE.chatSubTab=sub;
  ['chats','group','friends'].forEach(s=>{
    const el=document.getElementById('csub-'+s);
    if(el)el.classList.toggle('active',s===sub);
  });
  const body=document.getElementById('chat-app-body');
  if(!body)return;
  const page=document.createElement('div');page.className='chat-page';
  page.innerHTML=chatBuildChats();
  body.innerHTML='';body.appendChild(page);body.scrollTop=0;
}

/* ── Add new chat entry (+Add button) ── */
function chatAddChatEntry(){
  const name=prompt('联系人 / 群聊名称');
  if(!name||!name.trim())return;
  const typeStr=prompt('类型？输入 1=好友  2=群聊','1');
  const type=typeStr==='2'?'group':'friend';
  const now=new Date();
  const timeStr=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  CHAT_MESSAGES.unshift({name:name.trim(),preview:'新对话',time:timeStr,type});
  // Also persist to localStorage
  const saved=JSON.parse(localStorage.getItem('xsj_extra_msgs')||'[]');
  saved.unshift({name:name.trim(),preview:'新对话',time:timeStr,type});
  localStorage.setItem('xsj_extra_msgs',JSON.stringify(saved));
  const body=document.getElementById('chat-app-body');
  if(body){const page=document.createElement('div');page.className='chat-page';page.innerHTML=chatBuildChats();body.innerHTML='';body.appendChild(page);}
}

/* ── Search ── */
function chatToggleSearch(){
  CHAT_STATE.searchVisible=!CHAT_STATE.searchVisible;
  const bar=document.getElementById('chat-search-bar');
  if(!bar)return;
  bar.style.display=CHAT_STATE.searchVisible?'flex':'none';
  if(CHAT_STATE.searchVisible){
    setTimeout(()=>{const inp=document.getElementById('chat-search-input');if(inp)inp.focus();},50);
  } else {
    chatClearSearch();
  }
}
function chatDoSearch(val){
  CHAT_STATE.searchQuery=val;
  if(CHAT_STATE.currentTab==='chats'){
    const body=document.getElementById('chat-app-body');
    if(!body)return;
    const page=document.createElement('div');page.className='chat-page';
    page.innerHTML=chatBuildChats();
    body.innerHTML='';body.appendChild(page);
  }
}
function chatClearSearch(){
  CHAT_STATE.searchQuery='';CHAT_STATE.searchVisible=false;
  const bar=document.getElementById('chat-search-bar');if(bar)bar.style.display='none';
  const inp=document.getElementById('chat-search-input');if(inp)inp.value='';
  if(CHAT_STATE.currentTab==='chats'){
    const body=document.getElementById('chat-app-body');
    if(!body)return;
    const page=document.createElement('div');page.className='chat-page';
    page.innerHTML=chatBuildChats();

/* ── Contacts Tab (Redesigned) ── */
function chatBuildContacts(){
  const data=chatGetData();
  const groups=data.contacts.groups;
  const allContacts=groups.reduce((a,g)=>a.concat(g.contacts),[]);
  const dm=CHAT_STATE.contactsDeleteMode;
  const sq=CHAT_STATE.contactsSearch||'';
  const selGroup=CHAT_STATE.contactsGroup||'all';

  // Scrollable avatar row
  let avRowHTML='';
  allContacts.forEach(c=>{
    const init=c.initials||c.name[0]||'?';
    const avImg=c.avatar?`<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:16px;font-weight:700;color:#fff;">${init}</span>`;
    avRowHTML+=`<div class="contacts-av-item" onclick="chatShowContact('${c.name}')">
      <div class="contacts-av-circle">${avImg}</div>
      <div class="contacts-av-label">${c.name}</div>
    </div>`;
  });

  // Group tabs
  let tabsHTML=`<div class="contacts-group-tab ${selGroup==='all'?'active':''}" onclick="contactsSwitchGroup('all')">全部</div>`;
  groups.forEach(g=>{
    tabsHTML+=`<div class="contacts-group-tab ${selGroup===g.name?'active':''}" onclick="contactsSwitchGroup('${g.name}')">${g.name}</div>`;
  });

  // Filter contacts
  let filtered=selGroup==='all'?allContacts:((groups.find(g=>g.name===selGroup)||{contacts:[]}).contacts);
  if(sq)filtered=filtered.filter(c=>c.name.toLowerCase().includes(sq.toLowerCase()));

  // Contact list
  let listHTML='';
  if(!filtered.length){
    listHTML=`<div style="text-align:center;padding:40px 0;color:#aeaeb2;font-size:14px;font-style:italic;">暂无联系人</div>`;
  } else {
    filtered.forEach(c=>{
      const init=c.initials||c.name[0]||'?';
      const avImg=c.avatar?`<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:16px;font-weight:700;color:#fff;">${init}</span>`;
      const delBtn=dm?`<div class="contacts-delete-indicator" onclick="contactsDeleteItem('${c.name}',event)"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg></div>`:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>`;
      listHTML+=`<div class="contacts-item-new${dm?' delete-mode':''}" onclick="${dm?'':'chatShowContact(\''+c.name+'\')'}">
        <div class="contacts-item-av">${avImg}</div>
        <div class="contacts-item-info">
          <div class="contacts-item-name">${c.name}</div>
          ${c.phone?`<div class="contacts-item-sub">${c.phone}</div>`:''}
        </div>
        ${delBtn}
      </div>`;
    });
  }

  return `<div class="contacts-page-wrap">
    <div class="contacts-serif-title">Contacts</div>
    <div class="contacts-avatar-scroll-outer"><div class="contacts-avatar-scroll">${avRowHTML||'<div style="color:#aeaeb2;font-size:13px;padding:16px 0;">暂无联系人</div>'}</div></div>
    <div class="contacts-action-row">
      <div class="contacts-action-icon-btn" title="添加联系人" onclick="chatAddContact()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14m-7-7h14"/></svg>
      </div>
      <div class="contacts-manage-btn" onclick="contactsManageGroups()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        管理分组
      </div>
      <div class="contacts-action-icon-btn${dm?' delete-active':''}" title="删除模式" onclick="contactsToggleDelete()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${dm?'#ff3b30':'currentColor'}" stroke-width="1.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
    </div>
    <div class="contacts-search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="contacts-search-input" id="contacts-search-inp" placeholder="搜索联系人…" value="${sq}" oninput="contactsDoSearch(this.value)" autocomplete="off">
    </div>
    <div class="contacts-group-tabs">${tabsHTML}</div>
    <div class="contacts-list-wrap">${listHTML}</div>
  </div>`;
}

function contactsSwitchGroup(g){
  CHAT_STATE.contactsGroup=g;
  _contactsRefresh();
}
function contactsToggleDelete(){
  CHAT_STATE.contactsDeleteMode=!CHAT_STATE.contactsDeleteMode;
  _contactsRefresh();
}
function contactsDoSearch(val){
  CHAT_STATE.contactsSearch=val;
  _contactsRefresh();
}
function contactsManageGroups(){
  const data=chatGetData();
  const cur=data.contacts.groups.map(g=>g.name).join('、');
  const v=prompt('当前分组：'+cur+'\n\n输入新分组名称（留空取消）：');
  if(!v||!v.trim())return;
  data.contacts.groups.push({name:v.trim(),contacts:[]});
  chatSaveData(data);
  CHAT_STATE.contactsGroup=v.trim();
  _contactsRefresh();
}
function contactsDeleteItem(name,ev){
  ev.stopPropagation();
  if(!confirm('删除联系人「'+name+'」？'))return;
  const data=chatGetData();
  data.contacts.groups.forEach(g=>{g.contacts=g.contacts.filter(c=>c.name!==name);});
  chatSaveData(data);
  _contactsRefresh();
}
function _contactsRefresh(){
  const body=document.getElementById('chat-app-body');if(!body)return;
  const page=document.createElement('div');page.className='chat-page';
  page.innerHTML=chatBuildContacts();
  body.innerHTML='';body.appendChild(page);
  // Restore focus to search if active
  if(CHAT_STATE.contactsSearch){const inp=document.getElementById('contacts-search-inp');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}}
}
function chatAddContact(){
  const name=prompt('输入联系人姓名');
  if(!name||!name.trim())return;
  const data=chatGetData();
  const groupNames=data.contacts.groups.map((g,i)=>(i+1)+'. '+g.name).join('\n');
  const groupIdx=prompt('选择分组（输入编号）：\n'+groupNames,'1');
  const idx=parseInt(groupIdx)-1;
  const group=data.contacts.groups[isNaN(idx)||idx<0||idx>=data.contacts.groups.length?0:idx];
  group.contacts.push({name:name.trim(),initials:name.trim()[0]});
  chatSaveData(data);
  CHAT_STATE.contactsGroup=group.name;
  _contactsRefresh();
}

/* ── Editable fields ── */
function chatEditName(){
  const cur=localStorage.getItem('xsj_name')||'用户名';
  const v=prompt('编辑用户名',cur);
  if(v===null||!v.trim())return;
  const name=v.trim();
  localStorage.setItem('xsj_name',name);
  // Update header
  const hn=document.getElementById('chat-hdr-name');if(hn)hn.textContent=name;
  // Update Me page if visible
  const mn=document.getElementById('me-page-name');if(mn)mn.textContent=name;
  // Update main screen username
  const mu=document.getElementById('username');if(mu)mu.textContent=name;
}
function chatEditBio(){
  const cur=localStorage.getItem('xsj_chat_bio')||'I loved you from the start…';
  const v=prompt('编辑签名',cur);
  if(v===null)return;
  const bio=v.trim()||'I loved you from the start…';
  localStorage.setItem('xsj_chat_bio',bio);
  const hb=document.getElementById('chat-hdr-bio');if(hb)hb.textContent=bio;
  const mb=document.getElementById('me-page-bio');if(mb)mb.textContent=bio;
}
function chatChangeAvatar(){
  const inp=document.getElementById('chat-av-file-input');if(inp)inp.click();
}
function chatHandleAvatarFile(input){
  const f=input.files[0];if(!f)return;
  compressImage(f,200,0.75,function(src){
    localStorage.setItem('xsj_avatar',src);
    // Update chat header avatar
    const img=document.getElementById('chat-hdr-av-img'),svg=document.getElementById('chat-hdr-av-svg');
    if(img){img.src=src;img.style.display='block';}
    if(svg)svg.style.display='none';
    // Update main screen avatar
    const mai=document.getElementById('avatar-img');if(mai){mai.src=src;mai.style.display='block';}
    const map=document.getElementById('avatar-placeholder');if(map)map.style.display='none';
    // Re-render me tab if open
    if(CHAT_STATE.currentTab==='me')chatSwitchTab('me');
  });
  input.value='';
}

// ── Music Panel ──
let isMusicPanelOpen = false;
function toggleMusicPanel() {
  isMusicPanelOpen = !isMusicPanelOpen;
  const panel = document.getElementById('music-panel');
  const disc = document.getElementById('music-disc');
  if (isMusicPanelOpen) {
    panel.classList.add('open');
    requestAnimationFrame(() => panel.classList.add('animated'));
    disc.classList.add('spinning');
  } else {
    panel.classList.remove('animated');
    setTimeout(function(){ if (!isMusicPanelOpen) panel.classList.remove('open'); }, 200);
    disc.classList.remove('spinning');
  }
}
document.getElementById('music-disc-input').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  compressImage(f, 150, 0.8, function(src) {
    const img = document.getElementById('music-disc-img');
    const svg = document.getElementById('music-disc-svg');
    img.src = src; img.style.display = 'block';
    if (svg) svg.style.display = 'none';
    localStorage.setItem('musicDiscImage', src);
  });
  this.value = '';
});
(function() {
  const saved = localStorage.getItem('musicDiscImage');
  if (saved) {
    const img = document.getElementById('music-disc-img');
    const svg = document.getElementById('music-disc-svg');
    if (img) { img.src = saved; img.style.display = 'block'; }
    if (svg) svg.style.display = 'none';
  }
})();
</script>
