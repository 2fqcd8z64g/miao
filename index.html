<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>小手机</title>
<style>
  :root {
    --bg: #f5f5f7;
    --text: #1c1c1e;
    --glass-bg: rgba(255,255,255,0.15);
    --glass-border: rgba(255,255,255,0.28);
    --shadow: 0 1px 2px rgba(0,0,0,0.05);
    --card-bg: rgba(255,255,255,0.18);
    --subtle: rgba(0,0,0,0.06);
    --text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1e;
      --text: #f5f5f7;
      --glass-bg: rgba(0,0,0,0.25);
      --glass-border: rgba(255,255,255,0.12);
      --shadow: 0 1px 2px rgba(0,0,0,0.2);
      --card-bg: rgba(255,255,255,0.08);
      --subtle: rgba(255,255,255,0.06);
      --text-shadow: 0 1px 2px rgba(255,255,255,0.1);
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);
    overflow:hidden;width:100vw;height:100vh;height:100dvh;
    user-select:none;-webkit-user-select:none;
  }
  .glass{background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);}
  .glass-card{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:var(--shadow);}
  .active-scale{transition:opacity 0.25s ease-out;}
  .active-scale:active{opacity:0.7;}

  /* Loading */
  #loading-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0;background:var(--bg);transition:opacity .3s ease;}
  /* Heart-trace overlay container */
  .loading-heart-container{position:relative;display:inline-flex;align-items:center;justify-content:center;width:220px;height:140px;}
  .loader-text{position:relative;z-index:1;font-size:24px;font-weight:500;color:var(--text);letter-spacing:1px;margin-top:18px;}
  /* Heart SVG sits behind text, centered */
  .heart-trace-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none;}
  @keyframes heart-trace{
    0%   { stroke-dashoffset: 1060; }
    100% { stroke-dashoffset: 0; }
  }
  .heart-trace-path{
    stroke-dasharray:1060;
    stroke-dashoffset:1060;
    animation:heart-trace 3s ease-in-out forwards;
    animation-iteration-count:1;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* Loading fade */
  #loading-screen.fade-out{opacity:0;}

  /* Lock Screen */
  #lock-screen{
    position:fixed;inset:0;z-index:8000;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    background:var(--bg);
    background-size:cover;background-position:center;
    padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0);
    opacity:0;transition:opacity .3s ease;
  }
  #lock-screen.visible{opacity:1;}

  /* Main screen fade+slide */
  #main-screen{transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Lock body = 85% height, flex column */
  #lock-body{
    width:100%;flex:1;display:flex;align-items:center;justify-content:center;
    padding:0 10%;
  }
  /* Left + divider + right row */
  #lock-main-row{
    display:flex;flex-direction:row;align-items:center;
    width:100%;max-width:800px;gap:0;
  }
  /* Left: time */
  #lock-left{
    flex:0 0 60%;display:flex;align-items:center;justify-content:center;
    gap:0;
  }
  #lock-hour,#lock-min{
    font-family:'Times New Roman',Georgia,'Noto Serif',serif;
    font-size:clamp(80px,22vw,200px);
    font-weight:500;color:var(--text);line-height:1;
    font-variant-numeric:tabular-nums;
  }
  #lock-colon{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vw,27px);
    padding:0 clamp(10px,2vw,36px);
    margin-bottom:3px;
  }
  .lock-dot{
    width:clamp(6px,1.2vw,18px);height:clamp(6px,1.2vw,18px);
    border-radius:50%;background:#333;
    flex-shrink:0;
  }
  @media (prefers-color-scheme:dark){.lock-dot{background:#ccc;}}
  /* Divider */
  #lock-divider{
    width:1px;background:#D1D1D6;
    height:clamp(64px,16vw,160px);
    flex-shrink:0;
    margin:0 clamp(16px,3vw,40px);
  }
  @media (prefers-color-scheme:dark){#lock-divider{background:rgba(255,255,255,0.2);}}
  /* Right: info */
  #lock-right{
    flex:0 0 30%;display:flex;flex-direction:column;justify-content:center;
    gap:clamp(12px,2.5vw,24px);
    font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;
  }
  #lock-info-row1{display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);flex-wrap:nowrap;}
  #lock-info-name{
    font-size:clamp(16px,3.5vw,40px);font-weight:500;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--text);white-space:nowrap;
  }
  #lock-info-avatar{
    width:clamp(28px,4vw,48px);height:clamp(28px,4vw,48px);
    border-radius:50%;background:var(--subtle);
    border:1px solid rgba(150,150,150,0.3);
    overflow:hidden;flex-shrink:0;cursor:pointer;
  }
  #lock-info-avatar img{width:100%;height:100%;object-fit:cover;}
  .lock-info-line{
    font-size:clamp(12px,2.2vw,32px);font-weight:400;
    color:#8E8E93;white-space:nowrap;
  }
  /* Bottom location area */
  #lock-location{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding-bottom:calc(env(safe-area-inset-bottom,0) + 100px);
    font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;
    font-size:clamp(12px,2.2vw,32px);font-weight:400;color:#8E8E93;
  }
  #lock-location svg{flex-shrink:0;color:#8E8E93;}
  .unlock-track{position:absolute;bottom:calc(40px + env(safe-area-inset-bottom,0));width:260px;height:48px;border-radius:24px;display:flex;align-items:center;padding:3px;overflow:hidden;}
  .unlock-text{position:absolute;width:100%;text-align:center;font-size:13px;opacity:.4;pointer-events:none;letter-spacing:1px;}
  .unlock-thumb{position:relative;z-index:2;width:42px;height:42px;min-width:42px;border-radius:21px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;background:rgba(100,100,100,0.8);}
  @media (prefers-color-scheme:dark){.unlock-thumb{background:rgba(80,80,80,0.9);}}

  #main-screen{display:none;width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden;background-size:cover;background-position:center;transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Pages */
  .pages-container{width:100vw;height:100%;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;}
  .pages-container::-webkit-scrollbar{display:none;}
  .page{min-width:100vw;width:100vw;height:100%;scroll-snap-align:start;overflow-y:auto;overflow-x:hidden;padding-top:calc(16px + env(safe-area-inset-top,0));padding-bottom:calc(140px + env(safe-area-inset-bottom,0));padding-left:16px;padding-right:16px;scrollbar-width:none;}
  .page::-webkit-scrollbar{display:none;}

  /* FIXED bottom controls overlay */
  .fixed-bottom{
    position:fixed;left:0;right:0;z-index:450;
    bottom:calc(88px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;align-items:center;gap:8px;
    pointer-events:none;
  }
  .fixed-bottom>*{pointer-events:auto;}

  /* Dock */
  .dock{position:fixed;bottom:0;left:0;right:0;z-index:500;margin:0 12px;margin-bottom:calc(8px + env(safe-area-inset-bottom,0));border-radius:24px;padding:10px 16px;display:flex;align-items:center;justify-content:space-around;}

  /* App Icons */
  .app-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;}
  .app-icon-wrap:active .app-icon-box{opacity:0.7;}
  .app-icon-box{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;transition:opacity .25s ease-out;}
  .app-icon-label{font-size:11px;opacity:.6;font-weight:400;}

  /* Page dots with pill animation */
  .page-dots{display:flex;gap:6px;align-items:center;justify-content:center;}
  .page-dot{
    height:6px;border-radius:3px;background:var(--text);
    transition:width .4s cubic-bezier(.4,0,.2,1),opacity .4s ease;
  }
  .page-dot.active{width:20px;opacity:.9;}
  .page-dot:not(.active){width:6px;opacity:.2;}

  /* Mini Search */
  .mini-search{width:120px;height:30px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;opacity:.5;cursor:pointer;}

  /* Chat Bubbles with iMessage tails */
  .chat-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:8px;}
  .chat-row.right{flex-direction:row-reverse;}
  .chat-avatar-sm{width:36px;height:36px;min-width:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:var(--subtle);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;}
  .chat-avatar-sm img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
  .bubble-wrap{position:relative;max-width:70%;}
  .chat-bubble{padding:6px 12px;border-radius:20px;font-size:12px;line-height:1.5;position:relative;cursor:pointer;transition:opacity 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}
  .chat-bubble:hover{opacity:.85;}
  /* Left tail */
  .chat-row:not(.right) .chat-bubble{border-bottom-left-radius:4px;}
  .chat-row:not(.right) .bubble-wrap::after{
    content:'';position:absolute;bottom:0;left:-5px;
    width:0;height:0;
    border-style:solid;
    border-width:0 6px 10px 0;
    border-color:transparent var(--card-bg) transparent transparent;
  }
  /* Right tail */
  .chat-row.right .chat-bubble{border-bottom-right-radius:4px;}
  .chat-row.right .bubble-wrap::after{
    content:'';position:absolute;bottom:0;right:-5px;
    width:0;height:0;
    border-style:solid;
    border-width:0 0 10px 6px;
    border-color:transparent transparent transparent var(--card-bg);
  }

  /* Big Time Block */
  .time-block{margin-top:14px;display:flex;flex-direction:column;align-items:center;}
  .time-big{font-size:54px;font-weight:700;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums;}
  .time-sub{display:flex;align-items:center;gap:6px;margin-top:6px;opacity:.5;font-size:13px;}

  /* Anniversary */
  .anni-card{border-radius:22px;overflow:hidden;transition:opacity .25s ease-out;}
  .anni-card:hover{opacity:0.9;}
  .anni-img{height:96px;background:linear-gradient(135deg,var(--subtle) 0%,transparent 100%);position:relative;display:flex;align-items:flex-start;padding:12px;overflow:hidden;}
  .anni-info{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}

  /* Calendar — compact */
  .cal-wrapper{border-radius:20px;padding:12px;}
  .cal-toggle{display:flex;gap:2px;align-items:center;}
  .cal-tab{font-size:9px;padding:3px 7px;border-radius:7px;cursor:pointer;transition:all .2s;opacity:.4;font-weight:500;}
  .cal-tab.active{opacity:1;}
  .cal-month-title{font-size:20px;font-weight:300;text-shadow:var(--text-shadow);letter-spacing:-.5px;line-height:1;}
  .cal-day-title{font-size:20px;font-weight:300;text-shadow:var(--text-shadow);letter-spacing:-.5px;line-height:1;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;}
  .cal-grid-head{font-size:8px;opacity:.4;padding:2px 0;font-weight:500;}
  .cal-grid-cell{font-size:10px;opacity:.7;padding:3px 0;border-radius:5px;display:flex;flex-direction:column;align-items:center;gap:1px;}
  .cal-grid-cell.today{opacity:1;font-weight:600;}
  .cal-event-dot{width:2.5px;height:2.5px;border-radius:2px;background:var(--text);opacity:.35;}

  /* Photo Frames */
  .photo-frame{width:100px;height:100px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--subtle);overflow:hidden;cursor:pointer;transition:opacity .25s ease-out;flex-shrink:0;}
  .photo-frame:active{opacity:0.7;}
  .photo-frame img{width:100%;height:100%;object-fit:cover;}

  /* App Overlay — fills entire viewport on any screen */
  .app-overlay{
    position:fixed;inset:0;z-index:1000;display:none;
    opacity:0;transition:opacity .28s ease-out;
  }
  .app-overlay.show{opacity:1;}
  .app-overlay-inner{
    position:absolute;inset:0;
    background:var(--glass-bg);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:24px;
    padding-top:calc(24px + env(safe-area-inset-top,0));
    padding-bottom:calc(24px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;
    width:100%;height:100%;
    box-sizing:border-box;
  }
  /* ── Chat overlay background: more translucent + bottom-up gradient ── */
  .chat-overlay-bg{
    background:
      linear-gradient(to top, rgba(255,255,255,0.50), rgba(255,255,255,0)),
      rgba(255,255,255,0.75) !important;
    backdrop-filter:blur(40px) !important;
    -webkit-backdrop-filter:blur(40px) !important;
  }
  @media(prefers-color-scheme:dark){
    .chat-overlay-bg{
      background:
        linear-gradient(to top, rgba(255,255,255,0.10), rgba(255,255,255,0)),
        rgba(0,0,0,0.60) !important;
    }
  }

  /* Chat module overrides padding=0, so it fills the full overlay */
  .chat-app-container{
    display:flex;flex-direction:column;
    height:100%;width:100%;
    overflow:hidden;
  }
  .app-back{width:36px;height:36px;border-radius:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-bottom:20px;background:var(--subtle);transition:opacity .25s ease-out;}
  .app-back:active{opacity:0.6;}
  .app-title{font-size:26px;font-weight:600;margin-bottom:24px;letter-spacing:-.5px;}
  .app-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:14px;margin-bottom:8px;}
  .app-toggle{width:44px;height:26px;border-radius:13px;background:var(--subtle);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
  .app-toggle.on{background:var(--text);}
  .app-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:var(--bg);transition:transform .2s;}
  .app-toggle.on::after{transform:translateX(18px);}
  .editable{cursor:pointer;transition:opacity .2s;}
  .editable:hover{opacity:.7;}
  .grid-2x2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .icon-grid-4{display:flex;justify-content:space-around;align-items:flex-start;}
  .dock .app-icon-box{width:52px;height:52px;border-radius:14px;}

  /* ── Music Panel ── */
  @keyframes disc-rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  /* Wrap is the anchor; button sits in normal flow; panel is absolute */
  .music-panel-wrap{
    position:relative;display:flex;flex-direction:column;align-items:center;
    margin-top:6px;
    /* Reserve space only for the button so page height stays fixed */
    height:36px;
  }
  .music-note-btn{
    width:36px;height:36px;border-radius:50%;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform .1s ease;flex-shrink:0;
    color:var(--text);
  }
  .music-note-btn:active{opacity:0.65;}
  /* Panel floats absolutely — does NOT push content below */
  .music-panel{
    display:none;
    position:absolute;top:calc(100% + 4px);left:0;right:0;
    z-index:300;
    background:var(--glass-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:20px;
    padding:10px 12px;
    transform-origin:top center;
    opacity:0;transform:scaleY(0.92) translateY(-4px);
    transition:opacity .2s ease,transform .2s ease;
  }
  .music-panel.open{display:block;}
  .music-panel.open.animated{opacity:1;transform:scaleY(1) translateY(0);}
  .music-disc{
    width:48px;height:48px;border-radius:50%;
    background:linear-gradient(135deg,rgba(200,200,200,0.35),rgba(130,130,130,0.25));
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:pointer;flex-shrink:0;position:relative;
  }
  .music-disc.spinning{animation:disc-rotate 10s linear infinite;}
  .music-disc img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:50%;}
  .music-title{font-size:14px;font-weight:600;color:var(--text);text-align:left;}
  .music-lyrics{font-size:12px;font-weight:400;color:var(--text);opacity:.7;text-align:left;margin-top:4px;}
  .music-progress{width:100%;height:4px;border-radius:2px;background:var(--subtle);margin-top:6px;}
  .music-progress-fill{width:35%;height:100%;border-radius:2px;background:var(--text);opacity:.55;}
  .music-controls{
    display:flex;justify-content:space-around;align-items:center;
    background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);border-radius:12px;padding:6px 10px;margin-top:7px;
  }
  .music-ctrl-btn{cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;color:var(--text);}
  .music-ctrl-btn:active{transform:scale(0.88);}

  /* ── TabBar frosted glass blur strip ── REMOVED ── */
  .chat-tabbar-fade{
    display:none;
  }

  /* ── Glass card light highlight (radial gradient corners) ── */
  .chat-list-card,.contact-item,.contacts-item-new,.me-setting-card,.discover-card,.moments-card{position:relative;}
  .chat-list-card::before,.contact-item::before,.contacts-item-new::before,.me-setting-card::before,.discover-card::before,.moments-card::before{
    content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;z-index:1;
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.18) 0%, transparent 60%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.12) 0%, transparent 60%);
  }
  @media(prefers-color-scheme:dark){
    .chat-list-card::before,.contact-item::before,.contacts-item-new::before,.me-setting-card::before,.discover-card::before,.moments-card::before{
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08) 0%, transparent 60%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.05) 0%, transparent 60%);
    }
  }
  /* Ensure child content is above the pseudo overlay */
  .chat-list-card > *,.contact-item > *,.contacts-item-new > *,.me-setting-card > *,.discover-card > *,.moments-card > *{position:relative;z-index:2;}
  .chat-app-container{display:flex;flex-direction:column;height:100%;overflow:hidden;}
  .chat-app-header{padding:12px 16px 0;flex-shrink:0;}
  .chat-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  /* Remove background circle from chat header back button only */
  .chat-hdr-top .app-back{background:none!important;border-radius:0!important;box-shadow:none!important;}
  .chat-app-user-row{display:flex;align-items:center;gap:12px;padding:0 0 14px;}
  .chat-app-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,rgba(200,200,200,.4),rgba(160,160,160,.3));overflow:hidden;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.35);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .chat-app-avatar img{width:100%;height:100%;object-fit:cover;}
  .chat-app-userinfo{flex:1;min-width:0;}
  .chat-app-username{font-size:18px;font-weight:600;color:#1c1c1e;line-height:1.2;}
  .chat-app-bio{font-size:12px;color:#8e8e93;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;}
  @media(prefers-color-scheme:dark){
    .chat-app-username{color:#f5f5f7;}
    .chat-app-bio{color:#636366;}
  }
  .chat-app-body{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding:0 16px 8px;}
  .chat-app-body::-webkit-scrollbar{display:none;}
  /* ── Chat App Bottom TabBar — frosted glass strip ── */
  .chat-app-tabbar{
    flex-shrink:0;display:flex;align-items:center;
    background:rgba(255,255,255,0.55);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid rgba(0,0,0,0.06);
    border-radius:0 0 28px 28px;
    padding:8px 0 calc(10px + env(safe-area-inset-bottom,0));
  }
  @media(prefers-color-scheme:dark){
    .chat-app-tabbar{
      background:rgba(28,28,30,0.65);
      border-top-color:rgba(255,255,255,0.07);
    }
  }
  .chat-tab-item{

  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

const DAYS_CN=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function pad(n){return n<10?'0'+n:''+n;}

/* ── escHtml helper ── */
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Unified localStorage helper (single source of truth for key names) ── */
const XSJ = {
  // Read a value; returns fallback if missing or parse error
  get(key, fallback) {
    try {
      const v = localStorage.getItem(key);
      return (v === null || v === undefined) ? fallback : v;
    } catch(e) { return fallback; }
  },
  // Write a value; silently handles QuotaExceededError
  set(key, value) {
    try { localStorage.setItem(key, value); return true; }
    catch(e) {
      if(e && (e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED')){
        showToast('⚠️ 存储空间不足，请清理图片后重试');
      }
      return false;
    }
  },
  // Canonical key aliases — always use these, never raw strings scattered around
  AVATAR:   'xsj_avatar',
  NAME:     'xsj_name',
  BIO:      'xsj_bio',
  STATUS:   'userStatus',
  USER_ID:  'userId',
  USER_BIO: 'userBio',
};

/* ── Key-name migration: run once to merge legacy duplicate keys ── */
(function _migrateKeys(){
  try {
    // avatar: merge meAvatar → xsj_avatar
    const legacyAv = localStorage.getItem('meAvatar');
    if(legacyAv && !localStorage.getItem('xsj_avatar')) {
      localStorage.setItem('xsj_avatar', legacyAv);
    }
    localStorage.removeItem('meAvatar');  // remove legacy duplicate
    // name: merge userName → xsj_name
    const legacyName = localStorage.getItem('userName');
    if(legacyName && !localStorage.getItem('xsj_name')) {
      localStorage.setItem('xsj_name', legacyName);
    }
    localStorage.removeItem('userName');  // remove legacy duplicate
  } catch(e) {}
})();

/* ── Toast ── */
function showToast(msg,dur){
  const t=document.createElement('div');t.className='xsj-toast';t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .25s ease forwards';setTimeout(()=>t.remove(),260);},(dur||2000));
}

/* ── Modal stack counter (prevents overflow flickering when modals overlap) ── */
let _modalOpenCount = 0;

/* ── Core showModal ── */
function showModal(opts){
  // opts: {title, subtitle, contentHtml, onConfirm, onCancel, showReset, onReset}
  const overlay=document.createElement('div');overlay.className='xsj-modal-overlay';
  const modal=document.createElement('div');modal.className='xsj-modal';

  const footerHTML=opts.showReset?`<div class="xsj-modal-footer"><div class="xsj-modal-reset-btn" id="xsj-reset-btn">恢复默认</div></div>`:'';

  modal.innerHTML=`
    <div class="xsj-modal-header">
      <div class="xsj-modal-btn" id="xsj-cancel-btn">取消</div>
      <div class="xsj-modal-title-wrap">
        <div class="xsj-modal-title">${opts.title||''}</div>
        ${opts.subtitle?`<div class="xsj-modal-subtitle">${opts.subtitle}</div>`:''}
      </div>
      <div class="xsj-modal-btn confirm" id="xsj-confirm-btn">确定</div>
    </div>
    <div class="xsj-modal-body" id="xsj-modal-body">${opts.contentHtml||''}</div>
    ${footerHTML}`;

  overlay.appendChild(modal);document.body.appendChild(overlay);
  _modalOpenCount++;
  document.body.style.overflow='hidden';

  // Focus first input
  setTimeout(()=>{const inp=modal.querySelector('input,select,textarea');if(inp)inp.focus();},80);

  function closeModal(){
    overlay.classList.add('closing');modal.classList.add('closing');
    setTimeout(()=>{
      overlay.remove();
      _modalOpenCount = Math.max(0, _modalOpenCount - 1);
      if(_modalOpenCount === 0) document.body.style.overflow='';
    },200);
  }
  function collectData(){
    const d={};
    modal.querySelectorAll('[data-field]').forEach(el=>{
      const k=el.dataset.field;
      if(el.type==='checkbox')d[k]=el.checked;
      else d[k]=el.value;
    });
    return d;
  }

  overlay.addEventListener('click',e=>{if(e.target===overlay){if(opts.onCancel)opts.onCancel();closeModal();}});
  modal.querySelector('#xsj-cancel-btn').addEventListener('click',()=>{if(opts.onCancel)opts.onCancel();closeModal();});
  modal.querySelector('#xsj-confirm-btn').addEventListener('click',()=>{if(opts.onConfirm)opts.onConfirm(collectData());closeModal();});
  if(opts.showReset&&modal.querySelector('#xsj-reset-btn')){
    modal.querySelector('#xsj-reset-btn').addEventListener('click',()=>{if(opts.onReset)opts.onReset(modal);});
  }
}

/* ── Anniversary editor ── */
function editAnni(){
  const savedTitle=localStorage.getItem('xsj_anni_title')||'此处添加纪念日';
  const savedDate=localStorage.getItem('xsj_anni_date')||'2025-01-01';
  showModal({
    title:'新建纪念日',subtitle:'Create Anniversary',
    showReset:true,
    contentHtml:`<div class="xsj-field-wrap"><div class="xsj-field-label">纪念日名称</div><input class="xsj-input" data-field="anniTitle" placeholder="如：恋爱纪念日" value="${escHtml(savedTitle)}" autocomplete="off"></div>
    <div class="xsj-field-wrap"><div class="xsj-field-label">纪念日日期</div><input class="xsj-input" type="date" data-field="anniDate" value="${escHtml(savedDate)}"></div>`,
    onConfirm(d){
      const title=d.anniTitle.trim()||'此处添加纪念日';
      const dateStr=d.anniDate||'2025-01-01';
      localStorage.setItem('xsj_anni_title',title);
      localStorage.setItem('xsj_anni_date',dateStr);
      const tEl=document.getElementById('anni-title');if(tEl)tEl.textContent=title;
      const [yy,mm,dd]=dateStr.split('-');
      const dlEl=document.getElementById('anni-date-label');if(dlEl)dlEl.textContent=yy+'年'+parseInt(mm)+'月'+parseInt(dd)+'日';
      const t=new Date(dateStr),n=new Date();
      const days=Math.floor((n-t)/864e5);
      document.getElementById('anni-days').textContent=Math.abs(days);
    },
    onReset(modal){
      const ti=modal.querySelector('[data-field="anniTitle"]');if(ti)ti.value='此处添加纪念日';
      const di=modal.querySelector('[data-field="anniDate"]');if(di)di.value='2025-01-01';
    }
  });
}

// Lock slider
(function(){
  const track=document.getElementById('unlock-track'),thumb=document.getElementById('unlock-thumb');
  let dragging=false,sx=0,tl=0;
  // Guard: ensure maxT is always a positive number; if track is hidden offsetWidth=0
  const maxT=()=>Math.max(20, track.offsetWidth - thumb.offsetWidth - 6);
  function start(e){
    // Only allow dragging when lock screen is actually visible
    const lk=document.getElementById('lock-screen');
    if(!lk||lk.style.display==='none')return;
    dragging=true;sx=e.touches?e.touches[0].clientX:e.clientX;tl=0;e.preventDefault();
  }
  function move(e){if(!dragging)return;const cx=e.touches?e.touches[0].clientX:e.clientX;let dx=Math.max(0,Math.min(cx-sx,maxT()));thumb.style.transform='translateX('+dx+'px)';tl=dx;e.preventDefault();}
  function end(){
    if(!dragging)return;dragging=false;
    const mt=maxT();
    if(mt > 10 && tl >= mt * 0.8){
      const lk=document.getElementById('lock-screen');
      const ms=document.getElementById('main-screen');
      lk.classList.remove('visible');
      ms.style.display='block';
      ms.classList.add('entering');
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        ms.classList.remove('entering');
      }));
      setTimeout(()=>{lk.style.display='none';},400);
    }else{
      thumb.style.transition='transform .3s ease';
      thumb.style.transform='translateX(0)';
      setTimeout(()=>{thumb.style.transition='';},300);
    }
  }
  thumb.addEventListener('mousedown',start);
  thumb.addEventListener('touchstart',start,{passive:false});
  document.addEventListener('mousemove',move);
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('mouseup',end);
  document.addEventListener('touchend',end);
})();

function buildCalendar(){

  for(let i=0;i<7;i++){

// ── Image compression utility ──
function compressImage(file, maxW, quality, cb, onError) {
  const _fail = function(msg) {
    showToast(msg || '图片处理失败，请重试');
    if (typeof onError === 'function') onError(msg);
  };
  // Guard: 15 MB hard limit before reading
  if (file && file.size > 15 * 1024 * 1024) {
    _fail('图片过大，请选择 15MB 以内的图片');
    return;
  }
  const reader = new FileReader();
  reader.onerror = function() { _fail('图片读取失败'); };
  reader.onload = function(ev) {
    const img = new Image();
    img.onerror = function() { _fail('图片格式不支持，请使用 JPG / PNG / WebP'); };
    img.onload = function() {
      try {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Keep PNG for transparency, otherwise JPEG
        const isTransparentPng = file.type === 'image/png';
        const dataUrl = isTransparentPng
          ? canvas.toDataURL('image/png')
          : canvas.toDataURL('image/jpeg', quality);
        cb(dataUrl);
      } catch(e) {
        _fail('图片压缩失败，可能是图片尺寸过大');
      }
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

  compressImage(f,200,0.75,function(d){
    const img=document.getElementById('avatar-img');img.src=d;img.style.display='block';
    document.getElementById('avatar-placeholder').style.display='none';
    XSJ.set(XSJ.AVATAR,d);
  });
  this.value='';
});
document.getElementById('lock-av-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  compressImage(f,200,0.75,function(d){
    const li=document.getElementById('lock-av-img');if(li){li.src=d;li.style.display='block';}
    localStorage.setItem('xsj_lock_avatar',d);
  });

});
// ── Safe CSS url() setter — escapes double-quotes to prevent CSS injection ──
function _safeBgUrl(el, src) {
  if(!el||!src)return;
  el.style.backgroundImage='url("'+src.replace(/"/g,'%22')+'")';
  el.style.backgroundSize='cover';
  el.style.backgroundPosition='center';
}
function loadWallpapers(){
  const lw=localStorage.getItem('xsj_wp_lock'),mw=localStorage.getItem('xsj_wp_main');
  if(lw) _safeBgUrl(document.getElementById('lock-screen'),lw);
  if(mw) _safeBgUrl(document.getElementById('main-screen'),mw);
}
document.getElementById('wp-lock-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  compressImage(f,800,0.8,function(d){
    _safeBgUrl(document.getElementById('lock-screen'),d);
    localStorage.setItem('xsj_wp_lock',d);
  });
  this.value='';
});
document.getElementById('wp-main-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;
  compressImage(f,800,0.8,function(d){
    _safeBgUrl(document.getElementById('main-screen'),d);
    localStorage.setItem('xsj_wp_main',d);
  });
  this.value='';
});
function editPhotoNote(){
  const el=document.getElementById('photo-note-text');
  const cur=el.textContent==='记录此刻的心情...'?'':el.textContent;
  showModal({
    title:'记录心情',subtitle:'Capture the Moment',
    contentHtml:`<div class="xsj-field-wrap"><div class="xsj-field-label">心情备注</div><input class="xsj-input" data-field="note" placeholder="记录此刻的心情..." value="${escHtml(cur)}" autocomplete="off"></div>`,
    onConfirm(d){
      const v=d.note||'';
      if(v.trim()){el.textContent=v.trim();el.style.opacity='1';}
      else{el.textContent='记录此刻的心情...';el.style.opacity='.55';}
      localStorage.setItem('xsj_photo_note',v.trim());
    }
  });
}

}

  ct.innerHTML='<div class="app-back" onclick="closeApp()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div><div class="app-title">'+app.t+'</div>'+app.b;

function chatGetData(){
  try{
    const s=localStorage.getItem('xsj_chat_module');
    if(s){
      const d=JSON.parse(s);
      // ── Version migration ──
      if(!d.version){ d.version=1; }
      // Ensure required keys exist (safe migration)
      if(!d.contacts){ d.contacts={groups:[]}; }
      if(!Array.isArray(d.contacts.groups)){ d.contacts.groups=[]; }
      if(!d.discovers){ d.discovers=[]; }
      return d;
    }
  }catch(e){}
  // Default: only AI assistant, no preset friends
  return {
    version:1,
    contacts:{groups:[
      {name:'AI',contacts:[{...AI_ASSISTANT}]}
    ]},
    discovers:[]
  };
}
// Migration: clear any old preset data on first load
(function(){
  try{
    const s=localStorage.getItem('xsj_chat_module');
    if(!s){
      // Also clear extra msgs
      localStorage.removeItem('xsj_extra_msgs');
    }
  }catch(e){}
})();
function chatSaveData(data){
  try {
    localStorage.setItem('xsj_chat_module', JSON.stringify(data));
  } catch(e) {
    if (e && (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_DOM_QUOTA_REACHED')) {
      showToast('⚠️ 存储空间不足，请到「我」→ 设置中清理图片后重试');
    } else {
      showToast('数据保存失败，请重试');
    }
  }
}

function chatSwitchTab(tab){
  CHAT_STATE.currentTab=tab;
  // Reset search when switching main tabs
  CHAT_STATE.searchQuery='';CHAT_STATE.searchVisible=false;
  // Reset contacts state when leaving contacts
  if(tab!=='contacts'){CHAT_STATE.contactsDeleteMode=false;CHAT_STATE.contactsSearch='';}
  ['chats','contacts','discover','me'].forEach(t=>{
    const el=document.getElementById('chat-tab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  // Show/hide header for discover and me tabs
  const hdrWrap=document.getElementById('chat-hdr-wrap');
  if(hdrWrap){
    const hideHdr=(tab==='discover'||tab==='me');
    hdrWrap.style.display=hideHdr?'none':'block';
  }
  // Show subtab bar only for chats tab
  const subtab=document.getElementById('chat-subtab-bar');
  const searchBar=document.getElementById('chat-search-bar');
  if(subtab)subtab.style.display=tab==='chats'?'flex':'none';
  if(searchBar)searchBar.style.display='none';
  const body=document.getElementById('chat-app-body');if(!body)return;
  // Adjust body padding for discover tab (hero extends to edges)
  body.style.padding=tab==='discover'?'0':'';
  // For me tab: full height flex column, no overflow
  if(tab==='me'){
    body.style.display='flex';body.style.flexDirection='column';body.style.alignItems='';body.style.justifyContent='';body.style.overflow='hidden';body.style.height='100%';body.style.padding='0';
  } else {
    body.style.display='';body.style.flexDirection='';body.style.alignItems='';body.style.justifyContent='';body.style.overflow='';body.style.height='';body.style.padding='';
  }
  const page=document.createElement('div');page.className='chat-page';
  if(tab==='discover')page.style.padding='0';
  if(tab==='me'){page.style.padding='0';page.style.height='100%';page.style.overflow='hidden';}
  if(tab==='chats')page.innerHTML=chatBuildChats();
  else if(tab==='contacts')page.innerHTML=chatBuildContacts();
  else if(tab==='discover')page.innerHTML=chatBuildDiscover();
  else if(tab==='me')page.innerHTML=chatBuildMe();
  body.innerHTML='';body.appendChild(page);body.scrollTop=0;
  if(tab==='chats')setTimeout(chatAttachLongPress,50);
  if(tab==='contacts')setTimeout(chatAttachContactsLongPress,50);
}

/* ── Chats Tab ── */
function chatBuildChats(){
  // Build msgs from contacts + CHAT_MESSAGES extras
  const allContacts=chatGetAllContacts();
  let msgs=allContacts.map(c=>({
    id:c.id,
    name:c.name,
    preview:c.isAi?'你好！我是AI助手 ✨':'暂无消息',
    time:'',
    type:'friend',
    isTop:c.isTop||false,
    isAi:c.isAi||false,
    avatar:c.avatar||''
  }));
  // Add extra CHAT_MESSAGES that aren't already in contacts
  CHAT_MESSAGES.forEach(m=>{if(!msgs.find(x=>x.name===m.name))msgs.push({...m,isTop:false,isAi:false,avatar:'',id:''});});
  // Filter by subtab
  if(CHAT_STATE.chatSubTab==='group') msgs=msgs.filter(m=>m.type==='group');
  else if(CHAT_STATE.chatSubTab==='friends') msgs=msgs.filter(m=>m.type==='friend');
  // Filter by search
  if(CHAT_STATE.searchQuery){
    const q=CHAT_STATE.searchQuery.toLowerCase();
    msgs=msgs.filter(m=>m.name.toLowerCase().includes(q)||(m.preview||'').toLowerCase().includes(q));
  }
  // Sort: topped first
  msgs.sort((a,b)=>{if(a.isTop&&!b.isTop)return -1;if(!a.isTop&&b.isTop)return 1;return 0;});
  if(!msgs.length){return `<div style="height:8px;"></div><div style="text-align:center;padding:48px 0;color:#aeaeb2;font-size:14px;">无聊天记录</div>`;}
  const items=msgs.map(m=>{
    const avContent=m.avatar
      ?`<img src="${m.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      :m.isAi
        ?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/></svg>`
        :m.type==='group'
          ?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="8" r="2.5"/><path d="M3 20c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="17" cy="8" r="2.5" opacity=".7"/><path d="M21 20c0-2.8-1.8-4.5-4-5.2" opacity=".7"/></svg>`
          :`<span style="font-size:16px;font-weight:600;color:#fff;">${m.name[0]}</span>`;
    const topBadge=m.isTop?`<svg width="14" height="14" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" style="margin-left:4px;vertical-align:middle;flex-shrink:0;pointer-events:none;"><path d="M557.728 688v288.384H466.24V688H227.52c-9.6 0-18.048-3.712-24.96-11.264A37.824 37.824 0 0 1 192 649.984c0-48.768 14.432-92.704 43.584-131.84 29.12-38.976 61.92-58.56 98.56-58.56V200.512c-19.296 0-35.84-7.552-50.048-22.656a76.16 76.16 0 0 1-21.12-53.6c0-20.672 7.04-38.4 21.12-53.6 13.984-14.976 30.72-22.656 50.048-22.656h355.584c19.296 0 35.84 7.552 50.048 22.656 13.984 15.104 21.152 32.928 21.152 53.6 0 20.672-7.04 38.4-21.12 53.6-14.112 15.232-30.784 22.656-50.08 22.656v258.944c36.64 0 69.568 19.584 98.56 58.56A215.424 215.424 0 0 1 832 649.984c0 10.272-3.456 19.328-10.528 26.752-7.04 7.424-15.36 11.264-24.96 11.264H557.76z" fill="#9C9C9C"/></svg>`:'';
    return `<div class="chat-list-item" data-contact-name="${escHtml(m.name)}" data-is-top="${m.isTop?'1':'0'}" data-is-ai="${m.isAi?'1':'0'}" onclick="chatShowMsg('${escHtml(m.name)}')" >
      <div class="chat-list-av" style="overflow:hidden;">${avContent}</div>
      <div class="chat-list-info">
        <div class="chat-list-name" style="display:flex;align-items:center;">${escHtml(m.name)}${topBadge}</div>
        <div class="chat-list-preview">${escHtml(m.preview||'')}</div>
      </div>
      <div class="chat-list-time">${m.time||''}</div>
    </div>`;
  }).join('');
  return `<div style="height:20px;"></div><div class="chat-list-card" id="chat-list-card">${items}</div>`;
}
function chatShowMsg(name){showToast('聊天功能开发中 🚀');}

/* ── Long-press bubble menu ── */
let _longPressTimer=null;
function chatAttachLongPress(){
  document.querySelectorAll('#chat-list-card .chat-list-item').forEach(el=>{
    if(el._lpBound) return;   // ← 防止重复绑定
    el._lpBound = true;
    el.addEventListener('touchstart',function(e){
      const name=el.dataset.contactName;
      _longPressTimer=setTimeout(()=>{chatLongPressMenu(name,el);},500);
    },{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(_longPressTimer),{passive:true});
    el.addEventListener('touchmove',()=>clearTimeout(_longPressTimer),{passive:true});
  });
}
function chatAttachContactsLongPress(){
  document.querySelectorAll('.contacts-item-new[data-contact-name]').forEach(el=>{
    if(el._lpBound) return;   // ← 防止重复绑定
    el._lpBound = true;
    el.addEventListener('touchstart',function(e){
      const name=el.dataset.contactName;
      _longPressTimer=setTimeout(()=>{chatLongPressMenu(name,el);},500);
    },{passive:true});
    el.addEventListener('touchend',()=>clearTimeout(_longPressTimer),{passive:true});
    el.addEventListener('touchmove',()=>clearTimeout(_longPressTimer),{passive:true});
  });
}
function chatLongPressMenu(nameOrEvt,nameOrEl,elArg){
  // Support old (e, name, el) and new (name, el) call signatures
  let name, el;
  if(typeof nameOrEvt==='string'){name=nameOrEvt;el=nameOrEl;}
  else{name=nameOrEl;el=elArg;}
  document.querySelectorAll('.chat-bubble-menu').forEach(m=>m.remove());
  document.querySelectorAll('.chat-bubble-overlay').forEach(m=>m.remove());
  const isTop=(el&&el.dataset&&el.dataset.isTop)==='1';

  // Overlay backdrop
  const overlay=document.createElement('div');
  overlay.className='chat-bubble-overlay';
  overlay.style.cssText='position:fixed;inset:0;z-index:8999;background:rgba(0,0,0,0.25);';

  const isDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
  const menuBg=isDark?'rgba(40,40,42,0.9)':'rgba(255,255,255,0.9)';
  const menuBorder=isDark?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.6)';
  const textColor=isDark?'#f5f5f7':'#1c1c1e';
  const sepColor=isDark?'rgba(255,255,255,0.12)':'rgba(0,0,0,0.1)';

  const menu=document.createElement('div');
  menu.className='chat-bubble-menu';
  menu.style.cssText=`
    position:fixed;z-index:9000;
    top:0;left:0;
    display:flex;flex-direction:row;align-items:center;gap:4px;
    background:${isDark?'rgba(0,0,0,0.4)':'rgba(255,255,255,0.3)'};
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border:1px solid ${menuBorder};
    border-radius:24px;
    padding:6px 12px;
    box-shadow:0 4px 24px rgba(0,0,0,0.18);
    min-width:0;
    opacity:0;
    transition:opacity 0.25s ease-out,transform 0.25s ease-out;
    transform:translateY(-6px);
    pointer-events:none;
  `;
  // Position after append so we know menu dimensions
  document.body.appendChild(menu);

  const menuItems=[
    {label:isTop?'取消置顶':'置顶',icon:'<svg width="16" height="16" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg"><path d="M557.728 688v288.384H466.24V688H227.52c-9.6 0-18.048-3.712-24.96-11.264A37.824 37.824 0 0 1 192 649.984c0-48.768 14.432-92.704 43.584-131.84 29.12-38.976 61.92-58.56 98.56-58.56V200.512c-19.296 0-35.84-7.552-50.048-22.656a76.16 76.16 0 0 1-21.12-53.6c0-20.672 7.04-38.4 21.12-53.6 13.984-14.976 30.72-22.656 50.048-22.656h355.584c19.296 0 35.84 7.552 50.048 22.656 13.984 15.104 21.152 32.928 21.152 53.6 0 20.672-7.04 38.4-21.12 53.6-14.112 15.232-30.784 22.656-50.08 22.656v258.944c36.64 0 69.568 19.584 98.56 58.56A215.424 215.424 0 0 1 832 649.984c0 10.272-3.456 19.328-10.528 26.752-7.04 7.424-15.36 11.264-24.96 11.264H557.76z" fill="currentColor"/></svg>',action:()=>chatToggleTop(name)},
    {label:'删除',icon:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>',action:()=>contactsDeleteItemByName(name),danger:true}
  ];

  menuItems.forEach((item,i)=>{
    if(i>0){
      const sep=document.createElement('div');
      sep.style.cssText=`width:1px;height:32px;background:${sepColor};flex-shrink:0;`;
      menu.appendChild(sep);
    }
    const btn=document.createElement('div');
    btn.style.cssText=`display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 14px;cursor:pointer;color:${item.danger?'#ff3b30':textColor};-webkit-tap-highlight-color:transparent;min-width:60px;`;
    btn.innerHTML=`<span style="color:${item.danger?'#ff3b30':(isDark?'#aaa':'#555')};display:flex;align-items:center;">${item.icon}</span><span style="font-size:12px;font-weight:500;white-space:nowrap;">${item.label}</span>`;
    btn.addEventListener('click',()=>{overlay.remove();menu.remove();item.action();});
    menu.appendChild(btn);
  });

  overlay.addEventListener('click',()=>{overlay.remove();menu.remove();});
  document.body.appendChild(overlay);
  // Position menu relative to target element
  requestAnimationFrame(()=>{
    const mW=menu.offsetWidth||160;
    const mH=menu.offsetHeight||48;
    let top,left;
    if(el&&el.getBoundingClientRect){
      const r=el.getBoundingClientRect();
      left=r.left+r.width/2-mW/2;
      top=r.top-mH-8;
      if(top<8)top=r.bottom+8;
      left=Math.max(8,Math.min(left,window.innerWidth-mW-8));
    } else {
      top=window.innerHeight/2-mH/2;
      left=window.innerWidth/2-mW/2;
    }
    menu.style.top=top+'px';
    menu.style.left=left+'px';
    menu.style.pointerEvents='auto';
    requestAnimationFrame(()=>{
      menu.style.opacity='1';
      menu.style.transform='translateY(0)';
    });
  });
}
function chatToggleTop(name){
  const data=chatGetData();
  data.contacts.groups.forEach(g=>g.contacts.forEach(c=>{if(c.name===name)c.isTop=!c.isTop;}));
  chatSaveData(data);
  if(CHAT_STATE.currentTab==='chats'){
    const body=document.getElementById('chat-app-body');if(!body)return;
    const page=document.createElement('div');page.className='chat-page';
    page.innerHTML=chatBuildChats();body.innerHTML='';body.appendChild(page);

/* ── Contacts Tab (Redesigned) ── */
function chatBuildContacts(){
  const data=chatGetData();
  const groups=data.contacts.groups;
  const allContacts=groups.reduce((a,g)=>a.concat(g.contacts),[]);
  const dm=CHAT_STATE.contactsDeleteMode;
  const sq=CHAT_STATE.contactsSearch||'';
  const selGroup=CHAT_STATE.contactsGroup||'all';

  // Scrollable avatar row
  let avRowHTML='';
  allContacts.forEach(c=>{
    const init=(c.name||'?')[0];
    const avImg=c.avatar?`<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:16px;font-weight:700;color:#fff;">${init}</span>`;
    avRowHTML+=`<div class="contacts-av-item" onclick="chatShowContact('${escHtml(c.name)}')">
      <div class="contacts-av-circle">${avImg}</div>
      <div class="contacts-av-label">${escHtml(c.name)}</div>
    </div>`;
  });

  // Group tabs
  let tabsHTML=`<div class="contacts-group-tab ${selGroup==='all'?'active':''}" onclick="contactsSwitchGroup('all')">全部</div>`;
  groups.forEach(g=>{
    tabsHTML+=`<div class="contacts-group-tab ${selGroup===g.name?'active':''}" onclick="contactsSwitchGroup('${escHtml(g.name)}')">${escHtml(g.name)}</div>`;
  });

  // Filter contacts
  let filtered=selGroup==='all'?allContacts:((groups.find(g=>g.name===selGroup)||{contacts:[]}).contacts);
  if(sq)filtered=filtered.filter(c=>c.name.toLowerCase().includes(sq.toLowerCase()));

  // Contact list
  let listHTML='';
  if(!filtered.length){
    listHTML=`<div style="text-align:center;padding:40px 0;color:#aeaeb2;font-size:14px;font-style:italic;">暂无联系人</div>`;
  } else {
    filtered.forEach(c=>{
      const init=(c.name||'?')[0];
      const avImg=c.avatar?`<img src="${c.avatar}" style="width:100%;height:100%;object-fit:cover;">`:`<span style="font-size:16px;font-weight:700;color:#fff;">${init}</span>`;
      const aiTag=c.isAi?`<span style="font-size:10px;background:rgba(0,122,255,0.15);color:#007aff;border-radius:6px;padding:1px 6px;margin-left:6px;">AI</span>`:'';
      const topBadgeC=c.isTop?`<svg width="13" height="13" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" style="margin-left:4px;vertical-align:middle;flex-shrink:0;pointer-events:none;"><path d="M557.728 688v288.384H466.24V688H227.52c-9.6 0-18.048-3.712-24.96-11.264A37.824 37.824 0 0 1 192 649.984c0-48.768 14.432-92.704 43.584-131.84 29.12-38.976 61.92-58.56 98.56-58.56V200.512c-19.296 0-35.84-7.552-50.048-22.656a76.16 76.16 0 0 1-21.12-53.6c0-20.672 7.04-38.4 21.12-53.6 13.984-14.976 30.72-22.656 50.048-22.656h355.584c19.296 0 35.84 7.552 50.048 22.656 13.984 15.104 21.152 32.928 21.152 53.6 0 20.672-7.04 38.4-21.12 53.6-14.112 15.232-30.784 22.656-50.08 22.656v258.944c36.64 0 69.568 19.584 98.56 58.56A215.424 215.424 0 0 1 832 649.984c0 10.272-3.456 19.328-10.528 26.752-7.04 7.424-15.36 11.264-24.96 11.264H557.76z" fill="#9C9C9C"/></svg>`:'';
      let rightEl='';
      if(dm){
        rightEl=`<div class="contacts-delete-indicator" onclick="contactsDeleteItem('${escHtml(c.name)}',event)" style="cursor:pointer;padding:4px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg></div>`;
      } else {
        rightEl=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>`;
      }
      const subText=c.persona?`<div class="contacts-item-sub" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;">${escHtml(c.persona)}</div>`:'';
      listHTML+=`<div class="contacts-item-new${dm?' delete-mode':''}" data-contact-name="${escHtml(c.name)}" data-is-top="${c.isTop?'1':'0'}" onclick="${dm?'':'chatShowContact(\''+escHtml(c.name)+'\')'}">
        <div class="contacts-item-av">${avImg}</div>
        <div class="contacts-item-info">
          <div class="contacts-item-name" style="display:flex;align-items:center;">${escHtml(c.name)}${topBadgeC}${aiTag}</div>
          ${subText}
        </div>
        ${rightEl}
      </div>`;
    });
  }

  return `<div class="contacts-page-wrap">
    <div class="contacts-serif-title">Contacts</div>
    <div class="contacts-avatar-scroll-outer"><div class="contacts-avatar-scroll">${avRowHTML||'<div style="color:#aeaeb2;font-size:13px;padding:16px 0;">暂无联系人</div>'}</div></div>
    <div class="contacts-action-row">
      <div class="contacts-action-icon-btn" title="添加联系人" onclick="chatAddContact()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14m-7-7h14"/></svg>
      </div>
      <div class="contacts-manage-btn" onclick="contactsManageGroups()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        管理分组
      </div>
      <div class="contacts-action-icon-btn${dm?' delete-active':''}" title="删除模式" onclick="contactsToggleDelete()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="${dm?'#ff3b30':'currentColor'}" stroke-width="1.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
    </div>
    <div class="contacts-search-wrap">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#aeaeb2" stroke-width="1.5" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      <input class="contacts-search-input" id="contacts-search-inp" placeholder="搜索联系人…" value="${sq}" oninput="contactsDoSearch(this.value)" autocomplete="off">
    </div>

    <div class="contacts-list-wrap">${listHTML}</div>
  </div>`;
}

  CHAT_STATE.contactsGroup=g;
  _contactsRefresh();

function contactsToggleDelete(){
  CHAT_STATE.contactsDeleteMode=!CHAT_STATE.contactsDeleteMode;
  _contactsRefresh();

function contactsDoSearch(val){
  CHAT_STATE.contactsSearch=val;
  _contactsRefresh();
}
function contactsManageGroups(){
  const data=chatGetData();
  // Build a live list with delete buttons inside the modal
  function buildGroupRows(groups){
    return groups.map((g,i)=>`<div class="xsj-group-row" id="xsj-grow-${i}">
      <span class="xsj-group-name">${escHtml(g.name)}</span>
      <div class="xsj-group-del" onclick="_modalDelGroup(${i})" title="删除">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#ff3b30" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </div>
    </div>`).join('');
  }
  let workingGroups=data.contacts.groups.map(g=>({name:g.name,contacts:g.contacts}));
  // Use a closure-scoped function instead of window._modalDelGroup to avoid global pollution
  function _localDelGroup(idx){
    workingGroups.splice(idx,1);
    const listEl=document.getElementById('xsj-groups-list');
    if(listEl)listEl.innerHTML=buildGroupRows(workingGroups);
  }
  // Expose temporarily so inline onclick in the generated HTML can call it
  window._modalDelGroup=_localDelGroup;
  showModal({
    title:'管理分组',subtitle:'Manage Groups',
    contentHtml:`<div id="xsj-groups-list">${buildGroupRows(workingGroups)}</div>
    <div style="margin-top:8px;font-size:12px;color:#aeaeb2;text-align:center;">如需新增分组，请在 Chats 页面点击「+Add」按钮</div>`,
    onConfirm(){
      const d=chatGetData();
      // Merge: keep contacts from existing groups, new groups get empty contacts
      const merged=workingGroups.map(wg=>{
        const orig=d.contacts.groups.find(g=>g.name===wg.name);
        return {name:wg.name,contacts:orig?orig.contacts:[]};
      });
      d.contacts.groups=merged;
      chatSaveData(d);
      _contactsRefresh();
    }
  });
}
function contactsDeleteItem(name,ev){
  if(ev)ev.stopPropagation();
  showModal({
    title:'删除联系人',subtitle:'Delete Contact',
    contentHtml:`<div class="xsj-confirm-text">确认删除联系人<br><strong>「${escHtml(name)}」</strong> 吗？<br><span style="font-size:13px;color:#8e8e93;">此操作无法撤销</span></div>`,
    onConfirm(){
      const data=chatGetData();
      data.contacts.groups.forEach(g=>{g.contacts=g.contacts.filter(c=>c.name!==name);});
      chatSaveData(data);_contactsRefresh();
    }
  });
}
function _contactsRefresh(){

  let _newWorldBook='';
  const bodyHtml=`
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:16px;">
      <div id="nc-av-preview" onclick="document.getElementById('nc-av-file').click()" style="width:80px;height:80px;border-radius:50%;background:rgba(142,142,147,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;border:2px dashed rgba(142,142,147,0.4);transition:opacity .2s;">

      </div>
      <div style="font-size:11px;color:#aeaeb2;margin-top:2px;">点击更换头像</div>
      <input type="file" id="nc-av-file" accept="image/*" style="display:none" onchange="(function(inp){const f=inp.files[0];if(!f)return;compressImage(f,200,0.8,function(s){window._newAvatar=s;const p=document.getElementById('nc-av-preview');if(p){p.innerHTML='';const img=document.createElement('img');img.src=s;img.style.cssText='width:100%;height:100%;object-fit:cover;';p.appendChild(img);}});inp.value='';})(this)">
    </div>
    <div class="xsj-field-wrap"><div class="xsj-field-label">姓名 <span style="color:#ff3b30">*</span></div><input class="xsj-input" data-field="ncname" placeholder="请输入姓名" autocomplete="off"></div>
    <div class="xsj-field-wrap"><div class="xsj-field-label">性别</div>
      <div style="display:flex;gap:12px;padding:8px 0;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;"><input type="radio" name="nc-gender" value="男" data-field="ncgender" style="accent-color:#1c1c1e;"> 男</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;"><input type="radio" name="nc-gender" value="女" data-field="ncgender" checked style="accent-color:#1c1c1e;"> 女</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px;"><input type="radio" name="nc-gender" value="其他" data-field="ncgender" style="accent-color:#1c1c1e;"> 其他</label>
      </div>
    </div>
    <div class="xsj-field-wrap"><div class="xsj-field-label">具体人设</div><textarea class="xsj-textarea" data-field="ncpersona" placeholder="描述具体的人物性格、背景等" rows="3" style="resize:none;"></textarea></div>

      <div style="display:flex;align-items:center;gap:8px;">
        <span id="nc-wb-label" style="font-size:13px;color:#8e8e93;flex:1;">未选择</span>
        <div class="xsj-upload-btn" onclick="chatSelectWorldBook()" style="white-space:nowrap;">选择世界书</div>

    <div class="xsj-field-wrap"><div class="xsj-field-label">分组</div><select class="xsj-select" data-field="ncgroup">${groupOpts}</select></div>
  `;
  window._newAvatar='';
  window._newWorldBook='';

    onConfirm(d){
      if(!d.ncname||!d.ncname.trim()){showToast('请输入联系人姓名');return;}
      const data2=chatGetData();
      // Find gender from radio button
      const genderRadio=document.querySelector('input[name="nc-gender"]:checked');

function nameToPinyin(name){
  if(!name)return'USER';
  let result='';
  for(let i=0;i<name.length;i++){
    const ch=name[i];
    if(/[a-zA-Z]/.test(ch)){result+=ch.toUpperCase();}
    else if(PINYIN_MAP[ch]){result+=PINYIN_MAP[ch];}
    else if(/[\u4e00-\u9fff]/.test(ch)){
      // Unknown CJK: use unicode codepoint rough approximation
      const cp=ch.codePointAt(0);
      const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      result+=letters[(cp-0x4e00)%26];
    }
    // skip spaces/punctuation
  }
  return result||'USER';
}

function formatMomentTime(ts){
  const d=new Date(ts);
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const day=days[d.getDay()];
  const hh=String(d.getHours()).padStart(2,'0');
  const mm=String(d.getMinutes()).padStart(2,'0');
  return day+' · '+hh+':'+mm;
}

let _dscActiveMenu=null;
let _dscMenuOverlay=null;
function dscShowPostMenu(postId, btnEl){
  // Remove any existing menu
  if(_dscActiveMenu){_dscActiveMenu.remove();_dscActiveMenu=null;}
  if(_dscMenuOverlay){_dscMenuOverlay.remove();_dscMenuOverlay=null;}

  const isDark=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;

  // Backdrop overlay (invisible, just for outside-click detection)
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;z-index:9099;';
  _dscMenuOverlay=overlay;
  document.body.appendChild(overlay);

  // Build menu
  const menu=document.createElement('div');
  menu.className='dsc-post-menu';
  _dscActiveMenu=menu;

  const items=[
    {label:'编辑',icon:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,action:()=>{closeDscMenu();dscEditPost(postId);}},
    {label:'删除',icon:`<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`,danger:true,action:()=>{closeDscMenu();dscDeletePost(postId);}}
  ];

  items.forEach((item,i)=>{
    if(i>0){
      const sep=document.createElement('div');
      sep.className='dsc-post-menu-sep';
      menu.appendChild(sep);
    }
    const btn=document.createElement('div');
    btn.className='dsc-post-menu-item'+(item.danger?' danger':'');
    btn.innerHTML=`<span style="display:flex;align-items:center;">${item.icon}</span><span>${item.label}</span>`;
    btn.addEventListener('click',(e)=>{e.stopPropagation();item.action();});
    menu.appendChild(btn);
  });

  document.body.appendChild(menu);

  // Position near the button
  requestAnimationFrame(()=>{
    const mW=menu.offsetWidth||120;
    const mH=menu.offsetHeight||50;
    const r=btnEl.getBoundingClientRect();
    let top=r.bottom+6;
    let left=r.right-mW;
    if(top+mH>window.innerHeight-8)top=r.top-mH-6;
    left=Math.max(8,Math.min(left,window.innerWidth-mW-8));
    menu.style.top=top+'px';
    menu.style.left=left+'px';
    requestAnimationFrame(()=>menu.classList.add('visible'));
  });

  overlay.addEventListener('click',closeDscMenu);
}
function closeDscMenu(){
  if(_dscActiveMenu){
    _dscActiveMenu.classList.remove('visible');
    const m=_dscActiveMenu;
    setTimeout(()=>{if(m.parentNode)m.remove();},200);
    _dscActiveMenu=null;
  }
  if(_dscMenuOverlay){_dscMenuOverlay.remove();_dscMenuOverlay=null;}
}

/* ── AI Image Description ── */
async function dscAiDescribeImages(){
  const imgs=window._dscNewImages||[];
  if(!imgs.length){showToast('请先上传图片');return;}
  const btn=document.getElementById('dsc-ai-desc-btn');
  const ta=document.getElementById('dsc-new-content');
  if(!btn||!ta)return;
  btn.style.opacity='0.5';
  btn.style.pointerEvents='none';
  btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10" stroke-dasharray="31" stroke-dashoffset="10"><animateTransform attributeName="transform" type="rotate" dur="0.8s" values="0 12 12;360 12 12" repeatCount="indefinite"/></circle></svg> AI 描述中…`;

  // ── AbortController：15 秒超时 ──
  const controller = new AbortController();
  const timeoutId = setTimeout(()=>controller.abort(), 15000);

  try {
    // Build content array with the first image (or all images)
    const imageContents=imgs.slice(0,3).map(src=>{
      // src is a data URL like "data:image/jpeg;base64,..."
      const match=src.match(/^data:(image\/[^;]+);base64,(.+)$/);
      if(!match)return null;
      return {type:'image',source:{type:'base64',media_type:match[1],data:match[2]}};
    }).filter(Boolean);

    if(!imageContents.length){showToast('图片格式解析失败，请重新上传');return;}

    imageContents.push({type:'text',text:'请用中文简洁描述这张（或这几张）图片的内容，适合作为朋友圈动态文字，50字以内，不要带引号。'});

    // ⚠️  注意：Anthropic API 不支持浏览器直接跨域调用。
    //     实际部署时请将此请求改为通过你自己的后端服务中转，
    //     并在后端添加 "x-api-key" 请求头。
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      signal: controller.signal,
      headers:{
        'Content-Type':'application/json',
        'anthropic-version':'2023-06-01'
        // 'x-api-key': 'YOUR_KEY'  ← 必须通过后端代理传入，请勿在前端硬编码密钥
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:200,
        messages:[{role:'user',content:imageContents}]
      })
    });

    if(!resp.ok){
      const errBody = await resp.json().catch(()=>({}));
      const errType = errBody && errBody.error && errBody.error.type;
      if(resp.status===401||errType==='authentication_error'){
        showToast('AI 调用失败：需要通过后端代理并配置 API 密钥');
      } else if(resp.status===429){
        showToast('AI 请求过于频繁，请稍后重试');
      } else {
        showToast('AI 描述失败（' + resp.status + '），请重试');
      }
      return;
    }

    const json=await resp.json();
    const text=(json.content||[]).map(c=>c.type==='text'?c.text:'').join('').trim();
    if(text){
      ta.value=text;
      // Also set the data-field value by dispatching input event
      ta.dispatchEvent(new Event('input',{bubbles:true}));
      showToast('AI描述已填入 ✓');
    } else {
      showToast('AI描述失败，请重试');
    }
  } catch(e){
    if(e && e.name === 'AbortError'){
      showToast('AI 描述超时（15s），请检查网络后重试');
    } else {
      showToast('网络请求失败，请检查网络连接');
    }
  } finally {
    clearTimeout(timeoutId);
    if(btn){
      btn.style.opacity='1';btn.style.pointerEvents='auto';
      btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg> AI 描述图片`;
    }
  }
}

function dscToggleLike(postId,btnEl){
  const data=chatGetData();
  if(!data.discovers)return;
  const post=data.discovers.find(p=>p.id===postId);
  if(!post)return;
  post._liked=!post._liked;
  post.likes=(post.likes||0)+(post._liked?1:-1);
  if(post.likes<0)post.likes=0;
  chatSaveData(data);
  // Animate the like button
  const svg=btnEl&&btnEl.querySelector('svg');
  if(svg)svg.style.fill=post._liked?'#ff3b30':'none';
  if(svg)svg.style.stroke=post._liked?'#ff3b30':'currentColor';
  showToast(post._liked?'已点赞 ❤️':'取消点赞');
}

    onConfirm(d){
      const content=(d.econtent||'').trim();
      if(!content&&(!window._dscEditImages||!window._dscEditImages.length)){showToast('请输入内容或添加图片');return;}
      data.discovers[postIdx]={
        ...post,
        content:content,
        images:window._dscEditImages||[],
        img:window._dscEditImages&&window._dscEditImages[0]||post.img||''
      };
      chatSaveData(data);
      window._dscEditImages=[];
      chatSwitchTab('discover');
      showToast('动态已更新 ✓');
    }
  });
}
window.dscHandleEditImages=function(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  const wrap=document.getElementById('dsc-edit-imgs-wrap');
  files.forEach(f=>{
    compressImage(f,600,0.82,function(src){
      window._dscEditImages=window._dscEditImages||[];
      window._dscEditImages.push(src);
      if(wrap){
        const cell=document.createElement('div');
        cell.style.cssText='width:56px;height:56px;border-radius:8px;overflow:hidden;flex-shrink:0;position:relative;';
        const img=document.createElement('img');img.src=src;img.style.cssText='width:100%;height:100%;object-fit:cover;';
        cell.appendChild(img);wrap.appendChild(cell);
      }
    });
  });
  input.value='';
};

/* ── Post: Delete ── */
function dscDeletePost(postId){
  showModal({
    title:'删除动态',subtitle:'Delete Moment',
    contentHtml:`<div class="xsj-confirm-text">确认删除这条动态吗？<br><span style="font-size:13px;color:#8e8e93;">此操作无法撤销</span></div>`,
    onConfirm(){
      const data=chatGetData();
      if(!data.discovers)return;
      data.discovers=data.discovers.filter(p=>p.id!==postId);
      chatSaveData(data);
      chatSwitchTab('discover');
      showToast('动态已删除');
    }
  });
}

/* ── Me page interaction helpers ── */
function meTriggerAvatar(){document.getElementById('me-av-input').click();}
function meHandleAvatar(input){
  const f=input.files[0];if(!f)return;
  compressImage(f,200,0.82,function(src){
    XSJ.set(XSJ.AVATAR,src);
    // Update card avatar
    const circle=document.getElementById('me-av-circle');
    if(circle){
      let img=circle.querySelector('img');
      if(!img){img=document.createElement('img');img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;';circle.appendChild(img);}
      img.src=src;
      const svg=circle.querySelector('svg');if(svg)svg.style.display='none';
    }
    // Sync chat header avatar
    const hi=document.getElementById('chat-hdr-av-img'),hs=document.getElementById('chat-hdr-av-svg');
    if(hi){hi.src=src;hi.style.display='block';}if(hs)hs.style.display='none';
    // Sync main screen avatar
    const mai=document.getElementById('avatar-img');if(mai){mai.src=src;mai.style.display='block';}
    const map=document.getElementById('avatar-placeholder');if(map)map.style.display='none';
    showToast('头像已更新 ✓');
  });
  input.value='';
}
function meEditName(){
  const cur=XSJ.get(XSJ.NAME,'')||'用户名';
  showModal({
    title:'修改用户名',subtitle:'Edit Username',

    onConfirm(d){

function meEditStatus(){
  const cur=XSJ.get(XSJ.STATUS,'·在线');

    onConfirm(d){

function meEditUserId(){
  const cur=XSJ.get(XSJ.USER_ID,'@username');
  showModal({
    title:'修改用户ID',subtitle:'Edit User ID',
    contentHtml:`<div class="xsj-field-wrap"><div class="xsj-field-label">用户ID（仅限字母、数字、下划线）</div><input class="xsj-input" data-field="val" placeholder="@username" value="${escHtml(cur)}" autocomplete="off"></div>`,
    onConfirm(d){
      let uid=(d.val||'').trim();
      if(!uid){return;}
      // Strip leading @ for validation
      const raw=uid.startsWith('@')?uid.slice(1):uid;
      if(!/^[a-zA-Z0-9_]+$/.test(raw)){showToast('ID只能含字母、数字、下划线');return;}
      const finalId='@'+raw;
      XSJ.set(XSJ.USER_ID,finalId);
      const el=document.getElementById('me-card-userid');if(el)el.textContent=finalId;
    }
  });
}

// ── Music Panel ──
let isMusicPanelOpen = false;
function toggleMusicPanel() {
  isMusicPanelOpen = !isMusicPanelOpen;
  const panel = document.getElementById('music-panel');
  const disc = document.getElementById('music-disc');
  if (isMusicPanelOpen) {
    panel.classList.add('open');
    requestAnimationFrame(() => panel.classList.add('animated'));
    disc.classList.add('spinning');
  } else {
    panel.classList.remove('animated');
    setTimeout(function(){ if (!isMusicPanelOpen) panel.classList.remove('open'); }, 200);
    disc.classList.remove('spinning');
  }
}
document.getElementById('music-disc-input').addEventListener('change', function(e) {
  const f = e.target.files[0]; if (!f) return;
  compressImage(f, 150, 0.8, function(src) {
    const img = document.getElementById('music-disc-img');
    const svg = document.getElementById('music-disc-svg');
    img.src = src; img.style.display = 'block';
    if (svg) svg.style.display = 'none';
    localStorage.setItem('musicDiscImage', src);
  });
  this.value = '';
});
(function() {
  const saved = localStorage.getItem('musicDiscImage');
  if (saved) {
    const img = document.getElementById('music-disc-img');
    const svg = document.getElementById('music-disc-svg');
    if (img) { img.src = saved; img.style.display = 'block'; }
    if (svg) svg.style.display = 'none';
  }
})();
</script>
