<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>小手机</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#181818" media="(prefers-color-scheme: dark)">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/chat.css">
<link rel="stylesheet" href="css/conversation.css">
<link rel="stylesheet" href="css/apps.css">
<link rel="stylesheet" href="css/worldbook.css">
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
  <div class="scan-line"></div>
  <div class="grid-bg"></div>

  <div class="coord tl">51.5074°N</div>
  <div class="coord tr">YIMO.AI</div>
  <div class="coord bl">2026</div>
  <div class="coord br">v1.0</div>

  <div class="dot-matrix">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>

  <div class="center-block">
    <div class="yimo-letters">
      <span class="yimo-letter">Y</span>
      <span class="yimo-letter">I</span>
      <span class="yimo-letter">M</span>
      <span class="yimo-letter">O</span>
      <div class="type-cursor"></div>
    </div>
    <div class="h-rule"></div>
    <div class="subtitle-row">
      <span class="subtitle-dot"></span>
      <span class="subtitle-text">Next Generation AI</span>
      <span class="subtitle-dot"></span>
    </div>
  </div>

  <div class="version-tag">SYS.INIT — READY</div>
</div>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <!-- Body: left time + divider + right info -->
  <div id="lock-body" style="align-items:flex-start;padding-top:calc(env(safe-area-inset-top,0) + 36px);">
    <div style="width:100%;max-width:800px;display:flex;flex-direction:column;align-items:center;transform:translateY(5px);">
      <!-- Date row above time module -->
      <div id="lock-date-full" style="font-size:16px;color:var(--text-tertiary);text-align:center;margin-bottom:8px;font-family:'Helvetica Neue',Arial,'PingFang SC',sans-serif;letter-spacing:.5px;"></div>
      <div id="lock-main-row">
        <!-- Left: big time -->
        <div id="lock-left">
          <span id="lock-hour">--</span>
          <div id="lock-colon">
            <div class="lock-dot"></div>
            <div class="lock-dot"></div>
          </div>
          <span id="lock-min">--</span>
        </div>
        <!-- Divider -->
        <div id="lock-divider"></div>
        <!-- Right: info rows (no avatar) -->
        <div id="lock-right">
          <div id="lock-info-row1">
            <span id="lock-info-name">TIME</span>
            <span style="font-size:clamp(22px,4.5vw,52px);color:var(--text);margin-left:4px;opacity:.7;line-height:1;align-self:center;">♥</span>
            <input type="file" id="lock-av-input" accept="image/*" style="display:none;">
          </div>
          <div class="lock-info-line" id="lock-info-date">Mar 31</div>
          <div class="lock-info-line" id="lock-info-weather">晴 18°C</div>
        </div>
      </div>
    </div>
  </div>
  <!-- Bottom location -->
  <div id="lock-location">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
    <span id="lock-info-city">广州</span>
  </div>
  <!-- Unlock slider -->
  <div class="unlock-track glass" id="unlock-track">
    <span class="unlock-text">滑动以解锁</span>
    <div class="unlock-thumb glass" id="unlock-thumb" style="background:rgba(100,100,100,0.8);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>
</div>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div class="pages-container" id="pages-container">
    <!-- PAGE 1 -->
    <div class="page" id="page1">
      <!-- User Info -->
      <div style="display:flex;flex-direction:column;align-items:center;padding-top:28px;padding-bottom:2px;">
        <!-- Complex Avatar Component -->
        <div id="avatar-root" style="position:relative;width:142px;height:142px;display:flex;align-items:center;justify-content:center;">
          <!-- 1. Outer decorative ring -->
          <div style="position:absolute;width:calc(100% - 2px);height:calc(100% - 2px);top:1px;left:1px;border-radius:50%;border:2.5px solid var(--layer-3);z-index:1;pointer-events:none;"></div>
          <!-- 2. Avatar main body -->
          <div id="avatar-wrap" style="position:absolute;width:122px;height:122px;border-radius:61px;overflow:hidden;cursor:pointer;z-index:2;background:var(--layer-1);">
            <div id="avatar-placeholder" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--layer-2);">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted);"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/></svg>
            </div>
            <img id="avatar-img" style="width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;display:none;">
            <input type="file" id="avatar-input" accept="image/*" style="display:none;">
          </div>
          <!-- 4. Plus/edit button bottom-right -->
          <div id="avatar-plus-btn" style="position:absolute;bottom:6px;right:4px;width:26px;height:26px;border-radius:13px;background:var(--layer-4);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4;" onclick="document.getElementById('avatar-input').click()">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14m-7-7h14"/></svg>
          </div>
        </div>
        <div id="username" class="editable" style="font-size:16px;font-weight:500;margin-top:10px;color:var(--text);letter-spacing:1px;">用户名</div>
        <div id="user-bio" class="editable" style="font-size:11px;margin-top:3px;color:var(--text-muted);letter-spacing:0.5px;">点击编辑签名</div>
      </div>

      <!-- BIG TIME BLOCK -->
      <div class="time-block">
        <div class="time-big" id="home-time">14:52</div>
        <div class="time-sub">
          <span id="home-date">3月30日 星期一</span>
          <span style="opacity:.35;">·</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"/></svg>
          <span>晴 24°C</span>
        </div>
      </div>

      <!-- App Icons -->
      <div class="icon-grid-4 home-primary-apps" style="margin-top:24px;">
        <div class="app-icon-wrap" onclick="openApp('settings')">
          <div class="app-icon-box glass-card"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09a1.65 1.65 0 00-1.08-1.51 1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09a1.65 1.65 0 001.51-1.08 1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001.08 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.26.6.77 1.02 1.51 1.08H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1.08z"/></svg></div>
          <span class="app-icon-label">设置</span>
        </div>
        <div class="app-icon-wrap" onclick="openApp('worldbook')">
          <div class="app-icon-box glass-card"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15.3 15.3 0 014 9 15.3 15.3 0 01-4 9 15.3 15.3 0 01-4-9 15.3 15.3 0 014-9z"/></svg></div>
          <span class="app-icon-label">世界书</span>
        </div>
        <div class="app-icon-wrap" onclick="openApp('memory')">
          <div class="app-icon-box glass-card"><svg width="24" height="24" viewBox="0 0 1024 1024" fill="currentColor" stroke="none"><path d="M778.666667 512V298.666667A138.666667 138.666667 0 0 0 640 160H341.333333A138.666667 138.666667 0 0 0 202.666667 298.666667v384A138.666667 138.666667 0 0 0 341.333333 821.333333h149.333334a32 32 0 0 1 0 64H341.333333A202.666667 202.666667 0 0 1 138.666667 682.666667V298.666667A202.666667 202.666667 0 0 1 341.333333 96h298.666667A202.666667 202.666667 0 0 1 842.666667 298.666667v213.333333a32 32 0 0 1-64 0z"/><path d="M640 309.333333a32 32 0 0 1 0 64H341.333333a32 32 0 1 1 0-64h298.666667zM554.666667 437.333333a32 32 0 0 1 0 64H341.333333a32 32 0 0 1 0-64h213.333334zM725.333333 522.666667a32 32 0 0 1 30.805334 23.296l18.133333 64.213333a96 96 0 0 0 66.218667 66.176l64.213333 18.176a32 32 0 0 1 0 61.610667l-64.213333 18.133333a96 96 0 0 0-66.218667 66.218667l-18.133333 64.213333a32 32 0 0 1-61.610667 0l-18.133333-64.213333a96 96 0 0 0-66.218667-66.218667l-64.213333-18.133333a32 32 0 0 1 0-61.610667l64.213333-18.133333a96 96 0 0 0 66.176-66.218667l18.176-64.213333A32 32 0 0 1 725.333333 522.666667z m0 136.149333A159.914667 159.914667 0 0 1 658.816 725.333333 159.914667 159.914667 0 0 1 725.333333 791.808 160 160 0 0 1 791.808 725.333333 159.914667 159.914667 0 0 1 725.333333 658.816z"/></svg></div>
          <span class="app-icon-label">记忆</span>
        </div>
        <div class="app-icon-wrap" onclick="openApp('chat')">
          <div class="app-icon-box glass-card"><svg width="24" height="24" viewBox="0 0 1024 1024" fill="currentColor" stroke="none"><path d="M512 96C229.2 96 0 282.3 0 512c0 92.1 36.8 177.1 99.1 246 4 4.5 5.3 10.9 3.1 16.5-5.7 14.7-12 29.2-19 43.3-12.9 26.3-28.2 51.7-45.3 75.5-6.2 8.6-7.7 19.7-4.1 29.6 3.6 10 11.9 17.5 22.2 20.1 9.4 2.4 25.2 5.4 44.8 5.4 26 0 58.7-5.4 91.5-25 21.4-12.8 37.5-28.6 49.3-44 4.5-5.9 12.5-7.9 19.3-4.8 74.2 34 159.8 53.4 251 53.4 282.8 0 512-186.3 512-416S794.8 96 512 96z m192 464c-30.9 0-56-25.1-56-56s25.1-56 56-56 56 25.1 56 56-25.1 56-56 56z m-440-56c0-30.9 25.1-56 56-56s56 25.1 56 56-25.1 56-56 56-56-25.1-56-56z m192 0c0-30.9 25.1-56 56-56s56 25.1 56 56-25.1 56-56 56-56-25.1-56-56z"/></svg></div>
          <span class="app-icon-label">Chat</span>
        </div>
      </div>

      <!-- Chat Messages — editable text, changeable avatars, iMessage tails -->
      <div style="margin-top:24px;">
        <div class="chat-row right">
          <div class="chat-avatar-sm" id="chatAvR" onclick="changeChatAvatar('R')">
            <svg class="chat-av-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/></svg>
          </div>
          <div class="bubble-wrap">
            <div class="chat-bubble glass-card" id="bubbleR" onclick="editBubble('R')">Hey! 最近怎么样？</div>
          </div>
        </div>
        <div class="chat-row">
          <div class="chat-avatar-sm" id="chatAvL" onclick="changeChatAvatar('L')">
            <svg class="chat-av-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/></svg>
          </div>
          <div class="bubble-wrap">
            <div class="chat-bubble glass-card" id="bubbleL" onclick="editBubble('L')">一切都好！新项目很顺利。</div>
          </div>
        </div>
      </div>
      <div style="height:10px;"></div>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page2">
      <!-- Anniversary Card -->
      <input type="file" id="anni-bg-input" accept="image/*" style="display:none;">
      <div class="anni-card glass-card" style="margin-top:8px;">
        <div class="anni-img" id="anni-img-area">
          <svg width="48" height="48" viewBox="0 0 40 40" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 20h8l3-8 4 16 3-8h8"/>
            <path d="M26 11c1.2-1.8 3.5-2.5 5.2-1.2s1.5 3.8 0 5.8L26 21l-5.2-5.4c-1.5-2-1.5-4.5 0-5.8s4-.6 5.2 1.2z" fill="#ffffff" opacity=".3"/>
          </svg>
          <!-- Bottom fade overlay for smooth transition -->
          <div style="position:absolute;bottom:0;left:0;right:0;height:40px;background:linear-gradient(to bottom,transparent,var(--card-bg));pointer-events:none;border-radius:0;"></div>
          <!-- Change background button -->
          <div onclick="document.getElementById('anni-bg-input').click()" style="position:absolute;bottom:10px;right:10px;width:28px;height:28px;border-radius:14px;background:rgba(0,0,0,0.35);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;border:1px solid rgba(255,255,255,0.2);" title="更换背景图">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          </div>
        </div>
        <div class="anni-info" onclick="editAnni()" style="cursor:pointer;">
          <div>
            <div style="font-size:15px;font-weight:500;color:var(--text);" id="anni-title">此处添加纪念日</div>
            <div style="font-size:12px;color:var(--text-muted);margin-top:4px;" id="anni-date-label">2025年1月1日</div>
          </div>
          <div style="display:flex;align-items:baseline;gap:2px;">
            <span style="font-size:38px;font-weight:600;letter-spacing:-2px;line-height:1;color:var(--text-secondary);" id="anni-days">0</span>
            <span style="font-size:14px;font-weight:500;color:var(--text-muted);">天</span>
          </div>
        </div>
      </div>

      <!-- Icons 2x2 + Calendar — equal halves -->
      <div style="display:flex;gap:10px;margin-top:16px;align-items:stretch;">
        <div class="grid-2x2" style="flex:1;min-width:0;">
          <div class="app-icon-wrap" onclick="openApp('forum')" style="transform:translateX(-4px);">
            <div class="app-icon-box glass-card"><svg width="24" height="24" viewBox="0 0 1228 1024" fill="currentColor" stroke="none"><path d="M246.784 204.8H146.978133c34.6112-118.033067 150.869333-204.8 288.904534-204.8h493.568C1094.792533 0 1228.8 124.450133 1228.8 277.981867v351.095466c0 115.5072-76.458667 217.019733-188.757333 258.389334l-7.918934 49.288533c-1.774933 10.922667-5.461333 21.640533-10.922666 31.5392-27.784533 50.312533-94.208 70.178133-148.48 44.373333l-221.934934-105.608533H614.4V819.2h59.1872l242.2784 115.370667a16.384 16.384 0 0 0 21.162667-6.417067 13.9264 13.9264 0 0 0 1.570133-4.5056l16.7936-103.765333 29.422933-7.714134c87.6544-22.801067 149.504-97.348267 149.504-183.159466V277.981867c0-105.0624-91.7504-190.190933-204.8-190.190934H435.8144c-85.1968 0-158.242133 48.264533-189.098667 117.009067z m298.325333 774.826667c-91.204267 28.330667-195.447467 44.373333-306.176 44.373333-83.1488 0-162.6112-9.079467-235.588266-25.531733A275.114667 275.114667 0 0 1 0 955.733333v-18.6368a273.066667 273.066667 0 0 1 546.133333 0V955.733333c0 8.055467-0.341333 15.9744-1.024 23.893334zM263.099733 273.339733c11.332267 0.2048 22.664533 0.682667 33.860267 1.2288 89.224533 11.127467 158.173867 83.968 158.173867 172.2368 0 95.982933-81.5104 173.806933-182.0672 173.806934-100.5568 0-182.0672-77.824-182.0672-173.806934 0-92.7744 76.1856-168.5504 172.100266-173.4656zM682.666667 546.133333a68.266667 68.266667 0 1 1 0-136.533333 68.266667 68.266667 0 0 1 0 136.533333z m273.066666 0a68.266667 68.266667 0 1 1 0-136.533333 68.266667 68.266667 0 0 1 0 136.533333z"/></svg></div>
            <span class="app-icon-label">论坛</span>
          </div>
          <div class="app-icon-wrap" onclick="openApp('game')">
            <div class="app-icon-box glass-card"><svg width="22" height="22" viewBox="0 0 1024 1024" fill="currentColor" stroke="none"><path d="M725.333333 149.333333c141.376 0 256 114.624 256 256v298.666667a170.666667 170.666667 0 1 1-341.333333 0v-42.666667H383.978667L384 704a170.666667 170.666667 0 1 1-341.333333 0V405.333333C42.666667 263.957333 157.290667 149.333333 298.666667 149.333333h426.666666z m-21.333333 64H320c-115.84 0-210.090667 92.309333-213.248 207.36L106.666667 426.666667v277.333333a106.666667 106.666667 0 0 0 213.226666 4.629333L320 704v-85.333333a21.333333 21.333333 0 0 1 21.333333-21.333334h341.333334a21.333333 21.333333 0 0 1 21.333333 21.333334v85.333333a106.666667 106.666667 0 0 0 213.226667 4.629333L917.333333 704V426.666667c0-117.824-95.509333-213.333333-213.333333-213.333334z m10.666667 256a32 32 0 1 1 0 64 32 32 0 0 1 0-64z m-405.333334-128a32 32 0 0 1 32 32V405.333333h32a32 32 0 0 1 0 64H341.333333v32a32 32 0 0 1-64 0V469.333333h-32a32 32 0 0 1 0-64H277.333333v-32a32 32 0 0 1 32-32z m469.333334 64a32 32 0 1 1 0 64 32 32 0 0 1 0-64z m-128 0a32 32 0 1 1 0 64 32 32 0 0 1 0-64z m64-64a32 32 0 1 1 0 64 32 32 0 0 1 0-64z"/></svg></div>
            <span class="app-icon-label">游戏</span>
          </div>
          <div class="app-icon-wrap" onclick="openApp('beautify')" style="transform:translateX(-4px);">
            <div class="app-icon-box glass-card"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18"/><circle cx="11" cy="11" r="2"/></svg></div>
            <span class="app-icon-label">美化</span>
          </div>
          <div class="app-icon-wrap" onclick="openApp('shop')">
            <div class="app-icon-box glass-card"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg></div>
            <span class="app-icon-label">商城</span>
          </div>
        </div>

        <!-- Calendar — Agenda Card -->
        <div class="cal-wrapper glass-card" id="cal-agenda-widget" style="flex:1;min-width:0;">
