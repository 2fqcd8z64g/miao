<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>小手机</title>
<style>
  :root {
    --bg: #ffffff;
    --text: #2a2a2a;
    --glass-bg: #f7f7f7;
    --glass-border: transparent;
    --shadow: none;
    --card-bg: #f7f7f7;
    --subtle: #f7f7f7;
    --text-shadow: none;
    --safe-top: env(safe-area-inset-top, 0px);
    --layer-1: #f7f7f7;
    --layer-2: #f0f0f0;
    --layer-3: #e2e2e2;
    --layer-4: #d4d4d4;
    --text-secondary: #666666;
    --text-tertiary: #999999;
    --text-muted: #999999;
    --border-soft: transparent;
    --app-icon-bg: rgba(255,255,255,0);
    --app-icon-backdrop: blur(7px) saturate(1.55);
    --app-icon-border-color: rgba(0,0,0,0.05);
    --app-icon-shadow: 0 1px 2px rgba(0,0,0,0.03), inset 0 0 0 0.5px rgba(255,255,255,0.55);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181818;
      --text: #e8e8e8;
      --glass-bg: #222222;
      --glass-border: transparent;
      --shadow: none;
      --card-bg: #222222;
      --subtle: #222222;
      --text-shadow: none;
      --layer-1: #222222;
      --layer-2: #2c2c2c;
      --layer-3: #3c3c3c;
      --layer-4: #4e4e4e;
      --text-secondary: #999999;
      --text-tertiary: #666666;
      --text-muted: #555555;
      --border-soft: transparent;
      --app-icon-bg: rgba(255,255,255,0);
      --app-icon-backdrop: blur(7px) saturate(1.55);
      --app-icon-border-color: rgba(255,255,255,0.07);
      --app-icon-shadow: 0 1px 2px rgba(0,0,0,0.15), inset 0 0 0 0.5px rgba(255,255,255,0.08);
    }
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{background:var(--bg);overscroll-behavior:none;}
  body{
    font-family:'Quicksand',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);
    overflow:hidden;width:100vw;height:100vh;height:100dvh;
    user-select:none;-webkit-user-select:none;
    overscroll-behavior:none;
  }
  .glass{background:rgba(255,255,255,0.48);backdrop-filter:blur(11px) saturate(1.8);-webkit-backdrop-filter:blur(11px) saturate(1.8);border-radius:16px;border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.04),inset 0 0 0 0.5px rgba(255,255,255,0.6);}
  .glass-card{background:rgba(255,255,255,0.42);backdrop-filter:blur(11px) saturate(1.8);-webkit-backdrop-filter:blur(11px) saturate(1.8);border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.04),inset 0 0 0 0.5px rgba(255,255,255,0.55);}
  @media(prefers-color-scheme:dark){
    .glass{background:rgba(40,40,40,0.45);border-color:rgba(255,255,255,0.08);box-shadow:0 1px 2px rgba(0,0,0,0.25),inset 0 0 0 0.5px rgba(255,255,255,0.08);}
    .glass-card{background:rgba(40,40,40,0.4);border-color:rgba(255,255,255,0.07);box-shadow:0 1px 2px rgba(0,0,0,0.25),inset 0 0 0 0.5px rgba(255,255,255,0.07);}
  }
  .active-scale{transition:opacity 0.25s ease-out;}
  .active-scale:active{opacity:0.7;}

  /* Loading */
  #loading-screen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;background:var(--bg);transition:opacity .3s ease;}
  #loading-screen.fade-out{opacity:0;}

  /* Scan line */
  .scan-line{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(0,0,0,0.08) 20%,rgba(0,0,0,0.15) 50%,rgba(0,0,0,0.08) 80%,transparent 100%);animation:scanDown 2.5s ease-in-out forwards;opacity:0;}
  @keyframes scanDown{0%{top:0;opacity:0;}5%{opacity:1;}95%{opacity:1;}100%{top:100%;opacity:0;}}

  /* Grid bg */
  .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(0,0,0,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,0,0,0.015) 1px,transparent 1px);background-size:clamp(30px,8vw,50px) clamp(30px,8vw,50px);opacity:0;animation:gridIn 2s ease-out 0.3s forwards;}
  @keyframes gridIn{to{opacity:1;}}

  /* Center block */
  .center-block{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}

  /* YIMO letters */
  .yimo-letters{display:flex;align-items:baseline;gap:clamp(6px,2vw,14px);position:relative;}
  .yimo-letter{font-family:'Bodoni Moda','Didot','Playfair Display','Georgia',serif;font-size:clamp(56px,14vw,96px);font-weight:400;color:#1a1a1a;opacity:0;transform:translateY(20px);display:inline-block;position:relative;}
  .yimo-letter:nth-child(1){animation:letterDrop 0.6s cubic-bezier(0.23,1,0.32,1) 1.0s forwards;}
  .yimo-letter:nth-child(2){animation:letterDrop 0.6s cubic-bezier(0.23,1,0.32,1) 1.3s forwards;}
  .yimo-letter:nth-child(3){animation:letterDrop 0.6s cubic-bezier(0.23,1,0.32,1) 1.6s forwards;}
  .yimo-letter:nth-child(4){animation:letterDrop 0.6s cubic-bezier(0.23,1,0.32,1) 1.9s forwards;}
  @keyframes letterDrop{0%{opacity:0;transform:translateY(20px);filter:blur(4px);}60%{filter:blur(0);}100%{opacity:1;transform:translateY(0);filter:blur(0);}}

  /* Cursor blink */
  .type-cursor{width:2px;height:clamp(40px,10vw,68px);background:#1a1a1a;margin-left:clamp(2px,0.5vw,6px);align-self:center;opacity:0;animation:cursorBlink 0.8s step-end 1.0s infinite,cursorAppear 0.1s ease 1.0s forwards;}
  @keyframes cursorBlink{0%,50%{opacity:1;}51%,100%{opacity:0;}}
  @keyframes cursorAppear{to{opacity:1;}}

  /* H rule */
  .h-rule{width:clamp(200px,50vw,400px);height:1px;position:relative;margin-top:clamp(20px,4vw,32px);overflow:hidden;}
  .h-rule::before{content:'';position:absolute;top:0;left:50%;right:50%;height:100%;background:rgba(0,0,0,0.1);animation:ruleExpand 0.8s ease-out 2.4s forwards;}
  @keyframes ruleExpand{to{left:0;right:0;}}

  /* Subtitle */
  .subtitle-row{display:flex;align-items:center;gap:clamp(10px,3vw,20px);margin-top:clamp(14px,3vw,24px);opacity:0;animation:fadeUp 0.6s ease-out 2.8s forwards;}
  .subtitle-dot{width:3px;height:3px;border-radius:50%;background:#ccc;}
  .subtitle-text{font-family:'Quicksand','Helvetica Neue','SF Pro Text',sans-serif;font-size:clamp(9px,2vw,11px);font-weight:300;letter-spacing:clamp(3px,1.5vw,6px);color:var(--text-muted);text-transform:uppercase;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

  /* Version tag */
  .version-tag{position:absolute;bottom:clamp(40px,8vh,70px);font-family:'SF Mono','Fira Code',monospace;font-size:clamp(8px,1.8vw,10px);letter-spacing:2px;color:#d0d0d0;opacity:0;animation:fadeUp 0.5s ease-out 3.2s forwards;}

  /* Corner coords */
  .coord{position:absolute;font-family:'SF Mono','Fira Code','Courier New',monospace;font-size:clamp(7px,1.5vw,9px);color:rgba(0,0,0,0.08);letter-spacing:1px;opacity:0;animation:fadeUp 1s ease-out 0.5s forwards;}
  .coord.tl{top:clamp(16px,4vw,30px);left:clamp(16px,4vw,30px);}
  .coord.tr{top:clamp(16px,4vw,30px);right:clamp(16px,4vw,30px);}
  .coord.bl{bottom:clamp(16px,4vw,30px);left:clamp(16px,4vw,30px);}
  .coord.br{bottom:clamp(16px,4vw,30px);right:clamp(16px,4vw,30px);}

  /* Dot matrix */
  .dot-matrix{position:absolute;top:20%;right:10%;display:grid;grid-template-columns:repeat(5,clamp(4px,1vw,6px));gap:clamp(6px,1.5vw,10px);opacity:0;animation:fadeUp 1.5s ease-out 2s forwards;}
  .dot-matrix span{width:clamp(2px,0.5vw,3px);height:clamp(2px,0.5vw,3px);border-radius:50%;background:var(--layer-2);}

  /* Lock Screen */
  #lock-screen{
    position:fixed;inset:0;z-index:8000;display:none;
    flex-direction:column;align-items:center;justify-content:center;
    background:var(--bg);
    background-size:cover;background-position:center;
    padding-top:env(safe-area-inset-top,0);padding-bottom:env(safe-area-inset-bottom,0);
    opacity:0;transition:opacity .3s ease;
  }
  #lock-screen.visible{opacity:1;}

  /* Main screen fade+slide */
  #main-screen{transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Lock body = 85% height, flex column */
  #lock-body{
    width:100%;flex:1;display:flex;align-items:center;justify-content:center;
    padding:0 10%;
  }
  /* Left + divider + right row */
  #lock-main-row{
    display:flex;flex-direction:row;align-items:center;
    width:100%;max-width:800px;gap:0;
  }
  /* Left: time */
  #lock-left{
    flex:0 0 60%;display:flex;align-items:center;justify-content:center;
    gap:0;
  }
  #lock-hour,#lock-min{
    font-family:'Quicksand','Times New Roman',Georgia,'Noto Serif',serif;
    font-size:clamp(80px,22vw,200px);
    font-weight:300;color:var(--text);line-height:1;
    font-variant-numeric:tabular-nums;
  }
  #lock-colon{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:clamp(14px,3vw,27px);
    padding:0 clamp(10px,2vw,36px);
    margin-bottom:3px;
  }
  .lock-dot{
    width:clamp(6px,1.2vw,18px);height:clamp(6px,1.2vw,18px);
    border-radius:50%;background:var(--text-secondary);
    flex-shrink:0;
  }
  @media (prefers-color-scheme:dark){.lock-dot{background:var(--text-secondary);}}
  /* Divider */
  #lock-divider{
    width:1px;background:var(--layer-3);
    height:clamp(64px,16vw,160px);
    flex-shrink:0;
    margin:0 clamp(16px,3vw,40px);
  }
  @media (prefers-color-scheme:dark){#lock-divider{background:var(--layer-3);}}
  /* Right: info */
  #lock-right{
    flex:0 0 30%;display:flex;flex-direction:column;justify-content:center;
    gap:clamp(12px,2.5vw,24px);
    font-family:'Quicksand','Helvetica Neue',Arial,'PingFang SC',sans-serif;
  }
  #lock-info-row1{display:flex;align-items:center;gap:clamp(8px,1.5vw,16px);flex-wrap:nowrap;}
  #lock-info-name{
    font-size:clamp(16px,3.5vw,40px);font-weight:500;
    letter-spacing:2px;text-transform:uppercase;
    color:var(--text);white-space:nowrap;
  }
  #lock-info-avatar{
    width:clamp(28px,4vw,48px);height:clamp(28px,4vw,48px);
    border-radius:50%;background:var(--subtle);
    border:1px solid rgba(150,150,150,0.3);
    overflow:hidden;flex-shrink:0;cursor:pointer;
  }
  #lock-info-avatar img{width:100%;height:100%;object-fit:cover;}
  .lock-info-line{
    font-size:clamp(12px,2.2vw,32px);font-weight:400;
    color:var(--text-tertiary);white-space:nowrap;
  }
  /* Bottom location area */
  #lock-location{
    display:flex;align-items:center;justify-content:center;gap:8px;
    padding-bottom:calc(env(safe-area-inset-bottom,0) + 100px);
    font-family:'Quicksand','Helvetica Neue',Arial,'PingFang SC',sans-serif;
    font-size:clamp(12px,2.2vw,32px);font-weight:400;color:var(--text-tertiary);
  }
  #lock-location svg{flex-shrink:0;color:var(--text-tertiary);}
  .unlock-track{position:absolute;bottom:calc(40px + env(safe-area-inset-bottom,0));width:260px;height:48px;border-radius:24px;display:flex;align-items:center;padding:3px;overflow:hidden;}
  .unlock-text{position:absolute;width:100%;text-align:center;font-size:13px;opacity:.4;pointer-events:none;letter-spacing:1px;}
  .unlock-thumb{position:relative;z-index:2;width:42px;height:42px;min-width:42px;border-radius:21px;display:flex;align-items:center;justify-content:center;cursor:grab;touch-action:none;background:rgba(100,100,100,0.8);}
  @media (prefers-color-scheme:dark){.unlock-thumb{background:rgba(80,80,80,0.9);}}

  #main-screen{display:none;width:100vw;height:100vh;height:100dvh;position:relative;overflow:hidden;background-color:var(--bg);background-size:cover;background-position:center;transition:opacity .4s ease,transform .4s ease;}
  #main-screen.entering{opacity:0;transform:translateY(20px);}

  /* Pages */
  .pages-container{width:100vw;height:100%;overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;display:flex;scrollbar-width:none;touch-action:pan-x;}
  .pages-container::-webkit-scrollbar{display:none;}
  .page{min-width:100vw;width:100vw;height:100%;scroll-snap-align:start;overflow-y:hidden;overflow-x:hidden;padding-top:calc(16px + env(safe-area-inset-top,0));padding-bottom:calc(150px + env(safe-area-inset-bottom,0));padding-left:18px;padding-right:18px;scrollbar-width:none;}
  .page::-webkit-scrollbar{display:none;}

  /* FIXED bottom controls overlay */
  .fixed-bottom{
    position:fixed;left:0;right:0;z-index:450;
    bottom:calc(100px + env(safe-area-inset-bottom,0));
    display:flex;flex-direction:column;align-items:center;gap:8px;
    pointer-events:none;
  }
  .fixed-bottom>*{pointer-events:auto;}

  /* Dock */
  .dock{position:fixed;bottom:0;left:0;right:0;z-index:500;margin:0 10px;margin-bottom:calc(9px + env(safe-area-inset-bottom,0));border-radius:24px;padding:11px 18px;display:flex;align-items:center;justify-content:space-evenly;gap:8px;background:rgba(255,255,255,0.58);backdrop-filter:blur(15px) saturate(2.0);-webkit-backdrop-filter:blur(15px) saturate(2.0);border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.05),inset 0 0 0 0.5px rgba(255,255,255,0.65);}
  @media(prefers-color-scheme:dark){.dock{background:rgba(30,30,30,0.55);border-color:rgba(255,255,255,0.08);box-shadow:0 1px 2px rgba(0,0,0,0.3),inset 0 0 0 0.5px rgba(255,255,255,0.08);}}

  /* App Icons */
  .app-icon-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;min-width:60px;}
  .app-icon-wrap:active .app-icon-box{opacity:0.7;}
  .app-icon-box{width:60px;height:60px;border-radius:17px;display:flex;align-items:center;justify-content:center;transition:opacity .25s ease-out,background .25s ease-out,box-shadow .25s ease-out,border-color .25s ease-out;position:relative;overflow:hidden;background:var(--app-icon-bg) !important;backdrop-filter:var(--app-icon-backdrop);-webkit-backdrop-filter:var(--app-icon-backdrop);border:0.5px solid var(--app-icon-border-color);box-shadow:var(--app-icon-shadow) !important;color:#777 !important;}
  .app-icon-box svg{color:inherit !important;}
  @media(prefers-color-scheme:dark){
    .app-icon-box{background:var(--app-icon-bg) !important;border-color:var(--app-icon-border-color);box-shadow:var(--app-icon-shadow) !important;color:#aaa !important;}
    .app-icon-box svg{color:inherit !important;}
  }
  .app-icon-label{font-size:10.5px;color:var(--text-tertiary);font-weight:400;letter-spacing:0.3px;line-height:1.15;}

  /* Page dots with pill animation */
  .page-dots{display:flex;gap:6px;align-items:center;justify-content:center;}
  .page-dot{
    height:5px;border-radius:3px;background:var(--text);
    transition:width .4s cubic-bezier(.4,0,.2,1),opacity .4s ease;
  }
  .page-dot.active{width:18px;opacity:.5;}
  .page-dot:not(.active){width:5px;opacity:.15;}

  /* Mini Search */
  .mini-search{width:120px;height:30px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--text-tertiary);cursor:pointer;background:rgba(255,255,255,0.5);backdrop-filter:blur(11px) saturate(1.8);-webkit-backdrop-filter:blur(11px) saturate(1.8);border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.04),inset 0 0 0 0.5px rgba(255,255,255,0.6);}
  @media(prefers-color-scheme:dark){.mini-search{background:rgba(40,40,40,0.45);border-color:rgba(255,255,255,0.07);box-shadow:0 1px 2px rgba(0,0,0,0.2),inset 0 0 0 0.5px rgba(255,255,255,0.07);}}

  /* Chat Bubbles with iMessage tails */
  .chat-row{display:flex;align-items:flex-end;gap:6px;margin-bottom:8px;}
  .chat-row.right{flex-direction:row-reverse;}
  .chat-avatar-sm{width:32px;height:32px;min-width:32px;border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(200,200,200,0.22);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:0.5px solid rgba(0,0,0,0.05);overflow:hidden;cursor:pointer;position:relative;flex-shrink:0;box-shadow:inset 0 0 0 0.5px rgba(255,255,255,0.3);}
  .chat-avatar-sm img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
  .bubble-wrap{position:relative;max-width:70%;}
  .chat-bubble{padding:8px 14px;border-radius:18px;font-size:12px;line-height:1.5;position:relative;cursor:pointer;transition:opacity 0.3s cubic-bezier(0.25,0.46,0.45,0.94);background:rgba(255,255,255,0.4) !important;backdrop-filter:blur(9px) saturate(1.6);-webkit-backdrop-filter:blur(9px) saturate(1.6);border:0.5px solid rgba(0,0,0,0.05);color:var(--text-secondary);box-shadow:0 1px 2px rgba(0,0,0,0.03),inset 0 0 0 0.5px rgba(255,255,255,0.5) !important;}
  .chat-bubble:hover{opacity:.85;}
  /* Left tail */
  .chat-row:not(.right) .chat-bubble{border-bottom-left-radius:4px;}
  .chat-row:not(.right) .bubble-wrap::after{display:none;}
  /* Right tail */
  .chat-row.right .chat-bubble{border-bottom-right-radius:4px;background:rgba(240,240,240,0.45) !important;border-color:rgba(0,0,0,0.05);}
  .chat-row.right .bubble-wrap::after{display:none;}

  /* Big Time Block */
  .time-block{margin-top:0px;display:flex;flex-direction:column;align-items:center;}
  .time-big{font-family:'Quicksand',sans-serif;font-size:64px;font-weight:500;letter-spacing:-2px;line-height:1;font-variant-numeric:tabular-nums;color:var(--text);}
  .time-sub{display:flex;align-items:center;gap:8px;margin-top:6px;color:var(--text-muted);font-size:11px;letter-spacing:1px;}

  /* Anniversary */
  .anni-card{border-radius:20px;overflow:hidden;transition:opacity .25s ease-out;background:rgba(255,255,255,0.42);backdrop-filter:blur(11px) saturate(1.8);-webkit-backdrop-filter:blur(11px) saturate(1.8);border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.04),inset 0 0 0 0.5px rgba(255,255,255,0.55);}
  @media(prefers-color-scheme:dark){.anni-card{background:rgba(40,40,40,0.4);border-color:rgba(255,255,255,0.07);box-shadow:0 1px 2px rgba(0,0,0,0.25),inset 0 0 0 0.5px rgba(255,255,255,0.07);}}
  .anni-card:hover{opacity:0.9;}
  .anni-img{height:96px;background:linear-gradient(135deg,rgba(230,230,230,0.4) 0%,rgba(245,245,245,0.3) 100%);position:relative;display:flex;align-items:flex-start;padding:12px;overflow:hidden;}
  .anni-info{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}

  /* Calendar — compact */
  .cal-wrapper{border-radius:20px;padding:10px;background:rgba(255,255,255,0.42);backdrop-filter:blur(11px) saturate(1.8);-webkit-backdrop-filter:blur(11px) saturate(1.8);border:0.5px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.04),inset 0 0 0 0.5px rgba(255,255,255,0.55);aspect-ratio:1/0.9;display:flex;flex-direction:column;justify-content:space-between;}
  @media(prefers-color-scheme:dark){.cal-wrapper{background:rgba(40,40,40,0.4);border-color:rgba(255,255,255,0.07);box-shadow:0 1px 2px rgba(0,0,0,0.25),inset 0 0 0 0.5px rgba(255,255,255,0.07);}}
  .cal-week-strip{display:flex;gap:3px;}
  .cal-week-day{flex:1;text-align:center;padding:5px 0;border-radius:10px;background:rgba(0,0,0,0.025);transition:all 0.2s;}
  .cal-week-day.active{background:#111;border-radius:12px;}
  .cal-week-day .cal-wd-label{font-size:7px;color:#bbb;font-weight:400;}

  /* Photo Frames */
  .photo-frame{width:100px;height:100px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.3);backdrop-filter:blur(9px) saturate(1.6);-webkit-backdrop-filter:blur(9px) saturate(1.6);border:0.5px solid rgba(0,0,0,0.05);overflow:hidden;cursor:pointer;transition:opacity .25s ease-out;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,0.03),inset 0 0 0 0.5px rgba(255,255,255,0.5);}

  .app-overlay{

    overflow-y:auto;-webkit-overflow-scrolling:touch;

    width:100%;height:100%;

  }

  .chat-overlay-bg{

    backdrop-filter:blur(40px) !important;
    -webkit-backdrop-filter:blur(40px) !important;
  }
  @media(prefers-color-scheme:dark){
    .chat-overlay-bg{
      background:var(--bg) !important;
    }

  /* Chat module overrides padding=0, so it fills the full overlay */
  .chat-app-container{

    height:100%;width:100%;
    overflow:hidden;

  .app-title{font-family:'Quicksand',sans-serif;font-size:24px;font-weight:500;margin-bottom:24px;letter-spacing:0px;color:var(--text);}

  .app-toggle.on{background:var(--layer-4);}
  .app-toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:10px;background:var(--bg);transition:transform .2s;}
  .app-toggle.on::after{transform:translateX(18px);}
  .editable{cursor:pointer;transition:opacity .2s;}
  .editable:hover{opacity:.7;}

  .icon-grid-4{display:flex;justify-content:space-evenly;align-items:flex-start;gap:8px;}
  .home-primary-apps{position:relative;padding:0 2px;gap:8px;}
  .home-primary-apps .app-icon-wrap{position:relative;flex:1;min-width:0;}
  .dock .app-icon-box{width:60px;height:60px;border-radius:17px;}

  /* ── Music Panel ── REMOVED ── */

  /* ── TabBar frosted glass blur strip ── REMOVED ── */
  .chat-tabbar-fade{
    display:none;

  /* ── Glass card light highlight (radial gradient corners) ── */
  .chat-list-card,.contact-item,.contacts-item-new,.me-setting-card,.discover-card,.moments-card{position:relative;}
  .chat-list-card::before,.contact-item::before,.contacts-item-new::before,.me-setting-card::before,.discover-card::before,.moments-card::before{
    content:'';position:absolute;inset:0;pointer-events:none;border-radius:inherit;z-index:1;

    }

  .chat-list-card > *,.contact-item > *,.contacts-item-new > *,.me-setting-card > *,.discover-card > *,.moments-card > *{position:relative;z-index:2;}
  .chat-app-container{display:flex;flex-direction:column;height:100%;overflow:hidden;}

  .chat-tab-item{

  /* Chat list */
  .chat-list-card{background:var(--layer-1);border-radius:20px;overflow:hidden;}
  @media(prefers-color-scheme:dark){.chat-list-card{background:var(--layer-1);}}
  .chat-list-item{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer;transition:background 0.3s ease-out,opacity 0.3s ease-out;-webkit-tap-highlight-color:transparent;}

  .chat-list-av{width:46px;height:46px;border-radius:50%;background:var(--layer-3);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}

  .chat-list-time{font-size:11px;color:var(--text-muted);flex-shrink:0;}
  /* Contacts */
  .contact-group-title{font-size:15px;font-weight:500;color:var(--text);padding:18px 4px 8px;letter-spacing:.1px;border-bottom:1px solid rgba(0,0,0,0.03);margin-bottom:10px;}

  /* ── Discover / Moments new design ── */
  .moments-card{background:var(--layer-1);border-radius:20px;padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
  @media(prefers-color-scheme:dark){.moments-card{background:var(--layer-1);border-color:var(--border-soft);}}
  .moments-user-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
  .moments-av{width:42px;height:42px;border-radius:50%;background:var(--layer-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .moments-meta{flex:1;min-width:0;}
  .moments-uname{font-size:15px;font-weight:500;color:var(--text);line-height:1.25;}
  @media(prefers-color-scheme:dark){.moments-uname{color:var(--text);}}
  .moments-time{font-size:11px;color:var(--text-muted);margin-top:2px;}
  .moments-text{font-size:14px;color:var(--text-secondary);line-height:1.65;margin-bottom:10px;}
  @media(prefers-color-scheme:dark){.moments-text{color:var(--text);}}
  .moments-img-grid{display:grid;gap:4px;margin-bottom:10px;}
  .moments-img-grid.cols-1{grid-template-columns:1fr;max-width:180px;}
  .moments-img-grid.cols-2{grid-template-columns:1fr 1fr;}
  .moments-img-grid.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .moments-img-cell{aspect-ratio:1;border-radius:8px;background:var(--layer-2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .moments-img-cell img{width:100%;height:100%;object-fit:cover;}
  .moments-actions{display:flex;align-items:center;border-top:1px solid rgba(0,0,0,0.03);padding-top:9px;gap:0;}
  /* ── Discover page redesign ── */
  .dsc-page{width:100%;position:relative;margin:0;padding:0;overflow-x:hidden;}
  /* Top section: white bg + bottom radius */
  .dsc-top-section{position:relative;background:var(--bg);border-radius:0 0 14px 14px;overflow:hidden;}
  @media(prefers-color-scheme:dark){.dsc-top-section{background:var(--bg);}}
  /* Divider between sections */
  .dsc-section-divider{height:1px;width:100%;background:var(--border-soft);margin:0;}
  @media(prefers-color-scheme:dark){.dsc-section-divider{background:var(--border-soft);}}
  .dsc-page::-webkit-scrollbar{display:none;}
  .dsc-title-bar{position:absolute;top:0;left:0;right:0;z-index:10;text-align:center;padding-top:12px;padding-bottom:40px;pointer-events:none;}
  .dsc-title-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:80px;z-index:0;background:linear-gradient(to bottom,rgba(250,250,250,0.9),transparent);pointer-events:none;}
  @media(prefers-color-scheme:dark){.dsc-title-bar::before{background:linear-gradient(to bottom,rgba(26,26,26,0.9),transparent);}}
  .dsc-title-text{font-family:'Quicksand',sans-serif;font-size:24px;font-weight:500;color:var(--text);letter-spacing:1px;position:relative;z-index:1;display:inline-block;transform:translateY(2px);}
  @media(prefers-color-scheme:dark){.dsc-title-text{color:var(--text);}}
  .dsc-hero-bg{width:100%;height:190px;background:var(--layer-2);background-size:cover;background-position:center;cursor:pointer;flex-shrink:0;position:relative;}
  @media(prefers-color-scheme:dark){.dsc-hero-bg{background:var(--layer-2);}}
  .dsc-avatar-area{display:flex;flex-direction:column;align-items:center;margin-top:-40px;position:relative;z-index:5;}
  .dsc-avatar{width:80px;height:80px;border-radius:50%;border:2px solid var(--bg);background:var(--layer-2);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0;transition:opacity 0.3s ease-out;}
  .dsc-avatar-dot{display:none;}
  .dsc-username{font-size:20px;font-weight:500;color:var(--text);margin-top:8px;cursor:pointer;transition:opacity .2s;transform:translateY(-2px);}
  .dsc-username:active{opacity:0.6;}
  @media(prefers-color-scheme:dark){.dsc-username{color:var(--text);}}
  .dsc-bio{font-size:12px;color:var(--text-tertiary);margin-top:2px;text-align:center;cursor:pointer;transition:opacity .2s;}
  .dsc-bio:active{opacity:0.6;}
  /* ── Discover capsule bar (replaces weather row) ── */
  .dsc-capsule-bar{
    display:flex;align-items:center;
    height:36px;
    background:var(--layer-1);
    border-radius:18px;
    margin:8px 6px 6px;
    width:calc(100% - 12px);
    overflow:hidden;
    position:relative;
    flex-shrink:0;
  }
  @media(prefers-color-scheme:dark){.dsc-capsule-bar{background:var(--layer-1);}}
  .dsc-capsule-item{
    flex:1;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Quicksand',sans-serif;
    font-size:13px;
    font-weight:500;
    color:var(--text);
    text-align:center;
    position:relative;
  }
  @media(prefers-color-scheme:dark){.dsc-capsule-item{color:var(--text);}}
  .dsc-capsule-selected{
    background:var(--layer-2);
    border-radius:18px 0 0 18px;
  }
  @media(prefers-color-scheme:dark){.dsc-capsule-selected{background:var(--layer-2);}}
  .dsc-capsule-item:last-child::before{
    content:'';
    position:absolute;
    left:0;top:10%;
    width:1px;height:80%;
    background:var(--layer-3);
    pointer-events:none;
  }
  @media(prefers-color-scheme:dark){.dsc-capsule-item:last-child::before{background:var(--layer-3);}}
  .dsc-section-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;margin-top:4px;}
  .dsc-section-title{font-family:'Quicksand',sans-serif;font-size:15px;font-weight:500;color:var(--text);}
  @media(prefers-color-scheme:dark){.dsc-section-title{color:var(--text);}}
  .dsc-section-right{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--text-tertiary);cursor:pointer;transition:opacity .2s;-webkit-tap-highlight-color:transparent;}
  .dsc-section-right:active{opacity:0.5;}
  .dsc-posts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 8px;}
  .dsc-post-card{aspect-ratio:1;border-radius:10px;background:var(--layer-2);overflow:hidden;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center;transition:opacity .25s ease-out;color:var(--text-muted);}
  @media(prefers-color-scheme:dark){.dsc-post-card{background:var(--layer-2);border-color:var(--border-soft);color:var(--text-muted);}}
  .dsc-post-card:active{opacity:0.7;}
  .dsc-post-card img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
  /* ── New Moment Card (Friends section) ── */
  .dsc-friends-list{padding:0 16px 80px;}
  /* New card style: clean white, no glass */
  .dsc-mc{
    background:var(--layer-1);
    
    border-radius:10px;
    padding:12px;
    margin-bottom:10px;
    box-shadow:var(--shadow);
    position:relative;
  }
  /* Header row */
  .dsc-mc-hdr{display:flex;align-items:flex-start;gap:10px;margin-bottom:6px;}
  .dsc-mc-av{width:40px;height:40px;border-radius:50%;background:var(--layer-2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .dsc-mc-av img{width:100%;height:100%;object-fit:cover;}
  .dsc-mc-meta{flex:1;min-width:0;}
  .dsc-mc-name-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
  .dsc-mc-name{font-size:16px;font-weight:500;color:var(--text);line-height:1.2;white-space:nowrap;}
  @media(prefers-color-scheme:dark){.dsc-mc-name{color:var(--text);}}
  .dsc-mc-id{font-size:10px;font-weight:400;color:var(--text-muted);white-space:nowrap;}
  .dsc-mc-actions{display:flex;align-items:center;flex-shrink:0;margin-left:4px;align-self:flex-start;}
  .dsc-mc-icon-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-secondary);transition:opacity .2s;-webkit-tap-highlight-color:transparent;}
  @media(prefers-color-scheme:dark){.dsc-mc-icon-btn{color:var(--text-tertiary);}}
  .dsc-mc-icon-btn:active{opacity:0.5;}
  /* Three-dot menu button */
  .dsc-mc-dots-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:opacity .2s;-webkit-tap-highlight-color:transparent;border-radius:50%;}
  .dsc-mc-dots-btn:active{opacity:0.5;background:var(--layer-2);}
  .dsc-mc-dots-btn svg circle{fill:var(--text-tertiary);}
  @media(prefers-color-scheme:dark){
    .dsc-mc-dots-btn:active{background:rgba(255,255,255,0.06);}
    .dsc-mc-dots-btn svg circle{fill:var(--text-muted);}
  }
  /* Floating post action menu */
  .dsc-post-menu{
    position:fixed;z-index:9100;
    display:flex;flex-direction:row;align-items:center;
    background:var(--layer-1);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    
    border-radius:16px;
    padding:6px 4px;
    box-shadow:var(--shadow);
    gap:2px;
    opacity:0;
    transform:translateY(-6px) scale(0.96);
    transition:opacity 0.2s ease-out,transform 0.2s ease-out;
    pointer-events:none;
  }
  @media(prefers-color-scheme:dark){
    .dsc-post-menu{background:var(--layer-1);border-color:var(--border-soft);}
  }
  .dsc-post-menu.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
  .dsc-post-menu-item{
    display:flex;flex-direction:column;align-items:center;gap:4px;
    padding:6px 14px;cursor:pointer;border-radius:12px;
    color:var(--text);font-size:12px;font-weight:500;
    transition:background .15s ease;white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
  }
  @media(prefers-color-scheme:dark){.dsc-post-menu-item{color:var(--text);}}
  .dsc-post-menu-item:active{background:var(--layer-2);}
  @media(prefers-color-scheme:dark){.dsc-post-menu-item:active{background:var(--border-soft);}}
  .dsc-post-menu-item.danger{color:#cc3333;}
  .dsc-post-menu-sep{width:1px;height:32px;background:var(--border-soft);flex-shrink:0;}
  @media(prefers-color-scheme:dark){.dsc-post-menu-sep{background:var(--layer-2);}}
  /* Content — now lives inside .dsc-mc-meta */
  .dsc-mc-text{font-size:12px;font-weight:400;color:var(--text-secondary);line-height:1.5;margin-top:3px;word-break:break-word;}
  @media(prefers-color-scheme:dark){.dsc-mc-text{color:var(--text-tertiary);}}
  /* Image grid */
  .dsc-mc-imgs{display:grid;gap:4px;margin-bottom:8px;}
  .dsc-mc-imgs.n1{grid-template-columns:1fr;max-width:160px;}
  .dsc-mc-imgs.n2,.dsc-mc-imgs.n3,.dsc-mc-imgs.many{grid-template-columns:repeat(3,1fr);}
  .dsc-mc-img-cell{
    aspect-ratio:1;border-radius:5px;
    background:var(--layer-2);overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;position:relative;
  }
  @media(prefers-color-scheme:dark){.dsc-mc-img-cell{background:var(--layer-2);}}
  .dsc-mc-img-cell img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
  /* Footer */
  .dsc-mc-footer{display:flex;align-items:center;justify-content:space-between;}
  .dsc-mc-time{font-size:12px;color:var(--text-tertiary);display:inline-block;transform:translateY(1.5px);}
  .dsc-mc-btns{display:flex;align-items:center;gap:16px;}
  .dsc-mc-btn{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);transition:opacity .2s;-webkit-tap-highlight-color:transparent;}
  @media(prefers-color-scheme:dark){.dsc-mc-btn{color:var(--text-muted);}}
  .dsc-mc-btn:active{opacity:0.5;}
  .dsc-mc-share{width:20px;height:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);-webkit-tap-highlight-color:transparent;}
  @media(prefers-color-scheme:dark){.dsc-mc-share{color:var(--text-muted);}}
  /* Keep old selectors so other code doesn't break */
  .dsc-friend-card{display:none;}
  .dsc-friend-row,.dsc-friend-av,.dsc-friend-name,.dsc-friend-time,.dsc-friend-text{}
  @media(prefers-color-scheme:dark){.dsc-friend-text{color:var(--text);}}
  .dsc-friend-imgs{display:grid;gap:4px;margin-top:8px;}
  .dsc-friend-imgs.cols-1{grid-template-columns:1fr;max-width:160px;}
  .dsc-friend-imgs.cols-2{grid-template-columns:1fr 1fr;}
  .dsc-friend-imgs.cols-3{grid-template-columns:1fr 1fr 1fr;}
  .dsc-friend-img-cell{aspect-ratio:1;border-radius:7px;background:var(--layer-2);overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .dsc-friend-img-cell img{width:100%;height:100%;object-fit:cover;}
  .dsc-fab{position:fixed;bottom:calc(88px + env(safe-area-inset-bottom,0));right:20px;z-index:600;width:45px;height:45px;border-radius:50%;background:var(--layer-1);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);transition:opacity .25s ease-out;-webkit-tap-highlight-color:transparent;}
  @media(prefers-color-scheme:dark){.dsc-fab{background:var(--layer-1);border-color:var(--border-soft);}}
  .dsc-fab:active{opacity:0.65;}
  @media(prefers-color-scheme:dark){.moments-actions{border-top-color:rgba(255,255,255,0.03);}}
  .moments-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;font-size:12px;color:var(--text-tertiary);cursor:pointer;padding:3px 0;-webkit-tap-highlight-color:transparent;transition:opacity 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}
  .moments-action-btn:active{opacity:.5;}
  .moments-action-sep{width:1px;height:16px;background:var(--border-soft);flex-shrink:0;}
  /* ── Contacts Redesign ── */
  .contacts-page-wrap{padding:0 0 16px;}
  .contacts-serif-title{font-family:'Quicksand',sans-serif;font-size:35px;font-weight:500;color:var(--text);padding:16px 16px 10px;letter-spacing:-.3px;text-align:center;}
  @media(prefers-color-scheme:dark){.contacts-serif-title{color:var(--text);}}
  .contacts-avatar-scroll-outer{display:flex;justify-content:center;overflow:hidden;}
  .contacts-avatar-scroll{display:flex;gap:14px;overflow-x:auto;padding:4px 16px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;-webkit-mask-image:linear-gradient(to right,transparent,black 10%,black 90%,transparent);mask-image:linear-gradient(to right,transparent,black 10%,black 90%,transparent);}
  .contacts-avatar-scroll::-webkit-scrollbar{display:none;}
  .contacts-av-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
  .contacts-av-circle{width:57px;height:57px;border-radius:50%;background:var(--layer-2);display:flex;align-items:center;justify-content:center;overflow:hidden;border:1.5px solid var(--bg);transition:opacity 0.3s ease-out;}
  .contacts-av-circle:active{opacity:0.65;}
  .contacts-av-label{font-size:11px;color:var(--text-tertiary);max-width:54px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .contacts-action-row{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:12px;gap:8px;}
  .contacts-action-icon-btn{width:38px;height:38px;border-radius:20px;background:rgba(0,0,0,0.2);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform 0.3s cubic-bezier(0.25,0.46,0.45,0.94),background 0.3s ease;-webkit-tap-highlight-color:transparent;flex-shrink:0;color:#ffffff;}
  @media(prefers-color-scheme:dark){.contacts-action-icon-btn{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.18);color:#ffffff;}}
  .contacts-action-icon-btn:active{opacity:0.65;background:rgba(0,0,0,0.28);}
  @media(prefers-color-scheme:dark){.contacts-action-icon-btn:active{opacity:0.65;background:rgba(255,255,255,0.32);}}
  .contacts-action-icon-btn.delete-active{background:rgba(255,59,48,0.15);}
  .contacts-manage-btn{flex:1;height:38px;border-radius:19px;background:rgba(255,255,255,0.6);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-tertiary);transition:background 0.3s ease;-webkit-tap-highlight-color:transparent;}
  .contacts-manage-btn:active{background:rgba(142,142,147,0.25);}
  @media(prefers-color-scheme:dark){.contacts-manage-btn{background:rgba(0,0,0,0.5);}}
  .contacts-search-wrap{width:80%;margin:0 auto 12px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.18);border-radius:14px;padding:9px 14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
  @media(prefers-color-scheme:dark){.contacts-search-wrap{background:rgba(0,0,0,0.5);}}
  .contacts-search-input{flex:1;border:none;background:transparent;outline:none;font-size:14px;color:var(--text);font-family:inherit;}
  @media(prefers-color-scheme:dark){.contacts-search-input{color:var(--text);}}
  .contacts-search-input::placeholder{color:var(--text-muted);}
  .contacts-group-tabs{display:flex;gap:6px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none;justify-content:center;}
  .contacts-group-tabs::-webkit-scrollbar{display:none;}
  .contacts-group-tab{padding:6px 16px;border-radius:20px;font-size:13px;font-weight:500;color:var(--text-tertiary);cursor:pointer;white-space:nowrap;transition:all 0.25s ease-out;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
  .contacts-group-tab.active{background:rgba(28,28,30,0.9);color:#fff;}
  @media(prefers-color-scheme:dark){.contacts-group-tab.active{background:rgba(245,245,247,0.9);color:var(--text);}}
  .contacts-list-wrap{padding:0 16px;}
  .contacts-item-new{display:flex;align-items:center;gap:12px;padding:4px 16px;background:rgba(255,255,255,0.5);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-radius:24px;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity 0.3s ease-out;position:relative;}
  @media(prefers-color-scheme:dark){.contacts-item-new{background:rgba(0,0,0,0.3);border-color:var(--border-soft);}}
  .contacts-item-new:active{opacity:0.65;}
  .contacts-item-new.delete-mode::before{content:'';position:absolute;inset:0;background:rgba(255,59,48,0.07);border-radius:16px;pointer-events:none;}
  .contacts-item-av{width:40px;height:40px;border-radius:50%;background:var(--layer-2);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .contacts-item-info{flex:1;min-width:0;}
  /* ── Bubble context menu ── */
  .chat-bubble-menu{
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    
  }
  @keyframes bubbleMenuIn{from{opacity:0;transform:translateY(-8px);}to{opacity:1;transform:translateY(0);}}
  .chat-bubble-menu>div:active{background:var(--layer-2);}
  @media(prefers-color-scheme:dark){.chat-bubble-menu>div:active{background:rgba(255,255,255,0.06);}}

  /* ── contact card top badges ── */
  .contacts-item-name{font-size:14px;font-weight:600;color:var(--text);line-height:1.3;}
  @media(prefers-color-scheme:dark){.contacts-item-name{color:var(--text);}}
  .contacts-item-sub{font-size:11px;color:var(--text-muted);margin-top:1px;line-height:1.3;}
  .contacts-delete-indicator{
    width:32px;height:32px;border-radius:50%;
    background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.5);
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    cursor:pointer;color:#cc3333;
    transition:opacity .18s ease,transform .18s ease;
  }
  @media(prefers-color-scheme:dark){
    .contacts-delete-indicator{background:rgba(60,60,62,0.7);border-color:rgba(255,255,255,0.15);}
  }
  .contacts-delete-indicator:active{opacity:.6;}

  /* ── Custom Modal System ── */
  @keyframes modalIn{from{opacity:0;transform:translateY(calc(-50% + 12px)) translateX(-50%);}to{opacity:1;transform:translateY(-50%) translateX(-50%);}}
  @keyframes modalOut{from{opacity:1;transform:translateY(-50%) translateX(-50%);}to{opacity:0;transform:translateY(calc(-50% + 12px)) translateX(-50%);}}
  @keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
  @keyframes overlayOut{from{opacity:1;}to{opacity:0;}}
  .xsj-modal-overlay{
    position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.42);
    animation:overlayIn .25s ease-out forwards;
  }
  .xsj-modal-overlay.closing{animation:overlayOut .25s ease-out forwards;}
  .xsj-modal{
    position:fixed;top:50%;left:50%;z-index:9999;
    transform:translateY(-50%) translateX(-50%);
    width:calc(100% - 32px);max-width:380px;
    background:rgba(255,255,255,0.72);
    backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
    
    border-radius:28px;

  /* Form controls inside modal */

  .xsj-group-del{width:24px;height:24px;border-radius:12px;background:rgba(255,59,48,0.12);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:opacity .2s;}

  /* Toast */
  @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(8px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
  @keyframes toastOut{from{opacity:1;transform:translateX(-50%) translateY(0);}to{opacity:0;transform:translateX(-50%) translateY(8px);}}

  /* ════════════════════════════════════════════════════════════
     CHAT CONVERSATION VIEW — Korean ins aesthetic
     ════════════════════════════════════════════════════════════ */
  .conv-overlay{

  .conv-nav-center{

const DAYS_CN=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

function pad(n){return n<10?'0'+n:''+n;}

/* ── escHtml helper ── */
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── Unified localStorage helper (single source of truth for key names) ── */
const XSJ = {
  // Read a value; returns fallback if missing or parse error
  get(key, fallback) {
    try {
      const v = localStorage.getItem(key);
      return (v === null || v === undefined) ? fallback : v;
    } catch(e) { return fallback; }
  },
  // Write a value; silently handles QuotaExceededError
  set(key, value) {
    try { localStorage.setItem(key, value); return true; }
    catch(e) {
      if(e && (e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED')){
        showToast('⚠️ 存储空间不足，请清理图片后重试');
      }
      return false;
    }
  },
  // Canonical key aliases — always use these, never raw strings scattered around
  AVATAR:   'xsj_avatar',
  NAME:     'xsj_name',
  BIO:      'xsj_bio',
  STATUS:   'userStatus',
  USER_ID:  'userId',
  USER_BIO: 'userBio',
};

/* ── Key-name migration: run once to merge legacy duplicate keys ── */
(function _migrateKeys(){
  try {
    // avatar: merge meAvatar → xsj_avatar
    const legacyAv = localStorage.getItem('meAvatar');
    if(legacyAv && !localStorage.getItem('xsj_avatar')) {
      localStorage.setItem('xsj_avatar', legacyAv);
    }
    localStorage.removeItem('meAvatar');  // remove legacy duplicate
    // name: merge userName → xsj_name
    const legacyName = localStorage.getItem('userName');
    if(legacyName && !localStorage.getItem('xsj_name')) {
      localStorage.setItem('xsj_name', legacyName);
    }
    localStorage.removeItem('userName');  // remove legacy duplicate
  } catch(e) {}
})();

/* ── Toast ── */
function showToast(msg,dur){
  const t=document.createElement('div');t.className='xsj-toast';t.textContent=msg;document.body.appendChild(t);
  setTimeout(()=>{t.style.animation='toastOut .25s ease forwards';setTimeout(()=>t.remove(),260);},(dur||2000));
}

/* ── Modal stack counter (prevents overflow flickering when modals overlap) ── */
let _modalOpenCount = 0;

/* ── Core showModal ── */
function showModal(opts){
  // opts: {title, subtitle, contentHtml, onConfirm, onCancel, showReset, onReset}
  const overlay=document.createElement('div');overlay.className='xsj-modal-overlay';
  const modal=document.createElement('div');modal.className='xsj-modal';

  const footerHTML=opts.showReset?`<div class="xsj-modal-footer"><div class="xsj-modal-reset-btn" id="xsj-reset-btn">恢复默认</div></div>`:'';

  modal.innerHTML=`
    <div class="xsj-modal-header">
      <div class="xsj-modal-btn" id="xsj-cancel-btn">取消</div>
      <div class="xsj-modal-title-wrap">
        <div class="xsj-modal-title">${opts.title||''}</div>
        ${opts.subtitle?`<div class="xsj-modal-subtitle">${opts.subtitle}</div>`:''}
      </div>
      <div class="xsj-modal-btn confirm" id="xsj-confirm-btn">确定</div>
    </div>
    <div class="xsj-modal-body" id="xsj-modal-body">${opts.contentHtml||''}</div>
    ${footerHTML}`;

  overlay.appendChild(modal);document.body.appendChild(overlay);
  _modalOpenCount++;
  document.body.style.overflow='hidden';

  // Focus first input
  setTimeout(()=>{const inp=modal.querySelector('input,select,textarea');if(inp)inp.focus();},80);

  function closeModal(){
    overlay.classList.add('closing');modal.classList.add('closing');
    setTimeout(()=>{
      overlay.remove();
      _modalOpenCount = Math.max(0, _modalOpenCount - 1);
      if(_modalOpenCount === 0) document.body.style.overflow='';
    },200);
  }
  function collectData(){
    const d={};
    modal.querySelectorAll('[data-field]').forEach(el=>{
      const k=el.dataset.field;
      if(el.type==='checkbox')d[k]=el.checked;
      else d[k]=el.value;
    });
    return d;
  }

  overlay.addEventListener('click',e=>{if(e.target===overlay){if(opts.onCancel)opts.onCancel();closeModal();}});
  modal.querySelector('#xsj-cancel-btn').addEventListener('click',()=>{if(opts.onCancel)opts.onCancel();closeModal();});
  modal.querySelector('#xsj-confirm-btn').addEventListener('click',()=>{if(opts.onConfirm)opts.onConfirm(collectData());closeModal();});
  if(opts.showReset&&modal.querySelector('#xsj-reset-btn')){
    modal.querySelector('#xsj-reset-btn').addEventListener('click',()=>{if(opts.onReset)opts.onReset(modal);});
  }
}

/* ── Anniversary editor ── */
function editAnni(){
  const savedTitle=localStorage.getItem('xsj_anni_title')||'此处添加纪念日';
  const savedDate=localStorage.getItem('xsj_anni_date')||'2025-01-01';
  showModal({
    title:'新建纪念日',subtitle:'Create Anniversary',
    showReset:true,
    contentHtml:`<div class="xsj-field-wrap"><div class="xsj-field-label">纪念日名称</div><input class="xsj-input" data-field="anniTitle" placeholder="如：恋爱纪念日" value="${escHtml(savedTitle)}" autocomplete="off"></div>
    <div class="xsj-field-wrap"><div class="xsj-field-label">纪念日日期</div><input class="xsj-input" type="date" data-field="anniDate" value="${escHtml(savedDate)}"></div>`,
    onConfirm(d){
      const title=d.anniTitle.trim()||'此处添加纪念日';
      const dateStr=d.anniDate||'2025-01-01';
      localStorage.setItem('xsj_anni_title',title);
      localStorage.setItem('xsj_anni_date',dateStr);
      const tEl=document.getElementById('anni-title');if(tEl)tEl.textContent=title;
      const [yy,mm,dd]=dateStr.split('-');
      const dlEl=document.getElementById('anni-date-label');if(dlEl)dlEl.textContent=yy+'年'+parseInt(mm)+'月'+parseInt(dd)+'日';
      const t=new Date(dateStr),n=new Date();
      const days=Math.floor((n-t)/864e5);
      document.getElementById('anni-days').textContent=Math.abs(days);
    },
    onReset(modal){
      const ti=modal.querySelector('[data-field="anniTitle"]');if(ti)ti.value='此处添加纪念日';
      const di=modal.querySelector('[data-field="anniDate"]');if(di)di.value='2025-01-01';
    }
  });
}

// Lock slider
(function(){
  const track=document.getElementById('unlock-track'),thumb=document.getElementById('unlock-thumb');
  let dragging=false,sx=0,tl=0;
  // Guard: ensure maxT is always a positive number; if track is hidden offsetWidth=0
  const maxT=()=>Math.max(20, track.offsetWidth - thumb.offsetWidth - 6);
  function start(e){
    // Only allow dragging when lock screen is actually visible
    const lk=document.getElementById('lock-screen');
    if(!lk||lk.style.display==='none')return;
    dragging=true;sx=e.touches?e.touches[0].clientX:e.clientX;tl=0;e.preventDefault();
  }
  function move(e){if(!dragging)return;const cx=e.touches?e.touches[0].clientX:e.clientX;let dx=Math.max(0,Math.min(cx-sx,maxT()));thumb.style.transform='translateX('+dx+'px)';tl=dx;e.preventDefault();}
  function end(){
    if(!dragging)return;dragging=false;
    const mt=maxT();
    if(mt > 10 && tl >= mt * 0.8){
      const lk=document.getElementById('lock-screen');
      const ms=document.getElementById('main-screen');
      lk.classList.remove('visible');
      ms.style.display='block';
      ms.classList.add('entering');
      requestAnimationFrame(()=>requestAnimationFrame(()=>{
        ms.classList.remove('entering');
      }));
      setTimeout(()=>{lk.style.display='none';},400);
    }else{
      thumb.style.transition='transform .3s ease';
      thumb.style.transform='translateX(0)';
      setTimeout(()=>{thumb.style.transition='';},300);
    }
  }
  thumb.addEventListener('mousedown',start);
  thumb.addEventListener('touchstart',start,{passive:false});
  document.addEventListener('mousemove',move);
  document.addEventListener('touchmove',move,{passive:false});
  document.addEventListener('mouseup',end);
  document.addEventListener('touchend',end);
})();

// Calendar
var calAgendaOffset=0;
var DAYS_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function buildCalendar(){
  var now=new Date();
  now.setDate(now.getDate()+calAgendaOffset);
  var monthEl=document.getElementById('cal-agenda-month');
  if(monthEl) monthEl.textContent=MONTHS_EN[now.getMonth()]+' '+now.getFullYear();
  var strip=document.getElementById('cal-week-strip');
  if(!strip) return;
  strip.innerHTML='';
  var dow=now.getDay(),weekStart=new Date(now);weekStart.setDate(now.getDate()-dow);
  var today=new Date();
  for(var i=0;i<5;i++){
    var dt=new Date(weekStart);dt.setDate(weekStart.getDate()+i+1);
    var isToday=dt.getDate()===today.getDate()&&dt.getMonth()===today.getMonth()&&dt.getFullYear()===today.getFullYear();
    var isSelected=dt.getDate()===now.getDate()&&dt.getMonth()===now.getMonth();
    var d=document.createElement('div');d.className='cal-week-day'+(isSelected?' active':'');
    d.innerHTML='<div class="cal-wd-label">'+DAYS_SHORT[dt.getDay()]+'</div><div class="cal-wd-num">'+String(dt.getDate()).padStart(2,'0')+'</div>';
    if(isToday&&!isSelected){d.querySelector('.cal-wd-num').style.fontWeight='600';d.querySelector('.cal-wd-num').style.color='var(--text)';}
    strip.appendChild(d);
  }
  var list=document.getElementById('cal-agenda-list');
  if(list){
    var events=calAgendaOffset===0?[{t:'周末计划',time:'10:00 – 12:00',bar:'#111'},{t:'下午茶',time:'14:30 – 15:30',bar:'#ccc'}]:[{t:'空闲',time:'暂无日程',bar:'#ddd'}];
    list.innerHTML='';
    events.forEach(function(ev){
      var item=document.createElement('div');item.className='cal-agenda-item active-scale';
      item.innerHTML='<div class="cal-agenda-bar" style="background:'+ev.bar+'"></div><div><div class="cal-agenda-title">'+ev.t+'</div><div class="cal-agenda-time">'+ev.time+'</div></div>';
      list.appendChild(item);
    });
  }
  var footer=document.getElementById('cal-agenda-footer');
  if(footer) footer.textContent=calAgendaOffset===0?(events?events.length:0)+' events today':'No events';
}

// ── Image compression utility ──
function compressImage(file, maxW, quality, cb, onError) {
  const _fail = function(msg) {
    showToast(msg || '图片处理失败，请重试');
    if (typeof onError === 'function') onError(msg);
  };
  // Guard: 15 MB hard limit before reading
  if (file && file.size > 15 * 1024 * 1024) {
    _fail('图片过大，请选择 15MB 以内的图片');
    return;
  }
  const reader = new FileReader();
  reader.onerror = function() { _fail('图片读取失败'); };
  reader.onload = function(ev) {
    const img = new Image();
    img.onerror = function() { _fail('图片格式不支持，请使用 JPG / PNG / WebP'); };
    img.onload = function() {
      try {
        const scale = Math.min(1, maxW / img.width);
        const w = Math.round(img.width * scale);
        const h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        // Keep PNG for transparency, otherwise JPEG
        const isTransparentPng = file.type === 'image/png';
        const dataUrl = isTransparentPng
          ? canvas.toDataURL('image/png')
          : canvas.toDataURL('image/jpeg', quality);
        cb(dataUrl);
      } catch(e) {

  if(name==='chat'){openChatApp();return;}

  ov.classList.toggle('settings-mode',name==='settings');
  ct.innerHTML='<div class="app-back" onclick="closeApp()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></div><div class="app-title">'+app.t+'</div>'+app.b;

function beautifyHexToRgb(color){
  if(!color)return null;
  color=color.trim();
  if(color.indexOf('rgb')===0){
    var nums=color.match(/\d+(?:\.\d+)?/g);
    if(nums&&nums.length>=3)return {r:parseInt(nums[0],10),g:parseInt(nums[1],10),b:parseInt(nums[2],10)};
  }
  if(color[0]==='#'){
    if(color.length===4)color='#'+color[1]+color[1]+color[2]+color[2]+color[3]+color[3];
    return {r:parseInt(color.slice(1,3),16),g:parseInt(color.slice(3,5),16),b:parseInt(color.slice(5,7),16)};
  }
  return null;
}
function beautifyDarkenColor(color,ratio){
  var rgb=beautifyHexToRgb(color)||{r:226,g:226,b:226};
  return '#'+Math.round(rgb.r*ratio).toString(16).padStart(2,'0')+Math.round(rgb.g*ratio).toString(16).padStart(2,'0')+Math.round(rgb.b*ratio).toString(16).padStart(2,'0');
}
function beautifyApplyIconAppearance(mode,color){
  mode=mode||'glass';
  color=color||getComputedStyle(document.documentElement).getPropertyValue('--layer-3').trim()||'#e2e2e2';
  var rgb=beautifyHexToRgb(color)||{r:226,g:226,b:226};
  if(mode==='solid'){
    document.documentElement.style.setProperty('--app-icon-bg',color);
    document.documentElement.style.setProperty('--app-icon-backdrop','none');
    document.documentElement.style.setProperty('--app-icon-border-color',window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.04)');
    document.documentElement.style.setProperty('--app-icon-shadow','none');
  }else{
    document.documentElement.style.setProperty('--app-icon-bg','rgba(255,255,255,0)');
    document.documentElement.style.setProperty('--app-icon-backdrop','blur(7px) saturate(1.55)');
    document.documentElement.style.setProperty('--app-icon-border-color',window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'rgba(255,255,255,0.10)':'rgba(255,255,255,0.22)');
    document.documentElement.style.setProperty('--app-icon-shadow','inset 0 0 0 0.5px rgba(255,255,255,0.45)');
  }
}
function beautifySetIconAppearance(mode){
  var theme=beautifyGetTheme();
  theme.appIconAppearance=mode;
  localStorage.setItem('xsj_beautify_theme',JSON.stringify(theme));
  beautifyApplyIconAppearance(mode,theme.appIconColor);
  beautifySave(mode);
  if(typeof toast==='function')toast(mode==='solid'?'已切换为纯色图标':'已切换为透明毛玻璃图标');
}
function beautifyApplyIconColor(color){
  document.documentElement.style.setProperty('--layer-3',color);
  document.documentElement.style.setProperty('--layer-4',beautifyDarkenColor(color,0.85));
  var theme=beautifyGetTheme();
  beautifyApplyIconAppearance(theme.appIconAppearance||'glass',color);
  beautifySave();
}
function beautifyApplyCustomIcon(appId,url){
  var theme=beautifyGetTheme();
  theme['icon_'+appId]=url;
  localStorage.setItem('xsj_beautify_theme',JSON.stringify(theme));
  // Apply to actual icons on main screen
  beautifyRefreshIcons();
}
function beautifyRefreshIcons(){
  var theme=beautifyGetTheme();
  document.querySelectorAll('.app-icon-wrap').forEach(function(wrap){
    var onclick=wrap.getAttribute('onclick')||'';
    var match=onclick.match(/openApp\('(\w+)'\)/);
    if(!match)return;
    var appId=match[1];
    var imgUrl=theme['icon_'+appId];
    var box=wrap.querySelector('.app-icon-box');
    if(!box)return;
    if(imgUrl){
      var existing=box.querySelector('.beautify-custom-img');
      if(!existing){
        var img=document.createElement('img');
        img.className='beautify-custom-img';
        img.style.cssText='width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:inherit;';
        box.style.position='relative';
        box.style.overflow='hidden';
        box.appendChild(img);
      }
      (box.querySelector('.beautify-custom-img')).src=imgUrl;
    }else{
      var ci=box.querySelector('.beautify-custom-img');
      if(ci)ci.remove();
    }
  });
}
function beautifyGetTheme(){
  try{return JSON.parse(localStorage.getItem('xsj_beautify_theme'))||{};}catch(e){return {};}
}
function beautifySave(nextAppearance){
  var theme=beautifyGetTheme();
  theme.appIconColor=getComputedStyle(document.documentElement).getPropertyValue('--layer-3').trim();
  theme.cardColor=getComputedStyle(document.documentElement).getPropertyValue('--layer-1').trim();
  theme.bgColor=getComputedStyle(document.documentElement).getPropertyValue('--bg').trim();
  theme.appIconAppearance=nextAppearance||theme.appIconAppearance||'glass';
  localStorage.setItem('xsj_beautify_theme',JSON.stringify(theme));
}
function beautifyReset(){
  localStorage.removeItem('xsj_beautify_theme');
  document.documentElement.style.removeProperty('--bg');
  document.documentElement.style.removeProperty('--layer-1');
  document.documentElement.style.removeProperty('--layer-2');
  document.documentElement.style.removeProperty('--layer-3');
  document.documentElement.style.removeProperty('--layer-4');
  document.documentElement.style.removeProperty('--card-bg');
  document.documentElement.style.removeProperty('--glass-bg');
  document.documentElement.style.removeProperty('--app-icon-bg');
  document.documentElement.style.removeProperty('--app-icon-backdrop');
  document.documentElement.style.removeProperty('--app-icon-border-color');
  document.documentElement.style.removeProperty('--app-icon-shadow');
  document.querySelectorAll('.beautify-custom-img').forEach(function(i){i.remove();});
  renderBeautifyApp();
  if(typeof toast==='function')toast('已恢复默认');
}
// Load saved beautify theme on page load
function beautifyInit(){
  var theme=beautifyGetTheme();
  if(theme.appIconColor)beautifyApplyIconColor(theme.appIconColor);
  beautifyApplyIconAppearance(theme.appIconAppearance||'glass',theme.appIconColor);
  if(theme.bgColor)document.documentElement.style.setProperty('--bg',theme.bgColor);
  if(theme.cardColor){
    document.documentElement.style.setProperty('--layer-1',theme.cardColor);
    document.documentElement.style.setProperty('--card-bg',theme.cardColor);
    document.documentElement.style.setProperty('--glass-bg',theme.cardColor);
  }
  setTimeout(beautifyRefreshIcons,500);
}

function chatGetData(){
  try{

    if(s){
      const d=JSON.parse(s);
      // ── Version migration ──
      if(!d.version){ d.version=1; }
      // Ensure required keys exist (safe migration)
      if(!d.contacts){ d.contacts={groups:[]}; }
      if(!Array.isArray(d.contacts.groups)){ d.contacts.groups=[]; }
      if(!d.discovers){ d.discovers=[]; }
      return d;
    }
  }catch(e){}
  // Default: only AI assistant, no preset friends
  return {
    version:1,
    contacts:{groups:[

    discovers:[]
  };
}

function chatSwitchTab(tab){
  CHAT_STATE.currentTab=tab;
  // Reset search when switching main tabs
  CHAT_STATE.searchQuery='';CHAT_STATE.searchVisible=false;
  // Reset contacts state when leaving contacts
  if(tab!=='contacts'){CHAT_STATE.contactsDeleteMode=false;CHAT_STATE.contactsSearch='';}
  ['chats','contacts','discover','me'].forEach(t=>{
    const el=document.getElementById('chat-tab-'+t);
    if(el)el.classList.toggle('active',t===tab);
  });
  // Show/hide header for discover and me tabs
  const hdrWrap=document.getElementById('chat-hdr-wrap');
  if(hdrWrap){
    const hideHdr=(tab==='discover'||tab==='me');
    hdrWrap.style.display=hideHdr?'none':'block';
  }
  // Show subtab bar only for chats tab
  const subtab=document.getElementById('chat-subtab-bar');
  const searchBar=document.getElementById('chat-search-bar');
  if(subtab)subtab.style.display=tab==='chats'?'flex':'none';
  if(searchBar)searchBar.style.display='none';
  const body=document.getElementById('chat-app-body');if(!body)return;
  // Adjust body padding for discover tab (hero extends to edges)
  body.style.padding=tab==='discover'?'0':'';
  // For me tab: full height flex column, no overflow
  if(tab==='me'){
    body.style.display='flex';body.style.flexDirection='column';body.style.alignItems='';body.style.justifyContent='';body.style.overflow='hidden';body.style.height='100%';body.style.padding='0';
  } else {
    body.style.display='';body.style.flexDirection='';body.style.alignItems='';body.style.justifyContent='';body.style.overflow='';body.style.height='';body.style.padding='';
  }
  const page=document.createElement('div');page.className='chat-page';
  if(tab==='discover')page.style.padding='0';
  if(tab==='me'){page.style.padding='0';page.style.height='100%';page.style.overflow='hidden';}
  if(tab==='chats')page.innerHTML=chatBuildChats();
  else if(tab==='contacts')page.innerHTML=chatBuildContacts();
  else if(tab==='discover')page.innerHTML=chatBuildDiscover();
  else if(tab==='me')page.innerHTML=chatBuildMe();
  body.innerHTML='';body.appendChild(page);body.scrollTop=0;
  if(tab==='discover'){
    requestAnimationFrame(()=>{
      const savedBg=localStorage.getItem('discoverBg');
      if(savedBg){const bgEl=document.getElementById('dsc-hero-bg');if(bgEl)_safeBgUrl(bgEl,savedBg);}
    });
  }
  if(tab==='chats')setTimeout(chatAttachLongPress,50);
  if(tab==='contacts')setTimeout(chatAttachContactsLongPress,50);
}

function chatBuildChats(){
  // Build msgs from contacts + CHAT_MESSAGES extras
  const allContacts=chatGetAllContacts();
  let msgs=allContacts.map(c=>({
    id:c.id,
    name:c.name,
    preview:c.isAi?'你好！我是AI助手 ✨':'暂无消息',
    time:'',
    type:'friend',
    isTop:c.isTop||false,
    isAi:c.isAi||false,
    avatar:c.avatar||''
  }));
  // Add extra CHAT_MESSAGES that aren't already in contacts
  CHAT_MESSAGES.forEach(m=>{if(!msgs.find(x=>x.name===m.name))msgs.push({...m,isTop:false,isAi:false,avatar:'',id:''});});
  // Filter by subtab
  if(CHAT_STATE.chatSubTab==='group') msgs=msgs.filter(m=>m.type==='group');
  else if(CHAT_STATE.chatSubTab==='friends') msgs=msgs.filter(m=>m.type==='friend');
  // Filter by search
  if(CHAT_STATE.searchQuery){
    const q=CHAT_STATE.searchQuery.toLowerCase();
    msgs=msgs.filter(m=>m.name.toLowerCase().includes(q)||(m.preview||'').toLowerCase().includes(q));
  }
  // Sort: topped first
  msgs.sort((a,b)=>{if(a.isTop&&!b.isTop)return -1;if(!a.isTop&&b.isTop)return 1;return 0;});
  if(!msgs.length){return `<div style="height:8px;"></div><div style="text-align:center;padding:48px 0;color:var(--text-muted);font-size:14px;">无聊天记录</div>`;}
  const items=msgs.map(m=>{
    const avContent=m.avatar
      ?`<img src="${m.avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
      :m.isAi
        ?`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="8" r="3.5"/><path d="M5.5 20c0-3.6 2.9-6.5 6.5-6.5s6.5 2.9 6.5 6.5"/></svg>`
        :m.type==='group'
          ?`<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><circle cx="9" cy="8" r="2.5"/><path d="M3 20c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="17" cy="8" r="2.5" opacity=".7"/><path d="M21 20c0-2.8-1.8-4.5-4-5.2" opacity=".7"/></svg>`
          :`<span style="font-size:16px;font-weight:600;color:#fff;">${m.name[0]}</span>`;
    const topBadge=m.isTop?`<svg width="14" height="14" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" style="margin-left:4px;vertical-align:middle;flex-shrink:0;pointer-events:none;"><path d="M557.728 688v288.384H466.24V688H227.52c-9.6 0-18.048-3.712-24.96-11.264A37.824 37.824 0 0 1 192 649.984c0-48.768 14.432-92.704 43.584-131.84 29.12-38.976 61.92-58.56 98.56-58.56V200.512c-19.296 0-35.84-7.552-50.048-22.656a76.16 76.16 0 0 1-21.12-53.6c0-20.672 7.04-38.4 21.12-53.6 13.984-14.976 30.72-22.656 50.048-22.656h355.584c19.296 0 35.84 7.552 50.048 22.656 13.984 15.104 21.152 32.928 21.152 53.6 0 20.672-7.04 38.4-21.12 53.6-14.112 15.232-30.784 22.656-50.08 22.656v258.944c36.64 0 69.568 19.584 98.56 58.56A215.424 215.424 0 0 1 832 649.984c0 10.272-3.456 19.328-10.528 26.752-7.04 7.424-15.36 11.264-24.96 11.264H557.76z" fill="#9C9C9C"/></svg>`:'';
    return `<div class="chat-list-item" data-contact-name="${escHtml(m.name)}" data-is-top="${m.isTop?'1':'0'}" data-is-ai="${m.isAi?'1':'0'}" onclick="chatShowMsg('${escHtml(m.name)}')" >

        <div class="chat-list-preview">${escHtml(m.preview||'')}</div>

  }).join('');
  return `<div style="height:20px;"></div><div class="chat-list-card" id="chat-list-card">${items}</div>`;

const CONV_STATE={

function chatShowMsg(name){
  // Look up contact (for avatar / AI flag); fall back to a minimal stub
  let contact=null;
  try{contact=chatGetAllContacts().find(c=>c.name===name)||null;}catch(e){contact=null;}

  CONV_STATE.activeName=name;
  CONV_STATE.plusOpen=false;
  CONV_STATE.offline=false;
  CONV_STATE.quote=null;
  CONV_STATE.edit=null;

  // Inject the conversation overlay into the chat app container
  const container=document.querySelector('.chat-app-container');
  if(!container){showToast('无法打开聊天'); return;}

  // Remove any existing overlay first
  const old=document.getElementById('conv-overlay');
  if(old)old.remove();

  const html=buildConvHTML(name,contact);
  container.insertAdjacentHTML('beforeend',html);
  convAttachMessageActions();
  setTimeout(()=>{convRenderComposerState();convInputChanged();},0);

  // Trigger slide-in
  const ov=document.getElementById('conv-overlay');
  requestAnimationFrame(()=>{ov.classList.add('show');});

  // Scroll messages to bottom
  setTimeout(()=>{
    const body=document.getElementById('conv-body');
    if(body)body.scrollTop=body.scrollHeight;
  },50);
}

function convClose(){
  const ov=document.getElementById('conv-overlay');
  if(!ov)return;
  // If plus panel is open, close it first instead of leaving
  if(CONV_STATE.plusOpen){convTogglePlus(false);return;}
  ov.classList.remove('show');
  setTimeout(()=>{ov.remove();CONV_STATE.activeName=null;CONV_STATE.quote=null;CONV_STATE.edit=null;},340);
}

/* Build iMessage-style grouped bubbles */
function convBuildGroupedMsgs(msgs,contactAvHTML,myAvHTML){
  let html='';
  let i=0;
  while(i<msgs.length){
    const side=msgs[i].side;
    // Collect consecutive messages from same side
    const group=[];
    while(i<msgs.length && msgs[i].side===side){
      group.push(msgs[i]);
      i++;
    }
    const sent=side==='sent';
    const avHTML=sent?myAvHTML:contactAvHTML;
    const lastTime=group[group.length-1].time||'';
    
    html+=`<div class="conv-group ${sent?'sent':''}">`;
    html+=`<div class="conv-group-av">${avHTML}</div>`;
    html+=`<div class="conv-group-bubbles">`;
    group.forEach((m,idx)=>{
      let posClass;
      if(group.length===1) posClass=sent?'sent-single':'recv-single';
      else if(idx===0) posClass=sent?'sent-first':'recv-first';
      else if(idx===group.length-1) posClass=sent?'sent-last':'recv-last';
      else posClass=sent?'sent-mid':'recv-mid';
      html+=`<div class="conv-bubble ${posClass}" data-msg-text="${escHtml(m.text)}" data-msg-side="${sent?'sent':'recv'}"><div class="conv-bubble-main">${escHtml(m.text)}</div></div>`;
    });
    if(lastTime) html+=`<div class="conv-group-time">${escHtml(lastTime)}</div>`;
    html+=`</div></div>`;
  }
  return html;
}

function convBuildMsgHTML(m,avContent){
  const sent=m.side==='sent';
  const av=sent
    ? `<div class="conv-group-av" style="background:#2C2C2E;color:#fff;">我</div>`
    : `<div class="conv-group-av">${avContent}</div>`;
  return `
    <div class="conv-group ${sent?'sent':''}">
      ${av}
      <div class="conv-group-bubbles">
        <div class="conv-bubble ${sent?'sent-single':'recv-single'}" data-msg-text="${escHtml(m.text)}" data-msg-side="${sent?'sent':'recv'}"><div class="conv-bubble-main">${escHtml(m.text)}</div></div>
        ${m.time?`<div class="conv-group-time">${escHtml(m.time)}</div>`:''}
      </div>
    </div>`;
}
